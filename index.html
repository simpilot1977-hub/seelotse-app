function toggleManöver(event) {
  event.preventDefault();
  const cb = document.querySelector('input[name="manöver"]');
  const willCheck = !cb.checked;
  cb.checked = willCheck;
  cb.closest('.richtung-btn').classList.toggle('active', willCheck);
}

function toggleAbgeschoepft(event) {
  event.preventDefault();
  const cb = document.querySelector('input[name="abgeschöpft"]');
  const willCheck = !cb.checked;
  cb.checked = willCheck;
  cb.closest('.richtung-btn').classList.toggle('active', willCheck);
  updateFormVisibility();
}

function toggleRichtung(event, name) {
  event.preventDefault();
  const cb      = document.querySelector(`input[name="${name}"]`);
  const other   = document.querySelector(`input[name="${name === 'einkommend' ? 'ausgehend' : 'einkommend'}"]`);
  const willCheck = !cb.checked;
  cb.checked = willCheck;
  cb.closest('.richtung-btn').classList.toggle('active', willCheck);
  if (willCheck && other) {
    other.checked = false;
    other.closest('.richtung-btn').classList.remove('active');
  }
  updateFormVisibility();
}

function toggleCuxOption(event, val) {
  event.preventDefault();
  document.querySelectorAll('input[name="cuxOption"]').forEach(r => {
    r.checked = (r.value === val);
    r.closest('.richtung-btn')?.classList.toggle('active', r.value === val);
  });
  updateFormVisibility();
}

function toggleAnspleissen(event) {
  event.preventDefault();
  const cb = event.currentTarget.querySelector('input[type="checkbox"]');
  if (!cb) return;
  cb.checked = !cb.checked;
  event.currentTarget.classList.toggle('active', cb.checked);
}

function updateFormVisibility() {
  const art         = document.querySelector('#artDesEinsatzes')?.value;
  const isRadar     = art === 'Radar';
  const isAGFahrt   = art === 'AG-Fahrt';
  const is2plus2    = art === '2+2';
  const hideExtra   = isRadar || isAGFahrt;
  const anteileVal  = parseFloat(document.getElementById('schiffsanteile')?.value) || 0;
  const is4Anteile  = anteileVal === 4;
  const streckeNach = document.querySelector('#streckeNach')?.value;
  const isCux       = streckeNach === 'Cux';
  const cuxOpt      = document.querySelector('input[name="cuxOption"]:checked')?.value || '';
  const isCuxBrb    = isCux && cuxOpt === 'brb';   // zurück nach BrB = alle Zeitfelder
  const autoAus     = isAGFahrt || is2plus2 || is4Anteile;   // immer Ausgehend

  // ── Auto-Richtung für AG-Fahrt, 2+2 und 4 Anteile ──────────────────────
  if (autoAus) {
    const ausCb = document.querySelector('input[name="ausgehend"]');
    const einCb = document.querySelector('input[name="einkommend"]');
    if (ausCb && !ausCb.checked) {
      ausCb.checked = true;
      ausCb.closest('.richtung-btn')?.classList.add('active');
    }
    if (einCb && einCb.checked) {
      einCb.checked = false;
      einCb.closest('.richtung-btn')?.classList.remove('active');
    }
  }

  // ── Aktuellen Zustand lesen (nach Auto-Richtung) ────────────────────────
  const einkommend     = document.querySelector('input[name="einkommend"]')?.checked;
  const ausgehend      = document.querySelector('input[name="ausgehend"]')?.checked;
  const isAbgeschoepft = document.querySelector('input[name="abgeschöpft"]')?.checked;

  // ── Element-Referenzen ──────────────────────────────────────────────────
  const richtungGroup   = document.getElementById('richtung-group');
  const btnEinkommend   = document.getElementById('btn-einkommend');
  const dtAbfahrt       = document.getElementById('dtbox-abfahrt');
  const dtAnkunft       = document.getElementById('dtbox-ankunft');
  const vonField        = document.getElementById('field-streckeVon');
  const nachField       = document.getElementById('field-streckeNach');
  const tiefgangField   = document.getElementById('field-tiefgang');
  const personenField   = document.getElementById('field-personenAnBord');
  const agenturField    = document.getElementById('field-agentur');
  const wmGroup         = document.getElementById('wm-group');
  const btnManoever     = document.getElementById('btn-manoever');
  const btnAbgeschoepft = document.getElementById('btn-abgeschoepft');
  const ansplGroup      = document.getElementById('anspleissen-group');
  const cuxGroup        = document.getElementById('cux-option-group');

  // ── Felder ein-/ausblenden ──────────────────────────────────────────────
  if (vonField)        vonField.style.display        = isRadar             ? 'none' : '';
  if (nachField)       nachField.style.display       = isRadar             ? 'none' : '';
  if (tiefgangField)   tiefgangField.style.display   = (isRadar||isAGFahrt)? 'none' : '';
  if (personenField)   personenField.style.display   = hideExtra           ? 'none' : '';
  if (agenturField)    agenturField.style.display    = (isRadar||isAGFahrt)? 'none' : '';
  if (wmGroup)         wmGroup.style.display         = hideExtra           ? 'none' : '';
  if (richtungGroup)   richtungGroup.style.display   = isRadar             ? 'none' : '';

  // Einkommend-Button ausblenden wenn Richtung fix (AG-Fahrt / 2+2 / 4 Anteile)
  if (btnEinkommend)   btnEinkommend.style.display   = autoAus             ? 'none' : '';
  // Manöver ausblenden bei AG-Fahrt (bei Radar ist die ganze richtungGroup weg)
  if (btnManoever)     btnManoever.style.display      = isAGFahrt           ? 'none' : '';

  // Anspleissen: nur bei Radar sichtbar
  if (ansplGroup) {
    ansplGroup.style.display = isRadar ? '' : 'none';
    if (!isRadar) {
      const ansplCb = ansplGroup.querySelector('input[type="checkbox"]');
      if (ansplCb) { ansplCb.checked = false; ansplGroup.querySelector('.richtung-btn')?.classList.remove('active'); }
    }
  }

  // Abgeschöpft: sichtbar wenn Ausgehend aktiv und kein Radar
  if (btnAbgeschoepft) {
    const showAbg = !isRadar && !!ausgehend;
    btnAbgeschoepft.style.display = showAbg ? '' : 'none';
    if (!showAbg) {
      const abgCb = document.querySelector('input[name="abgeschöpft"]');
      if (abgCb) { abgCb.checked = false; btnAbgeschoepft.classList.remove('active'); }
    }
  }

  // Cux-Option-Gruppe: nur wenn Nach = Cux
  if (cuxGroup) cuxGroup.style.display = isCux ? '' : 'none';

  // Zeitfelder: bei 4 Anteilen oder Cux→BrB alle anzeigen, sonst normale Logik
  const showAllTimes = is4Anteile || isCuxBrb;
  if (dtAbfahrt) dtAbfahrt.style.display = showAllTimes ? '' : ((!isRadar && einkommend) ? 'none' : '');
  if (dtAnkunft) dtAnkunft.style.display = showAllTimes ? '' : ((!isRadar && ausgehend && !isAbgeschoepft) ? 'none' : '');
}

function setNow(field) {
  const el = document.getElementById('dt_' + field);
  if (!el) return;
  el.value = toLocalDTInput(new Date().toISOString());
}

function handleSubmit(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const id = fd.get('id') || uid();
  const existing = fahrten.find(f => f.id === id);

  const entry = {
    id,
    schiffsname:    fd.get('schiffsname')?.trim() || '',
    streckeVon:     fd.get('streckeVon') || '',
    streckeNach:    fd.get('streckeNach') || '',
    artDesEinsatzes:fd.get('artDesEinsatzes') || '',
    tiefgang:       fd.get('tiefgang') || '',
    personenAnBord: fd.get('personenAnBord') || '',
    vmax:           fd.get('vmax') || '',
    agentur:        fd.get('agentur')?.trim() || '',
    einkommend:     fd.get('einkommend') === 'on',
    ausgehend:      fd.get('ausgehend') === 'on',
    abgeschöpft:    fd.get('abgeschöpft') === 'on',
    manöver:        fd.get('manöver') === 'on',
    anspleissen:    fd.get('anspleissen') === 'on',
    cuxOption:      fd.get('cuxOption') || '',
    wartestunden:   fd.get('wartestunden') || '',
    schiffsanteile: fd.get('schiffsanteile') || '',
    anBord:         fromDTInput(fd.get('anBord')),
    vonBord:        fromDTInput(fd.get('vonBord')),
    abfahrt:        fromDTInput(fd.get('abfahrt')),
    ankunft:        fromDTInput(fd.get('ankunft')),
    bemerkungen:    fd.get('bemerkungen')?.trim() || '',
    createdAt:      existing?.createdAt || new Date().toISOString(),
    updatedAt:      new Date().toISOString(),
  };

  if (existing) {
    fahrten = fahrten.map(f => f.id === id ? entry : f);
    showToast('✓ Fahrt aktualisiert.', 'success');
  } else {
    fahrten.unshift(entry);
    showToast('✓ Fahrt gespeichert.', 'success');
  }

  saveData();
  aktuelleReiseId = entry.id;
  goAktuelleReise();
}

function renderFahrtDashboard(entry) {

  const pad   = n => String(n).padStart(2,'0');
  const fmtD  = v => { if (!v) return '—'; const d=new Date(v); return isNaN(d)?'—':`${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()}`; };
  const fmtT  = v => { if (!v) return '—'; const d=new Date(v); return isNaN(d)?'—':`${pad(d.getHours())}:${pad(d.getMinutes())}`; };
  const fmtDT = v => { const da=fmtD(v), ti=fmtT(v); return da==='—'?'—':`${da} ${ti}`; };
  const fmtMs = ms => fmtT(new Date(ms).toISOString());
  const fmtWs = ws => ws ? (parseInt(ws)/100).toFixed(2)+' m' : '—';

  const refMs = entry.anBord ? new Date(entry.anBord).getTime() : null;
  const tideBadge = s => s==='flut'?'<span class="ata-tide flut">↑ Flut</span>'
                       : s==='ebbe'?'<span class="ata-tide ebbe">↓ Ebbe</span>'
                       : s==='stau'?'<span class="ata-tide stau">≈ Stau</span>'
                       : '<span style="opacity:.4">—</span>';

  // ── Tide cards (Gezeitensituation bei Abfahrt) ────────────────────────────
  const hasTideData = tideDbs.Cuxhaven.length || tideDbs.Brunsbuettel.length || tideDbs.Hamburg.length;
  const stationLabel = { Cuxhaven:'Cuxhaven', Brunsbuettel:'Brunsbüttel', Hamburg:'Hamburg' };

  function getTideAroundTime(locKey, ts) {
    const db = tideDbs[locKey] || [];
    if (!db.length || !ts) return null;
    const STAU_MS = 15*60*1000;
    const offset = { Cuxhaven:0, Brunsbuettel:3600000, Hamburg:0 }[locKey]||0;
    const sorted = [...db].sort((a,b)=>new Date(a.dt)-new Date(b.dt));
    let before=null, after=null;
    for (let i=sorted.length-1;i>=0;i--) { if (new Date(sorted[i].dt).getTime()<=ts){before=sorted[i];break;} }
    for (let i=0;i<sorted.length;i++) { if (new Date(sorted[i].dt).getTime()>ts){after=sorted[i];break;} }
    const shifted = sorted.map(e=>({t:new Date(e.dt).getTime()+offset,type:e.type}));
    let status=null;
    for (const ev of shifted) if(Math.abs(ev.t-ts)<=STAU_MS){status='stau';break;}
    if (!status) {
      let last=null; for (const ev of shifted) if(ev.t<=ts)last=ev;
      if(last) status=last.type==='HW'?'ebbe':'flut';
      else if(shifted[0]) status=shifted[0].type==='HW'?'flut':'ebbe';
    }
    return { before, after, status };
  }

  const tideCardsHtml = hasTideData && refMs ? ['Cuxhaven','Brunsbuettel','Hamburg'].map(loc => {
    const ti = getTideAroundTime(loc, refMs);
    if (!ti) return `<div class="fd-tide-card"><div class="fd-tide-header"><span class="fd-tide-name">${stationLabel[loc]}</span></div><div class="fd-tide-none">Keine DB-Daten</div></div>`;
    const svgCurve = makeTideCurveSVG(tideDbs[loc], refMs);
    const fmtEvtLine = e => e ? `${e.type} · ${fmtTideTime(e.dt, refMs)} · ${fmtWs(e.ws)}` : '—';
    return `<div class="fd-tide-card">
      <div class="fd-tide-header"><span class="fd-tide-name">${stationLabel[loc]}</span>${tideBadge(ti.status)}</div>
      <div class="fd-tide-row"><span class="fd-tide-lbl">Vorheriges</span><span class="fd-tide-val">${fmtEvtLine(ti.before)}</span></div>
      <div class="fd-tide-row"><span class="fd-tide-lbl">Nächstes</span><span class="fd-tide-val">${fmtEvtLine(ti.after)}</span></div>
      ${svgCurve}
    </div>`;
  }).join('') : '';

  // ── ETA Berechnung ─────────────────────────────────────────────────────────
  const veff = parseFloat(arManuelleV) || parseFloat(entry.vmax) || null;
  const etaResults = veff && entry.anBord ? arCalcETAs(entry, veff) : [];

  // ── Strömungsverlauf SVG (wie EPP) ─────────────────────────────────────────
  let stromChartHtml = '';
  if (etaResults.length >= 2) {
    const W=640, H=130, PL=36, PR=12, PT=14, PB=30;
    const cW=W-PL-PR, cH=H-PT-PB;
    const yMax=3.5, zeroY=PT+cH/2;
    // X-Achse: immer links=Start, rechts=Ende (Reiseverlauf links→rechts)
    const xS = idx => PL + (etaResults.length < 2 ? 0 : (idx / (etaResults.length-1)) * cW);
    const yS = v  => PT + cH/2 - (v/yMax)*(cH/2);
    let grid='';
    [-3,-2,-1,0,1,2,3].forEach(kn=>{
      const y=yS(kn), iz=kn===0;
      grid+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="${iz?'#94a3b8':'#e2e8f0'}" stroke-width="${iz?1.5:1}" ${iz?'':'stroke-dasharray="3,3"'}/>`;
      grid+=`<text x="${PL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="${iz?'#334155':'#64748b'}" ${iz?'font-weight="600"':''}>${kn>0?'+':''}${kn}</text>`;
    });
    // Schiebestrom = positiv, Gegenstrom = negativ (aus Sicht des Schiffes)
    const toDisplay = v => entry.einkommend ? v : -v;
    const pts = etaResults.map((r,i)=>({x:xS(i),y:yS(toDisplay(r.effectiveCurrent))}));
    let curveD=`M ${pts[0].x.toFixed(1)} ${pts[0].y.toFixed(1)}`;
    for(let i=0;i<pts.length-1;i++){
      const p0=pts[Math.max(i-1,0)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(i+2,pts.length-1)];
      const c1x=(p1.x+(p2.x-p0.x)/6).toFixed(1),c1y=(p1.y+(p2.y-p0.y)/6).toFixed(1);
      const c2x=(p2.x-(p3.x-p1.x)/6).toFixed(1),c2y=(p2.y-(p3.y-p1.y)/6).toFixed(1);
      curveD+=` C ${c1x} ${c1y} ${c2x} ${c2y} ${pts[i+1].x.toFixed(1)} ${pts[i+1].y.toFixed(1)}`;
    }
    const first=pts[0],last=pts[pts.length-1];
    const fillPath=`${curveD} L ${last.x.toFixed(1)} ${zeroY} L ${first.x.toFixed(1)} ${zeroY} Z`;
    let xlbls='', dots='';
    etaResults.forEach((r,i)=>{
      const x=xS(i);
      const dv = toDisplay(r.effectiveCurrent);
      xlbls+=`<line x1="${x}" y1="${PT}" x2="${x}" y2="${H-PB+4}" stroke="#cbd5e1" stroke-width="1"/>`;
      xlbls+=`<text x="${x}" y="${H-10}" text-anchor="middle" font-size="8" fill="#64748b">${r.wp.label}</text>`;
      xlbls+=`<text x="${x}" y="${H-2}" text-anchor="middle" font-size="8" fill="#475569">${fmtMs(r.timeMs)}</text>`;
      const col=dv>0.5?'#16a34a':dv<-0.5?'#dc2626':'#64748b';
      dots+=`<circle cx="${x.toFixed(1)}" cy="${yS(dv).toFixed(1)}" r="4" fill="${col}" stroke="#fff" stroke-width="1.5"/>`;
      const yLbl=dv>=0?yS(dv)-8:yS(dv)+13;
      dots+=`<text x="${x.toFixed(1)}" y="${yLbl.toFixed(1)}" text-anchor="middle" font-size="9" font-weight="700" fill="${col}">${dv>0?'+':''}${dv.toFixed(1)}</text>`;
    });
    const kn_lbl=`<text x="10" y="${(PT+cH/2+4).toFixed(1)}" text-anchor="middle" font-size="9" fill="#64748b" transform="rotate(-90,10,${(PT+cH/2).toFixed(1)})">kn</text>`;
    stromChartHtml=`<div class="fd-card">
      <div class="fd-card-title" style="display:flex;align-items:center;gap:12px">
        <span>Strömungsverlauf</span>
        <span style="font-size:10px;font-weight:600;color:#16a34a">▲ Schiebestrom</span>
        <span style="font-size:10px;font-weight:600;color:#dc2626">▼ Gegenstrom</span>
      </div>
      <div style="overflow-x:auto">
        <svg width="${W}" height="${H}" style="display:block;background:#fff">
          <defs>
            <clipPath id="arClipP"><rect x="${PL}" y="${PT}" width="${cW}" height="${cH/2}"/></clipPath>
            <clipPath id="arClipN"><rect x="${PL}" y="${zeroY}" width="${cW}" height="${cH/2}"/></clipPath>
          </defs>
          ${grid}${xlbls}${kn_lbl}
          <path d="${fillPath}" fill="#bbf7d0" fill-opacity="0.7" stroke="none" clip-path="url(#arClipP)"/>
          <path d="${fillPath}" fill="#fecaca" fill-opacity="0.7" stroke="none" clip-path="url(#arClipN)"/>
          <path d="${curveD}" fill="none" stroke="#1d4ed8" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
          ${dots}
        </svg>
      </div>
    </div>`;
  }

  // ── ETA-Tabelle ────────────────────────────────────────────────────────────
  let etaCardHtml = '';
  if (!veff) {
    etaCardHtml = `<div class="fd-card"><div class="fd-card-title">ETA Wegpunkte</div>
      <div style="padding:16px;color:var(--text-muted);font-size:13px">Bitte Vmax in der Fahrt erfassen oder manuelle Geschwindigkeit eingeben.</div></div>`;
  } else if (etaResults.length) {
    const vLabel = arManuelleV ? `${parseFloat(arManuelleV).toFixed(1)} kn (manuell)` : `${parseFloat(entry.vmax).toFixed(1)} kn (Vmax)`;
    const depMs  = etaResults[0].timeMs;
    const lastR = etaResults[etaResults.length-1];
    const totalMins = Math.round((lastR.timeMs - depMs) / 60000);
    const totalNm   = Math.abs(lastR.wp.nm - etaResults[0].wp.nm);
    const avgSog    = totalMins > 0 ? (totalNm / (totalMins / 60)) : 0;
    let rows = etaResults.map(r => {
      const stromVal = r.current ?? 0;
      // Push/Brake aus Sicht des Schiffes: einkommend→Flut schiebt, ausgehend→Ebbe schiebt
      const isPush  = entry.einkommend ? stromVal > 0.5 : stromVal < -0.5;
      const isBrake = entry.einkommend ? stromVal < -0.5 : stromVal > 0.5;
      const sk = isPush ? 'push' : isBrake ? 'brake' : 'stau';
      const si = isPush ? '↑' : isBrake ? '↓' : '≈';
      const deltaMins = Math.round((r.timeMs - depMs)/60000);
      const deltaStr  = deltaMins===0?'—':`+${Math.floor(deltaMins/60)}h${String(deltaMins%60).padStart(2,'0')}m`;
      // Richtungs-Badge: gleiche Farb-Logik wie Strömung (push=grün, brake=rot)
      const richtungLabel = Math.abs(stromVal) > 0.5 ? (stromVal > 0 ? '↑ Flut' : '↓ Ebbe') : '≈ Stau';
      // Tidekurve mit Wegpunktname als Beschriftung (Ref-Station als Untertitel)
      const dbLabel = { Cuxhaven:'Cuxhaven', Brunsbuettel:'Brunsbüttel', Hamburg:'Hamburg' }[r.wp.db] || r.wp.db;
      const miniSvg = `<div style="font-size:9px;color:var(--navy);font-weight:600;text-align:center;margin-bottom:1px">${r.wp.label}</div><div style="font-size:8px;color:var(--text-muted);text-align:center;margin-bottom:2px">Ref: ${dbLabel}</div>${makeTideCurveSVG(tideDbs[r.wp.db], r.timeMs)}`;
      const sogBadgeClass = r.sogOverridden ? 'ar-sog-override' : 'ar-sog-calc';
      const curWpSog = arWpSog[r.wp.key] ?? '';
      const delBtn = curWpSog ? `<button onclick="arSetWpSog('${r.wp.key}','')" title="Eingabe löschen" style="margin-left:3px;padding:1px 5px;border:1px solid #fca5a5;border-radius:4px;background:#fee2e2;color:#b91c1c;font-size:10px;cursor:pointer;line-height:1.4">✕</button>` : '';
      return `<tr>
        <td style="font-weight:700;color:var(--navy);white-space:nowrap">${r.wp.label}</td>
        <td style="font-variant-numeric:tabular-nums;white-space:nowrap"><strong>${fmtMs(r.timeMs)}</strong></td>
        <td style="color:var(--text-muted);font-size:11px;white-space:nowrap">${deltaStr}</td>
        <td><span class="dr-wp-strom ${sk}">${si} ${Math.abs(stromVal).toFixed(1)} kn</span></td>
        <td><span class="dr-wp-strom ${sk}">${richtungLabel}</span></td>
        <td><span class="${sogBadgeClass}">${(r.sog ?? 0).toFixed(1)} kn</span></td>
        <td style="white-space:nowrap"><input type="number" class="ar-wsog-input" value="${curWpSog}" placeholder="kn" min="1" max="30" step="0.1" onchange="arSetWpSog('${r.wp.key}',this.value)" title="Wahre SOG — überschreibt Berechnung für nächste Etappe">${delBtn}</td>
        <td style="min-width:190px;padding:4px 8px">${miniSvg}</td>
      </tr>`;
    }).join('');
    const fmtDur = m => `${Math.floor(m/60)}h ${String(m%60).padStart(2,'0')}m`;
    const totalsRow = `<tr style="border-top:2px solid var(--border);font-weight:700;background:#f8fafc">
      <td colspan="2" style="color:var(--navy)">Gesamt</td>
      <td style="font-size:11px">${fmtDur(totalMins)}</td>
      <td colspan="2"></td>
      <td><span class="ar-sog-calc">⌀ ${avgSog.toFixed(1)} kn</span></td>
      <td colspan="2" style="font-size:11px;color:var(--text-muted)">${totalNm} sm</td>
    </tr>`;
    etaCardHtml = `<div class="fd-card">
      <div class="fd-card-title" style="display:flex;align-items:center;justify-content:space-between">
        <span>ETA Wegpunkte</span>
        <span style="font-size:11px;font-weight:600;color:var(--blue)">Geschwindigkeit: ${vLabel}</span>
      </div>
      <div style="overflow-x:auto">
        <table class="epp-ata-table">
          <thead><tr>
            <th>Ort</th><th>Ankunft</th><th>Δ Zeit</th><th>Strömung</th><th>Richtung</th><th>SOG</th><th>Wahre SOG</th><th>Tidekurve</th>
          </tr></thead>
          <tbody>${rows}${totalsRow}</tbody>
        </table>
      </div>
    </div>`;
  }

  // ── HTML ausgeben ──────────────────────────────────────────────────────────
  document.getElementById('app-main').innerHTML = `
    <div class="fd-page" id="ar-dashboard">
      <div class="fd-toolbar">
        <div>
          <h2>Aktuelle Reise</h2>
          <span style="font-size:12px;color:var(--text-muted)">${esc(entry.schiffsname)||'—'} · ${fmtD(entry.anBord)}</span>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-secondary btn-sm" onclick="goForm('${entry.id}')">✏️ Bearbeiten</button>
          <button class="btn btn-secondary btn-sm" onclick="exportFahrtPDF('${entry.id}')">📄 Als PDF</button>
          <button class="btn btn-primary btn-sm" onclick="goList()">Zur Übersicht</button>
        </div>
      </div>

      <div class="fd-cards">
        <!-- Schiffsdaten -->
        <div class="fd-card">
          <div class="fd-card-title">Schiffsdaten</div>
          <div class="fd-ship-grid">
            <div class="fd-field"><div class="fd-lbl">Schiffsname</div><div class="fd-val">${esc(entry.schiffsname)||'—'}</div></div>
            <div class="fd-field"><div class="fd-lbl">Art des Einsatzes</div><div class="fd-val">${esc(entry.artDesEinsatzes)||'—'}</div></div>
            <div class="fd-field"><div class="fd-lbl">Von → Nach</div><div class="fd-val">${esc(entry.streckeVon)||'—'} → ${esc(entry.streckeNach)||'—'}</div></div>
            <div class="fd-field"><div class="fd-lbl">Tiefgang</div><div class="fd-val">${entry.tiefgang ? entry.tiefgang+' m' : '—'}</div></div>
            <div class="fd-field"><div class="fd-lbl">Personen</div><div class="fd-val">${entry.personenAnBord||'—'}</div></div>
            <div class="fd-field"><div class="fd-lbl">Vmax</div><div class="fd-val">${entry.vmax ? entry.vmax+' kn' : '—'}</div></div>
            <div class="fd-field"><div class="fd-lbl">An Bord</div><div class="fd-val">${fmtDT(entry.anBord)}</div></div>
            <div class="fd-field"><div class="fd-lbl">Von Bord</div><div class="fd-val">${fmtDT(entry.vonBord)}</div></div>
          </div>
          <!-- Manuelle Geschwindigkeit -->
          <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <label style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px">Manuelle Geschwindigkeit</label>
            <input type="number" step="0.5" min="0.5" max="30" placeholder="${entry.vmax||'kn'}"
              value="${arManuelleV}"
              oninput="arSetManuelleV(this.value)"
              style="width:80px;padding:5px 8px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:13px;font-weight:600;color:var(--navy)">
            <span style="font-size:11px;color:var(--text-muted)">kn — überschreibt Vmax für Berechnungen</span>
            ${arManuelleV ? `<button onclick="arSetManuelleV('')" style="padding:3px 8px;font-size:11px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--bg);cursor:pointer;color:var(--text-muted)">✕ Zurücksetzen</button>` : ''}
          </div>
        </div>

        <!-- ETA Wegpunkte -->
        ${etaCardHtml}

        <!-- Strömungsverlauf -->
        ${stromChartHtml}

        <!-- Gezeitensituation -->
        ${hasTideData && refMs ? `
        <div class="fd-card">
          <div class="fd-card-title">Gezeitensituation · ${fmtT(entry.anBord)} Uhr (An Bord)</div>
          <div class="fd-tide-grid">${tideCardsHtml}</div>
        </div>` : ''}
      </div>
    </div>`;

}

function renderImportExport() {
  const count = fahrten.length;
  document.getElementById('app-main').innerHTML = `
    <div class="ie-header">
      <h2>Import / Export</h2>
      <p>Datenbank sichern, wiederherstellen oder nach Excel exportieren.</p>
    </div>
    <div class="ie-grid">
      <div class="ie-card blue">
        <div class="ie-icon">📤</div>
        <h3>JSON exportieren</h3>
        <p>Exportiert alle Einträge als JSON-Datei — ideal zur Datensicherung oder Übertragung auf ein anderes Gerät.</p>
        <div class="ie-count">${count} ${count===1?'Eintrag':'Einträge'} vorhanden</div>
        <button class="btn btn-primary" onclick="exportJSON()" ${count===0?'disabled':''}>Datenbank exportieren</button>
      </div>
      <div class="ie-card gold">
        <div class="ie-icon">📥</div>
        <h3>JSON importieren</h3>
        <p>Stellt eine zuvor exportierte Datenbank wieder her. Die aktuellen Daten werden dabei vollständig ersetzt.</p>
        <div class="ie-warn-text">⚠️ Aktuelle Daten werden überschrieben</div>
        <button class="btn btn-warn" onclick="document.getElementById('json-input').click()">Datei auswählen …</button>
        <input type="file" id="json-input" accept=".json" style="display:none" onchange="importJSON(this)">
      </div>
      <div class="ie-card green">
        <div class="ie-icon">📊</div>
        <h3>Excel exportieren</h3>
        <p>Exportiert alle Fahrten als Excel-Datei (.xlsx) — für Berichte, Auswertungen oder die Weitergabe.</p>
        <div class="ie-count">${count} ${count===1?'Eintrag':'Einträge'} vorhanden</div>
        <button class="btn btn-success" onclick="exportExcel()" ${count===0?'disabled':''}>Excel-Datei exportieren</button>
      </div>
    </div>
    <div class="ie-header" style="margin-top:28px">
      <h2 style="font-size:17px">Gezeiten-Datenbank</h2>
      <p>BSH-Vorausberechnungen (DE__xxxP20xx) für Cuxhaven, Brunsbüttel und Hamburg laden. Die Daten werden dauerhaft gespeichert und ermöglichen die automatische Befüllung der Gezeitenfelder im EPP-Blatt.</p>
    </div>
    <div class="tide-db-list">
      ${['Cuxhaven','Brunsbuettel','Hamburg'].map(loc => {
        const label = loc === 'Brunsbuettel' ? 'Brunsbüttel' : loc;
        const db    = tideDbs[loc] || [];
        const cnt   = db.length;
        let metaHtml = cnt > 0 ? `${cnt} Ereignisse geladen` : 'Keine Daten';
        if (cnt > 0) {
          const dates = db.map(e => e.dt).filter(Boolean).sort();
          const dMin = dates[0] ? new Date(dates[0]) : null;
          const dMax = dates[dates.length-1] ? new Date(dates[dates.length-1]) : null;
          const _fmt = d => d ? `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}` : '';
          const year  = dMin ? dMin.getFullYear() : '';
          const range = (dMin && dMax) ? `${_fmt(dMin)} – ${_fmt(dMax)}` : '';
          metaHtml = `${cnt} Ereignisse · <strong>${year}</strong><br><span style="font-size:10px">${range}</span>`;
        }
        return `<div class="tide-db-card">
          <div class="tide-db-name">${label}</div>
          <div class="tide-db-count">${metaHtml}</div>
          <label class="btn btn-secondary btn-sm" style="cursor:pointer;margin:0">
            Datei laden …
            <input type="file" style="display:none" accept=".txt,.dat,*" onchange="importTideDb('${loc}',this)">
          </label>
          ${cnt > 0 ? `<button class="btn-warn-sm" onclick="clearTideDb('${loc}')">Löschen</button>` : ''}
        </div>`;
      }).join('')}
    </div>`;
}

function exportJSON() {
  const json = JSON.stringify(fahrten, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const now  = new Date();
  const pad  = n => String(n).padStart(2,'0');
  const ts   = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}_${pad(now.getHours())}-${pad(now.getMinutes())}-${pad(now.getSeconds())}`;
  a.href     = url;
  a.download = `seelotse-fahrtenbuch_${ts}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ JSON-Datei exportiert.', 'success');
}

function importJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      const data = JSON.parse(evt.target.result);
      if (!Array.isArray(data)) throw new Error('Kein Array');
      fahrten = data;
      saveData();
      showToast(`✓ ${data.length} Einträge importiert.`, 'success');
      renderImportExport();
    } catch(err) {
      showToast('Fehler: Ungültiges Dateiformat.', 'error');
    }
    input.value = '';
  };
  reader.readAsText(file);
}

function exportExcel() {
  if (typeof XLSX === 'undefined') {
    showToast('Excel-Bibliothek nicht geladen. Bitte Seite neu laden.', 'error');
    return;
  }
  const sortedFahrten = [...fahrten].sort((a,b) => (a.anBord||'') < (b.anBord||'') ? -1 : 1);
  const pairM = buildPairMap(fahrten);
  const rows = sortedFahrten.map(f => {
    const reiseDur  = calcDuration(f.anBord, f.vonBord) || '';
    const einsatzR  = getEinsatzdauer(f, fahrten);
    const pairInfo  = pairM[f.id];
    const isLinked  = !einsatzR && pairInfo && f.ausgehend;
    const einsatzTxt = einsatzR
      ? einsatzR.dur + (einsatzR.cross ? ' ↗' : '')
      : isLinked ? '⬇ Ausgehend' : '';
    return {
      'Datum (An Bord)':   fmtDT(f.anBord),
      'Schiffsname':       f.schiffsname        || '',
      'Von':               f.streckeVon         || '',
      'Nach':              f.streckeNach        || '',
      'Art des Einsatzes': f.artDesEinsatzes    || '',
      'Tiefgang (m)':      f.tiefgang !== ''    ? f.tiefgang        : '',
      'POB':               f.personenAnBord !== '' ? f.personenAnBord : '',
      'Manöver':           f.manöver            ? 'Ja' : '',
      'Wartestunden':      f.wartestunden       || '',
      'Schiffsanteile':    f.schiffsanteile !== '' && f.schiffsanteile != null ? parseFloat(f.schiffsanteile) : '',
      'Agentur':           f.agentur            || '',
      'An Bord':           fmtDT(f.anBord),
      'Von Bord':          fmtDT(f.vonBord),
      'Reisedauer':        reiseDur,
      'Abfahrt Haustür':   fmtDT(f.abfahrt),
      'Ankunft Haustür':   fmtDT(f.ankunft),
      'Abgeschöpft':       f.abgeschöpft        ? 'Ja' : '',
      'Einsatzdauer':      einsatzTxt,
    };
  });

  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:20},{wch:22},{wch:8},{wch:8},{wch:16},{wch:12},{wch:6},{wch:9},{wch:12},{wch:12},{wch:22},{wch:20},{wch:20},{wch:12},{wch:20},{wch:20},{wch:12},{wch:14}];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Fahrten');
  const date = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `seelotse-fahrtenbuch-${date}.xlsx`);
  showToast('✓ Excel-Datei exportiert.', 'success');
}

/* ════════════════════════════════════════════
   PIN-SCHUTZ
════════════════════════════════════════════ */
(function() {
  const PIN = '1905';
  const SESSION_KEY = 'seelotse_auth';
  let pinBuffer = '';

  function updateDots() {
    for (let i = 0; i < 4; i++) {
      const d = document.getElementById('pd' + i);
      d.className = 'pin-dot' + (i < pinBuffer.length ? ' filled' : '');
    }
  }

  function pinError() {
    const dots = document.getElementById('pin-dots');
    const err  = document.getElementById('pin-error');
    for (let i = 0; i < 4; i++) document.getElementById('pd'+i).className = 'pin-dot error';
    err.textContent = 'Falscher PIN';
    dots.classList.add('shake');
    setTimeout(() => {
      pinBuffer = '';
      updateDots();
      dots.classList.remove('shake');
      err.textContent = '';
    }, 600);
  }

  function pinUnlock() {
    sessionStorage.setItem(SESSION_KEY, '1');
    const overlay = document.getElementById('pin-overlay');
    overlay.classList.add('fade-out');
    setTimeout(() => overlay.remove(), 380);
  }

  window.pinKey = function(k) {
    if (k === 'del') {
      pinBuffer = pinBuffer.slice(0, -1);
      updateDots();
      return;
    }
    if (pinBuffer.length >= 4) return;
    pinBuffer += k;
    updateDots();
    if (pinBuffer.length === 4) {
      if (pinBuffer === PIN) {
        pinUnlock();
      } else {
        pinError();
      }
    }
  };

  // Tastatureingabe
  document.addEventListener('keydown', e => {
    if (!document.getElementById('pin-overlay')) return;
    if (e.key >= '0' && e.key <= '9') pinKey(e.key);
    else if (e.key === 'Backspace') pinKey('del');
  });

  // Bereits authentifiziert in dieser Sitzung?
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    const overlay = document.getElementById('pin-overlay');
    if (overlay) overlay.remove();
  }
})();
