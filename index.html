function eppWaypoints() {
  // Returns waypoints in the selected direction
  return eppDir === 'ein' ? [...EPP_WP] : [...EPP_WP].reverse();
}

function eppRouteSegments(wps) {
  // wps: ordered array for current direction
  // Returns distances between consecutive waypoints
  if (eppDir === 'ein') {
    return wps.map((wp, i) => i === 0 ? 0 : wp.dist);
  } else {
    // outbound: reverse segments (prev wp's dist in original order)
    const orig = [...EPP_WP];
    return wps.map((wp, i) => {
      if (i === 0) return 0;
      const prevInOrig = orig.find(w => w.id === wps[i - 1].id);
      const curInOrig  = orig.find(w => w.id === wp.id);
      const origIdxPrev = orig.indexOf(prevInOrig);
      const origIdxCur  = orig.indexOf(curInOrig);
      return Math.abs(origIdxPrev - origIdxCur) === 1
        ? (origIdxPrev > origIdxCur ? prevInOrig.dist : curInOrig.dist)
        : 0;
    });
  }
}

function fmtNM(nm) {
  return nm === 0 ? '–' : nm + ' NM';
}

function fmtDuration(hours) {
  if (!isFinite(hours) || hours < 0) return '–';
  const h = Math.floor(hours);
  const m = Math.round((hours - h) * 60);
  if (h === 0) return m + ' min';
  if (m === 0) return h + ' h';
  return h + ' h ' + m + ' min';
}

function addHours(isoOrStr, hours) {
  const d = new Date(isoOrStr);
  d.setTime(d.getTime() + hours * 3600000);
  return d;
}

function fmtTime(date) {
  return date.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
}

function fmtDateTimeFull(date) {
  return date.toLocaleString('de-DE', {
    day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

function calculateEPP() {
  const wps      = eppWaypoints();
  const fromIdx  = wps.findIndex(w => w.id === eppFrom);
  const toIdx    = wps.findIndex(w => w.id === eppTo);
  if (fromIdx < 0 || toIdx < 0 || fromIdx >= toIdx) return null;

  const current  = parseFloat(eppCurrent) || 0;
  const route    = wps.slice(fromIdx, toIdx + 1);
  const segs     = eppRouteSegments(wps).slice(fromIdx, toIdx + 1);
  const depDate  = new Date(eppDep);

  if (isNaN(depDate)) return null;

  let speedSOG; // speed over ground

  if (eppMode === 'eta') {
    const shipSpeed = parseFloat(eppSpeed);
    if (!shipSpeed || shipSpeed <= 0) return null;
    speedSOG = shipSpeed + current;
  } else {
    // speed mode: calculate from dep + arrival
    const arrDate = new Date(eppArrival);
    if (isNaN(arrDate)) return null;
    const totalHours = (arrDate - depDate) / 3600000;
    if (totalHours <= 0) return null;
    const totalDist = segs.reduce((s, d) => s + d, 0);
    speedSOG = totalDist / totalHours;
  }

  if (speedSOG <= 0) return null;

  let eta = depDate;
  const rows = route.map((wp, i) => {
    const dist    = segs[i];
    const segHrs  = i === 0 ? 0 : dist / speedSOG;
    eta = i === 0 ? depDate : addHours(eta, segHrs);
    return {
      name:    wp.name,
      id:      wp.id,
      dist:    dist,
      segHrs:  segHrs,
      eta:     new Date(eta),
      isDep:   i === 0,
      isDest:  i === route.length - 1,
    };
  });

  const totalDist = segs.reduce((s, d) => s + d, 0);
  const totalHrs  = rows[rows.length - 1].eta - depDate;
  const shipSpeed = speedSOG - current;

  return { rows, totalDist, totalHrs: totalHrs / 3600000, speedSOG, shipSpeed, current };
}

function makeTideCurveSVG(tideEntries, refTs) {
  const W = 200, H = 72;
  const valid = (tideEntries || [])
    .filter(e => e.dt)
    .map(e => ({ t: new Date(e.dt).getTime(), type: e.type }))
    .filter(e => !isNaN(e.t))
    .sort((a, b) => a.t - b.t);
  if (valid.length < 2) return '';

  // Anchor to the ACTUAL nearest event (no extrapolation drift)
  const iN = valid.reduce((best, e, i) =>
    Math.abs(e.t - refTs) < Math.abs(valid[best].t - refTs) ? i : best, 0);
  const nearEvt = valid[iN];
  const prevEvt = iN > 0 ? valid[iN - 1] : null;
  const nextEvt = iN < valid.length - 1 ? valid[iN + 1] : null;

  // halfPeriod from actual neighbours
  let halfPeriod;
  if (prevEvt && nextEvt) halfPeriod = (nextEvt.t - prevEvt.t) / 2;
  else if (prevEvt)       halfPeriod = nearEvt.t - prevEvt.t;
  else                    halfPeriod = nextEvt.t - nearEvt.t;
  if (halfPeriod <= 0) return '';

  const T   = 2 * halfPeriod;
  const amp = nearEvt.type === 'HW' ? -1 : 1;
  const MARGIN = 20;
  const amplitude = H / 2 - MARGIN;

  const winStart = nearEvt.t - halfPeriod;
  const winEnd   = nearEvt.t + halfPeriod;

  const xMin = 14, xMax = W - 14;
  const xOf = t => xMin + (xMax - xMin) * (t - winStart) / (winEnd - winStart);
  // Cosine anchored to nearEvt (the actual HW or NW time)
  const yOf = t => (H / 2) + amplitude * amp * Math.cos(2 * Math.PI * (t - nearEvt.t) / T);

  const N = 80;
  const pts = Array.from({ length: N + 1 }, (_, i) => {
    const t = winStart + (winEnd - winStart) * i / N;
    return `${xOf(t).toFixed(1)},${yOf(t).toFixed(1)}`;
  });
  const curvePath = 'M ' + pts.join(' L ');
  const areaPath  = `M ${xOf(winStart).toFixed(1)},${H} L ${xOf(winStart).toFixed(1)},${yOf(winStart).toFixed(1)} `
    + pts.slice(1).map(p => 'L ' + p).join(' ')
    + ` L ${xOf(winEnd).toFixed(1)},${H} Z`;

  let marker = '';
  if (refTs >= winStart && refTs <= winEnd) {
    const cx = xOf(refTs), cy = yOf(refTs);
    marker = `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="4.5" fill="#2a6495" stroke="#fff" stroke-width="1.5"/>`;
  }

  const p2 = n => String(n).padStart(2, '0');
  const fmtT = ms => { const d = new Date(ms); return `${p2(d.getHours())}:${p2(d.getMinutes())}`; };

  // Labels from ACTUAL events (prev, near, next)
  const evts = [prevEvt, nearEvt, nextEvt].filter(Boolean);
  const labelsHtml = evts.map(e => {
    const x   = xOf(e.t);
    const isN = e === nearEvt;
    const fw  = isN ? '800' : '600';
    const col = isN ? '#1a2332' : '#637485';
    if (e.type === 'HW') {
      return `<text x="${x.toFixed(1)}" y="9"  text-anchor="middle" font-size="7"              fill="${col}">${fmtT(e.t)}</text>`
           + `<text x="${x.toFixed(1)}" y="16" text-anchor="middle" font-size="8" font-weight="${fw}" fill="${col}">HW</text>`;
    } else {
      return `<text x="${x.toFixed(1)}" y="${H-13}" text-anchor="middle" font-size="8" font-weight="${fw}" fill="${col}">NW</text>`
           + `<text x="${x.toFixed(1)}" y="${H-5}"  text-anchor="middle" font-size="7"              fill="${col}">${fmtT(e.t)}</text>`;
    }
  }).join('');

  const cx0 = xOf(nearEvt.t).toFixed(1);
  const centerLine = `<line x1="${cx0}" y1="2" x2="${cx0}" y2="${H-2}" stroke="#a8bece" stroke-width="0.8" stroke-dasharray="3,2"/>`;

  const uid = Math.abs(iN * 7 + Math.round(nearEvt.t / 1e6) % 999);
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="display:block;overflow:visible;margin-top:8px;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',system-ui,sans-serif">
    <defs><linearGradient id="wg${uid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a6495" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#e8f1f9" stop-opacity="0.6"/>
    </linearGradient></defs>
    <path d="${areaPath}" fill="url(#wg${uid})"/>
    <path d="${curvePath}" fill="none" stroke="#2a6495" stroke-width="1.5" stroke-linejoin="round"/>
    ${centerLine}
    ${marker}
    ${labelsHtml}
  </svg>`;
}

function renderEPPPage() {
  const wps     = eppWaypoints();
  const fromOpts = wps.map((w, i) => {
    const validTo = wps.findIndex(x => x.id === eppTo);
    const selected = w.id === eppFrom ? 'selected' : '';
    return `<option value="${w.id}" ${selected}>${w.name}</option>`;
  }).join('');
  const toOpts = wps.map((w, i) => {
    const selected = w.id === eppTo ? 'selected' : '';
    return `<option value="${w.id}" ${selected}>${w.name}</option>`;
  }).join('');

  const res = eppResult;

  let resultHtml = '';
  if (res) {
    const speedRow = eppMode === 'speed' ? `
      <div class="epp-speed-highlight">
        <div>
          <div class="epp-speed-val">${res.shipSpeed.toFixed(1)} <span class="epp-speed-unit">kn</span></div>
          <div class="epp-speed-label">Benötigte Schiffsgeschwindigkeit</div>
        </div>
        <div class="epp-speed-sub">
          SOG: ${res.speedSOG.toFixed(1)} kn<br>
          Strömung: ${res.current >= 0 ? '+' : ''}${res.current.toFixed(1)} kn
        </div>
      </div>` : '';

    const tableRows = res.rows.map(r => {
      const rowClass = r.isDep ? 'dep-row' : r.isDest ? 'dest-row' : '';
      const dotClass = r.isDep ? 'dep' : r.isDest ? 'dest' : '';
      return `<tr class="${rowClass}">
        <td><div class="epp-wp-name"><span class="epp-wp-dot ${dotClass}"></span>${esc(r.name)}</div></td>
        <td>${fmtNM(r.dist)}</td>
        <td>${r.isDep ? '–' : fmtDuration(r.segHrs)}</td>
        <td><strong>${fmtDateTimeFull(r.eta)}</strong></td>
      </tr>`;
    }).join('');

    resultHtml = `
      <div class="epp-card">
        <div class="epp-card-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Ergebnis
        </div>
        ${speedRow}
        <table class="epp-result-table">
          <thead><tr>
            <th>Wegpunkt</th><th>Distanz</th><th>Fahrtzeit</th><th>ETA</th>
          </tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
        <div class="epp-summary">
          <div class="epp-sum-item">Gesamtdistanz<span class="epp-sum-val">${res.totalDist} NM</span></div>
          <div class="epp-sum-item">Gesamtfahrzeit<span class="epp-sum-val">${fmtDuration(res.totalHrs)}</span></div>
          <div class="epp-sum-item">SOG<span class="epp-sum-val">${res.speedSOG.toFixed(1)} kn</span></div>
          ${eppMode === 'eta' ? `<div class="epp-sum-item">Schiffsgeschwindigkeit<span class="epp-sum-val">${res.shipSpeed.toFixed(1)} kn</span></div>` : ''}
          <div class="epp-sum-item">Strömung<span class="epp-sum-val">${res.current >= 0 ? '+' : ''}${res.current.toFixed(1)} kn</span></div>
        </div>
      </div>`;
  }

  const isETA   = eppMode === 'eta';
  const isEin   = eppDir  === 'ein';

  // ── Tide grid cols (side-by-side) ───────────────────────────────────────
  // Referenzzeit: Stichtag > waypoint-ATA der zugehörigen Station > jetzt
  const _stationAtaMap = {
    Cuxhaven:     eppAtaLocs['E3'],
    Brunsbuettel: eppAtaLocs['Brunsbuettel'],
    Hamburg:      eppAtaLocs['Hamburg'],
  };
  const tideCols = EPP_TIDE_LOCS.map(loc => {
    const _refRaw  = eppStichtag || _stationAtaMap[loc] || '';
    const tideRefDt = _refRaw ? new Date(_refRaw) : new Date();
    const label = loc === 'Brunsbuettel' ? 'Brunsbüttel' : loc;
    const rows = eppTiden[loc].map((row, i) => {
      const typeClass = row.type === 'HW' ? 'hw' : 'nw';
      return `<div class="epp-tide-row">
        <select class="tide-type-sel ${typeClass}"
          onchange="eppSetTideType('${loc}',${i},this.value)">
          <option value="HW" ${row.type==='HW'?'selected':''}>HW</option>
          <option value="NW" ${row.type==='NW'?'selected':''}>NW</option>
        </select>
        <input class="tide-dt-input" type="datetime-local" value="${row.dt}"
          onchange="eppTiden['${loc}'][${i}].dt=this.value">
        <input class="tide-ws-input" type="number" value="${row.ws}"
          step="1" placeholder="cm" onchange="eppTiden['${loc}'][${i}].ws=this.value">
      </div>`;
    }).join('');

    // ── Tide-Status-Badge + Countdown ──────────────────────────────────────
    // Gleiche Zeitkorrekturen wie in eppGetTideStatus:
    // Cuxhaven=0, Brunsbüttel=+60min (Stau erst 1h nach HW/NW), Hamburg=0
    const _stauOffsets = { Cuxhaven: 0, Brunsbuettel: 60 * 60 * 1000, Hamburg: 0 };
    const _stauOffset  = _stauOffsets[loc] || 0;
    const STAU_MS = 15 * 60 * 1000;
    const refTs   = tideRefDt.getTime();
    // Ereigniszeiten werden um den Stationsversatz verschoben
    const valid   = eppTiden[loc]
      .filter(e => e.dt)
      .map(e => ({ t: new Date(e.dt).getTime() + _stauOffset, type: e.type }))
      .filter(e => !isNaN(e.t))
      .sort((a, b) => a.t - b.t);

    let statusBadge = '', countdownBadge = '';
    if (valid.length > 0) {
      // Status: Stau wenn nah an HW/NW, sonst aus letztem Ereignis ableiten
      let status = null;
      if (valid.some(e => Math.abs(e.t - refTs) <= STAU_MS)) {
        status = 'stau';
      } else {
        let last = null;
        for (const e of valid) { if (e.t <= refTs) last = e; }
        if (last) {
          status = last.type === 'HW' ? 'ebbe' : 'flut';
        } else {
          status = valid[0].type === 'HW' ? 'flut' : 'ebbe';
        }
      }
      // Countdown: nächstes Ereignis nach refDt (wird für "letzte" Erkennung gebraucht)
      const next = valid.find(e => e.t > refTs);
      const LETZTE_MS = 30 * 60 * 1000;
      const isLetzte = next && (next.t - refTs) > STAU_MS && (next.t - refTs) <= LETZTE_MS;

      if (status === 'flut')
        statusBadge = `<span class="ata-tide flut">${isLetzte ? '↑ letzte Flut' : '↑ Flut'}</span>`;
      else if (status === 'ebbe')
        statusBadge = `<span class="ata-tide ebbe">${isLetzte ? '↓ letzte Ebbe' : '↓ Ebbe'}</span>`;
      else
        statusBadge = '<span class="ata-tide stau">≈ Stau</span>';
      // Strömungs-Badge
      const _stromKey = {Cuxhaven:'E3', Brunsbuettel:'Brunsbuettel', Hamburg:'Hamburg'}[loc];
      const _stromVal = _stromKey ? getElbeCurrent(tideRefDt, _stromKey) : null;
      if (_stromVal !== null) {
        const _sk = _stromVal > 0.5 ? 'push' : _stromVal < -0.5 ? 'brake' : 'stau';
        const _si = _sk === 'push' ? '↑' : _sk === 'brake' ? '↓' : '≈';
        statusBadge += ` <span class="dr-wp-strom ${_sk}">${_si} ${Math.abs(_stromVal).toFixed(1)} kn</span>`;
      }
      if (next) {
        const diffMs  = next.t - refTs;
        const diffMin = Math.round(diffMs / 60000);
        const h = Math.floor(diffMin / 60);
        const m = diffMin % 60;
        const timeStr = h > 0 ? `${h}h ${String(m).padStart(2,'0')}m` : `${m}m`;
        const nextLabel = next.type === 'HW' ? 'HW' : 'NW';
        countdownBadge = `<span class="tide-countdown">⏱ ${nextLabel} in ${timeStr}</span>`;
      }
    }

    return `<div class="epp-tide-col">
      <div class="epp-tide-col-header">${label}</div>
      <div class="epp-tide-sub-header">
        <span class="tide-sh-art">Art</span>
        <span class="tide-sh-zeit">Datum &amp; Zeit</span>
        <span class="tide-sh-ws">WV<br>(cm)</span>
      </div>
      ${rows}
      <div class="epp-tide-badges">${statusBadge}${countdownBadge}</div>
      ${makeTideCurveSVG(eppTiden[loc], refTs)}
    </div>`;
  }).join('');

  // ── ATA rows: Hamburg = Ausgangspunkt → E3; 4-column aligned (ausgehend) ──
  const ATA_LEGS = [
    { key:'Hamburg',      label:'Hamburg',      distToNext: 36 },
    { key:'Brunsbuettel', label:'Brunsbüttel',  distToNext: 10 },
    { key:'Glameyer',     label:'Glameyer',     distToNext: 30 },
    { key:'ElbeRakon',    label:'Elbe-Racon',   distToNext: 13 },
    { key:'E3',           label:'E3',           distToNext: null },
  ];
  const ataFmtDT = d => {
    const pad = n => String(n).padStart(2,'0');
    return `${pad(d.getDate())}.${pad(d.getMonth()+1)}. ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  };
  let ataHtml = '';
  ATA_LEGS.forEach((leg, idx) => {
    // ── Gezeiten-Badge + Strom aus Elbe-Stromdatenbank ────────────────────
    const ataDt    = eppAtaLocs[leg.key] ? new Date(eppAtaLocs[leg.key]) : null;
    // ElbeRakon: klassische Logik (HW/NW Cuxhaven = Stauwasser)
    let stromVal, tideLabel;
    if (leg.key === 'ElbeRakon') {
      stromVal  = null;
      tideLabel = eppGetTideStatus(ataDt, 'ElbeRakon');  // 'flut'|'ebbe'|'stau'|null
    } else {
      stromVal  = ataDt ? getElbeCurrent(ataDt, leg.key) : null;
      tideLabel = stromVal === null ? null
                : stromVal >  0.5   ? 'flut'
                : stromVal < -0.5   ? 'ebbe'
                : 'stau';
    }
    const tideBadgeHtml = tideLabel === 'flut' ? '<span class="ata-tide flut">↑ Flut</span>'
                        : tideLabel === 'ebbe' ? '<span class="ata-tide ebbe">↓ Ebbe</span>'
                        : tideLabel === 'stau' ? '<span class="ata-tide stau">≈ Stau</span>'
                        : '';
    // Strom-Anzeigewert: aus Datenbank oder manuell eingetragen
    const stromDisplay = stromVal !== null ? Math.abs(stromVal).toFixed(1) : (eppAtaCurrents[leg.key] || '');
    // Farb-Klasse für Stromgeschwindigkeit (Flut = schiebt einlaufendes Schiff = grün)
    const stromCls = tideLabel === 'flut' ? 'push' : tideLabel === 'ebbe' ? 'brake' : '';
    const startBadge = ''; // Ausgangspunkt-Badge entfernt

    // ── Location row ─────────────────────────────────────────────────────
    // Eingehender Speed-Key für diesen Wegpunkt (zum Löschen bei Zeitstempel-Eingabe)
    // Display ist ausgehend (Hamburg→E3), physische Keys bleiben in E3→Hamburg-Reihenfolge:
    // speedKey = nextLeg.key + '-' + leg.key (nächster WP im Array ist Richtung E3)
    const inSpeedKey = idx > 0 ? leg.key + '-' + ATA_LEGS[idx-1].key : null;
    const clearInSpeed = inSpeedKey ? `eppAtaSpeeds['${inSpeedKey}']='';` : '';
    const hasVal = !!eppAtaLocs[leg.key];
    // Hamburg-Sync: Änderung unten spiegelt sich oben in eppATA (und umgekehrt)
    const hhSync = leg.key === 'Hamburg' ? "eppATA=this.value;" : '';
    const hhSyncClear = leg.key === 'Hamburg' ? "eppATA='';" : '';
    ataHtml += `<tr class="ata-loc-row">
      <td class="ata-loc">${leg.label}</td>
      <td>
        <div class="ata-dt-wrap">
          <input class="ata-dt-input" type="datetime-local" value="${eppAtaLocs[leg.key]}"
              onchange="eppAtaLocs['${leg.key}']=this.value;${hhSync}${clearInSpeed}autoFillTidesFromDb()">
          ${hasVal ? `<button class="ata-clear-x" onclick="eppAtaLocs['${leg.key}']='';${hhSyncClear}${clearInSpeed}autoFillTidesFromDb()" title="Uhrzeit löschen">✕</button>` : ''}
        </div>
      </td>
      <td>
        <div class="ata-badge-current">
          ${startBadge}${tideBadgeHtml}
        </div>
      </td>
      <td>
        <input class="ata-current-input ${stromCls}" type="number" step="0.1" min="0" max="10"
          placeholder="kn" value="${stromDisplay}"
          title="Strömungsgeschwindigkeit (kn)"
          onchange="eppAtaCurrents['${leg.key}']=this.value;renderEPPPage()">
      </td>
      <td></td>
    </tr>`;

    // ── Leg row (between this and next location) ──────────────────────
    const nextLeg = ATA_LEGS[idx + 1];
    if (!nextLeg || leg.distToNext == null) return;

    const speedKey = nextLeg.key + '-' + leg.key;
    const t1  = eppAtaLocs[leg.key] ? new Date(eppAtaLocs[leg.key]) : null;
    const vIn = eppAtaSpeeds[speedKey] ? parseFloat(eppAtaSpeeds[speedKey]) : null;

    // Überbrückung: vorwärts nach dem nächsten Wegpunkt mit ATA suchen
    let toIdx = idx + 1;
    while (toIdx < ATA_LEGS.length && !eppAtaLocs[ATA_LEGS[toIdx].key]) toIdx++;
    const t2End  = toIdx < ATA_LEGS.length ? new Date(eppAtaLocs[ATA_LEGS[toIdx].key]) : null;
    const isSpan = toIdx > idx + 1;   // überbrückt mindestens einen leeren WP
    let spanDist = 0;
    for (let k = idx; k < toIdx; k++) spanDist += ATA_LEGS[k].distToNext || 0;

    let calcHtml;
    let stwHtml = '';
    if (!t1 || isNaN(t1)) {
      // Startpunkt leer → diese Zeile liegt innerhalb einer Überbrückung, schon weiter oben berechnet
      calcHtml = `<span class="ata-calc-none">—</span>`;
    } else if (vIn && vIn > 0) {
      // Vorgabegeschwindigkeit → Rückwärts-Berechnung: WP unten = t1 - Fahrzeit
      const diffHrs    = leg.distToNext / vIn;
      const hours      = Math.floor(diffHrs);
      const mins       = Math.round((diffHrs - hours) * 60);
      const durStr     = `${hours}h ${String(mins).padStart(2,'0')}m`;
      const etaDt      = new Date(t1.getTime() - diffHrs * 3600000);
      const p2         = n => String(n).padStart(2,'0');
      const etaISO     = `${etaDt.getFullYear()}-${p2(etaDt.getMonth()+1)}-${p2(etaDt.getDate())}T${p2(etaDt.getHours())}:${p2(etaDt.getMinutes())}`;
      // Fdw = v_vorgeben (SOG) ± Strömung
      const _cur2 = eppAtaCurrents[leg.key] ? parseFloat(eppAtaCurrents[leg.key]) : null;
      const _vmx2 = parseFloat(eppVreise) || parseFloat(eppVmanöver) || null;
      if (_cur2 !== null && !isNaN(_cur2) && tideLabel && tideLabel !== 'stau') {
        const stw2 = tideLabel === 'ebbe' ? vIn + _cur2 : vIn - _cur2;
        const ok2  = !_vmx2 || stw2 <= _vmx2;
        stwHtml = `<span class="ata-stw ${ok2 ? 'ok' : 'warn'}">Fdw ${stw2.toFixed(1)} kn</span>`;
      }
      calcHtml = `<div class="ata-calc-rev">
        <span class="ata-elapsed">${durStr}</span>
        <span class="ata-spd-sep">·</span>
        <strong>${ataFmtDT(etaDt)}</strong>
        <button class="ata-adopt-btn" onclick="eppSetATA('${nextLeg.key}','${etaISO}')" title="Als ATA für ${nextLeg.label} übernehmen">↓ übernehmen</button>
      </div>`;
    } else if (t2End && !isNaN(t2End) && t1 > t2End) {
      // Rückwärts: t1 (oben) > t2End (unten), ggf. über leere Wegpunkte hinweg
      const diffHrs    = (t1 - t2End) / 3600000;
      const hours      = Math.floor(diffHrs);
      const mins       = Math.round((diffHrs - hours) * 60);
      const elapsedStr = `${hours}h ${String(mins).padStart(2,'0')}m`;
      const speedNum   = spanDist / diffHrs;
      const speed      = speedNum.toFixed(1);
      // Fdw (Fahrt durchs Wasser): SOG ± Strömung
      const _cur  = eppAtaCurrents[leg.key] ? parseFloat(eppAtaCurrents[leg.key]) : null;
      const _vmx  = parseFloat(eppVreise) || parseFloat(eppVmanöver) || null;
      if (_cur !== null && !isNaN(_cur) && tideLabel && tideLabel !== 'stau') {
        const stw = tideLabel === 'ebbe' ? speedNum + _cur : speedNum - _cur;
        const ok  = !_vmx || stw <= _vmx;
        stwHtml = `<span class="ata-stw ${ok ? 'ok' : 'warn'}">Fdw ${stw.toFixed(1)} kn</span>`;
      }
      calcHtml = `<div class="ata-calc-fwd">
        <span class="ata-elapsed">${elapsedStr}</span>
        <span class="ata-spd-sep">·</span>
        <span class="ata-speed val">${speed} kn</span>
      </div>`;
    } else {
      calcHtml = `<span class="ata-calc-none">—</span>`;
    }

    // Bei Überbrückung: Ziel-Label und Gesamtdistanz der Spanne anzeigen
    const dispLabel = `${nextLeg.label} → ${leg.label}`;
    const dispDist  = leg.distToNext;

    ataHtml += `<tr class="ata-leg-row">
      <td class="ata-leg-icon">↑</td>
      <td>
        <div class="ata-leg-route">
          <span class="ata-leg-lbl">${dispLabel}</span>
          <span class="ata-leg-dist">${dispDist} NM</span>
        </div>
      </td>
      <td>${calcHtml}</td>
      <td></td>
      <td>
        <div class="ata-vcol-wrap">
          ${stwHtml}
          <div class="ata-v-wrap">
            <input class="ata-v-input" type="number" step="0.1" min="0.1" max="30"
              placeholder="—" value="${eppAtaSpeeds[speedKey]||''}"
              onchange="eppAtaSpeeds['${speedKey}']=this.value;eppAtaLocs['${nextLeg.key}']='';renderEPPPage()">
            <span class="ata-v-unit">kn</span>
          </div>
        </div>
      </td>
    </tr>`;
  });

  // ── Dashboard-Berechnung ─────────────────────────────────────────────────
  const _fmtDT = d => { const p=n=>String(n).padStart(2,'0'); return `${p(d.getDate())}.${p(d.getMonth()+1)}. ${p(d.getHours())}:${p(d.getMinutes())}`; };
  // Passage: Abfahrt = E3 (falls leer → Elbe-Racon), Ankunft = Hamburg
  const _e3Dt = eppAtaLocs['E3']        ? new Date(eppAtaLocs['E3'])        : null;
  const _erDt = eppAtaLocs['ElbeRakon'] ? new Date(eppAtaLocs['ElbeRakon']) : null;
  const _hhDt = eppAtaLocs['Hamburg']   ? new Date(eppAtaLocs['Hamburg'])   : null;
  const _startDt    = (_e3Dt && !isNaN(_e3Dt)) ? _e3Dt : (_erDt && !isNaN(_erDt)) ? _erDt : null;
  const _startLabel = (_e3Dt && !isNaN(_e3Dt)) ? 'E3' : 'Elbe-Racon';
  const _startDist  = (_e3Dt && !isNaN(_e3Dt)) ? 89 : 76;
  let dashStatCells = `<div class="dash-stat-empty">Hamburg und Abfahrtszeit eingeben…</div>`;
  if (_startDt && _hhDt && !isNaN(_hhDt)) {
    const _first = _hhDt < _startDt ? _hhDt : _startDt;
    const _last  = _hhDt < _startDt ? _startDt : _hhDt;
    const _route = _hhDt < _startDt ? `Hamburg → ${_startLabel}` : `${_startLabel} → Hamburg`;
    const _dh  = (_last - _first) / 3600000;
    const _h   = Math.floor(_dh), _m = Math.round((_dh - _h) * 60);
    const _spd = (_startDist / _dh).toFixed(1);
    const _fmtT = d => { const p=n=>String(n).padStart(2,'0'); return `${p(d.getDate())}.${p(d.getMonth()+1)}. ${p(d.getHours())}:${p(d.getMinutes())}`; };
    dashStatCells = `
      <div class="dash-stat">
        <div class="dash-stat-lbl">Route</div>
        <div class="dash-stat-val route">${_route}</div>
      </div>
      <div class="dash-stat">
        <div class="dash-stat-lbl">Abfahrt</div>
        <div class="dash-stat-val">${_fmtT(_first)}</div>
      </div>
      <div class="dash-stat">
        <div class="dash-stat-lbl">Ankunft</div>
        <div class="dash-stat-val">${_fmtT(_last)}</div>
      </div>
      <div class="dash-stat">
        <div class="dash-stat-lbl">Dauer</div>
        <div class="dash-stat-val">${_h}h ${String(_m).padStart(2,'0')}m</div>
      </div>
      <div class="dash-stat">
        <div class="dash-stat-lbl">V&#x0304;</div>
        <div class="dash-stat-val speed">${_spd} kn</div>
      </div>`;
  }
  // Tiefgang vs TjZ
  const _tg  = parseFloat(eppTiefgangSchiff);
  const _tjz = parseFloat(eppTiefgangJederzeit);
  let dashTgStat = '';
  if (!isNaN(_tg) && !isNaN(_tjz)) {
    const _ok = _tg <= _tjz;
    dashTgStat = `<div class="dash-stat">
      <div class="dash-stat-lbl">Tiefgang</div>
      <div class="dash-stat-val ${_ok ? 'tg-ok' : 'tg-warn'}">${_tg.toFixed(1)} m ${_ok ? '≤' : '>'} TjZ ${_tjz.toFixed(1)} m ${_ok ? '✓' : '⚠'}</div>
    </div>`;
  } else if (!isNaN(_tg)) {
    dashTgStat = `<div class="dash-stat">
      <div class="dash-stat-lbl">Tiefgang</div>
      <div class="dash-stat-val">${_tg.toFixed(1)} m</div>
    </div>`;
  }
  // Route mit Gezeiten + Geschwindigkeiten
  const _ataLegsD = [
    {key:'Hamburg',      label:'Hamburg',      distToNext:36},
    {key:'Brunsbuettel', label:'Brunsbüttel',  distToNext:10},
    {key:'Glameyer',     label:'Glameyer',     distToNext:30},
    {key:'ElbeRakon',    label:'Elbe-Racon',   distToNext:13},
    {key:'E3',           label:'E3',           distToNext:null},
  ];
  const _vmax = parseFloat(eppVreise) || parseFloat(eppVmanöver) || null;
  const _pp = n => String(n).padStart(2,'0');

  // Gezeiten (kompakt, für alte Verwendungen)
  const dashTidesHtml = _ataLegsD.map(l => {
    const _dt  = eppAtaLocs[l.key] ? new Date(eppAtaLocs[l.key]) : null;
    const _s   = eppGetTideStatus(_dt, l.key);
    const _tStr = _dt && !isNaN(_dt) ? `${_pp(_dt.getHours())}:${_pp(_dt.getMinutes())}` : '';
    const _badge = _s === 'flut' ? '<span class="ata-tide flut">↑ Flut</span>'
                 : _s === 'ebbe' ? '<span class="ata-tide ebbe">↓ Ebbe</span>'
                 : _s === 'stau' ? '<span class="ata-tide stau">≈ Stau</span>'
                 : '<span class="epp-dash-notide">—</span>';
    return `<span class="epp-dash-wp">
      <span class="epp-dash-wplabel">${l.label}</span>
      ${_tStr ? `<span class="epp-dash-wptime">${_tStr}</span>` : ''}
      ${_badge}
    </span>`;
  }).join('');

  // Route-Visualisierung E3→Hamburg (einkommende Richtung, links→rechts)
  const _routeLegsD = [
    {key:'E3',           label:'E3',           distToNext:13},
    {key:'ElbeRakon',    label:'Elbe-Racon',   distToNext:30},
    {key:'Glameyer',     label:'Glameyer',     distToNext:10},
    {key:'Brunsbuettel', label:'Brunsbüttel',  distToNext:36},
    {key:'Hamburg',      label:'Hamburg',      distToNext:null},
  ];
  const dashRouteHtml = (() => {
    const items = [];
    _routeLegsD.forEach((leg, i) => {
      const dt   = eppAtaLocs[leg.key] ? new Date(eppAtaLocs[leg.key]) : null;
      const tide = eppGetTideStatus(dt, leg.key);
      const tStr = dt && !isNaN(dt) ? `${_pp(dt.getHours())}:${_pp(dt.getMinutes())}` : '';
      const tideBadge = tide==='flut' ? '<span class="ata-tide flut" style="font-size:9px;padding:1px 6px">↑ Flut</span>'
                      : tide==='ebbe' ? '<span class="ata-tide ebbe" style="font-size:9px;padding:1px 6px">↓ Ebbe</span>'
                      : tide==='stau' ? '<span class="ata-tide stau" style="font-size:9px;padding:1px 6px">≈ Stau</span>'
                      : '';
      // Strom an diesem Wegpunkt
      const stromDash = leg.key === 'ElbeRakon'
        ? null
        : (dt && !isNaN(dt) ? getElbeCurrent(dt, leg.key) : null);
      const stromDashManual = eppAtaCurrents[leg.key] ? parseFloat(eppAtaCurrents[leg.key]) : null;
      const stromDashVal = stromDash !== null ? stromDash : null;
      const stromDashKn  = stromDash !== null ? Math.abs(stromDash).toFixed(1)
                         : (stromDashManual ? Math.abs(stromDashManual).toFixed(1) : '');
      const stromDashCls = stromDashVal !== null
        ? (stromDashVal >  0.5 ? 'push' : stromDashVal < -0.5 ? 'brake' : 'stau')
        : (tide === 'flut' ? 'push' : tide === 'ebbe' ? 'brake' : tide === 'stau' ? 'stau' : '');
      const stromDashHtml = stromDashKn
        ? `<div class="dr-wp-strom ${stromDashCls}">≈ ${stromDashKn} kn</div>`
        : '<div class="dr-wp-strom"></div>';
      items.push(`<div class="dr-wp">
        <div class="dr-wp-name">${leg.label}</div>
        ${tStr ? `<div class="dr-wp-time">${tStr}</div>` : '<div class="dr-wp-time dr-wp-time-empty">—</div>'}
        <div class="dr-wp-tide">${tideBadge}</div>
        ${stromDashHtml}
      </div>`);

      if (leg.distToNext != null) {
        const nextLeg = _routeLegsD[i+1];
        const speedKey = leg.key + '-' + nextLeg.key;  // physikalisch: E3-ElbeRakon, etc.
        let sogVal = null;
        // Priorität 1: v_vorgeben
        if (eppAtaSpeeds[speedKey]) {
          sogVal = parseFloat(eppAtaSpeeds[speedKey]);
        }
        // Priorität 2: aus ATA-Zeiten berechnen (einkommend: t_next > t_current)
        else if (dt && !isNaN(dt) && eppAtaLocs[nextLeg.key]) {
          const dtNext = new Date(eppAtaLocs[nextLeg.key]);
          if (!isNaN(dtNext) && dtNext > dt) {
            const hrs = (dtNext - dt) / 3600000;
            if (hrs > 0) sogVal = leg.distToNext / hrs;
          }
        }

        let segClass = 'dr-seg-neutral';
        if (sogVal !== null) {
          if (_vmax && sogVal > _vmax)      segClass = 'dr-seg-warn';
          else if (_vmax && sogVal <= _vmax) segClass = 'dr-seg-ok';
          else                               segClass = 'dr-seg-blue';
        }
        const sogStr = sogVal !== null ? sogVal.toFixed(1)+' kn' : '— kn';
        items.push(`<div class="dr-seg">
          <div class="dr-seg-line"></div>
          <div class="dr-seg-badge ${segClass}">${sogStr}</div>
          <div class="dr-seg-dist">${leg.distToNext} NM</div>
          <div class="dr-seg-arrow">▶</div>
        </div>`);
      }
    });
    return `<div class="dash-route">${items.join('')}</div>`;
  })();
  // Tidekurven im Dashboard: je Station mit Ankunftszeit als Referenz
  const _dashTideStations = [
    { loc:'Cuxhaven',     ataKey:'ElbeRakon',    label:'Elbe-Racon-Tonne' },
    { loc:'Brunsbuettel', ataKey:'Brunsbuettel', label:'Brunsbüttel' },
    { loc:'Hamburg',      ataKey:'Hamburg',      label:'Hamburg' },
  ];
  const _p2 = n => String(n).padStart(2,'0');
  const dashTideCurvesHtml = _dashTideStations.map(st => {
    const _ataDt  = eppAtaLocs[st.ataKey] ? new Date(eppAtaLocs[st.ataKey]) : null;
    const _fallback = eppStichtag ? new Date(eppStichtag) : new Date();
    const _refDt  = (_ataDt && !isNaN(_ataDt)) ? _ataDt : _fallback;
    const _refTs  = _refDt.getTime();
    const _isAta  = _ataDt && !isNaN(_ataDt);
    const _tStr   = `${_p2(_refDt.getHours())}:${_p2(_refDt.getMinutes())}`;
    const _svg    = makeTideCurveSVG(eppTiden[st.loc], _refTs);
    return `<div class="dash-tide-curve-col">
      <div class="dash-tide-curve-label">${st.label}<span class="dash-tide-curve-time${_isAta?'':' muted'}">${_tStr}</span></div>
      ${_svg || '<div class="dash-tide-curve-empty">Keine Tidedaten</div>'}
    </div>`;
  }).join('');
  // ── Strömungsdiagramm Cuxhaven → Hamburg ──────────────────────────────────
  const _stromRoute = [
    {key:'E3',           label:'E3',         nm:0 },
    {key:'ElbeRakon',    label:'Elbe-Racon', nm:13},
    {key:'Glameyer',     label:'Glameyer',   nm:43},
    {key:'Brunsbuettel', label:'Brunsbüttel',nm:53},
    {key:'Hamburg',      label:'Hamburg',    nm:89},
  ];
  const _stromPts = [];
  _stromRoute.forEach(wp => {
    const ataDt = eppAtaLocs[wp.key] ? new Date(eppAtaLocs[wp.key]) : null;
    if (!ataDt || isNaN(ataDt)) return;
    let val;
    if (wp.key === 'ElbeRakon') {
      const ts  = eppGetTideStatus(ataDt, 'ElbeRakon');
      const mag = parseFloat(eppAtaCurrents['ElbeRakon']) || 1.2;
      val = ts === 'flut' ? mag : ts === 'ebbe' ? -mag : ts === 'stau' ? 0 : null;
    } else {
      val = getElbeCurrent(ataDt, wp.key);
    }
    if (val !== null) _stromPts.push({nm: wp.nm, val, label: wp.label});
  });
  let dashCurrentChartHtml = '';
  if (_stromPts.length >= 2) {
    const W=640, H=130, PL=36, PR=12, PT=14, PB=30;
    const cW=W-PL-PR, cH=H-PT-PB;
    const yMax=3.5, zeroY=PT+cH/2;
    const xS = nm => PL + (nm/89)*cW;
    const yS = v  => PT + cH/2 - (v/yMax)*(cH/2);
    // Grid
    let grid='';
    [-3,-2,-1,0,1,2,3].forEach(kn => {
      const y=yS(kn), iz=kn===0;
      grid += `<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="${iz?'#94a3b8':'#e2e8f0'}" stroke-width="${iz?1.5:1}" ${iz?'':'stroke-dasharray="3,3"'}/>`;
      grid += `<text x="${PL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="${iz?'#334155':'#64748b'}" ${iz?'font-weight="600"':''}>${kn>0?'+':''}${kn}</text>`;
    });
    // X labels
    let xlbls='';
    _stromRoute.forEach(wp => {
      const x=xS(wp.nm);
      xlbls += `<line x1="${x}" y1="${PT}" x2="${x}" y2="${H-PB+4}" stroke="#cbd5e1" stroke-width="1"/>`;
      xlbls += `<text x="${x}" y="${H-2}" text-anchor="middle" font-size="9" fill="#64748b">${wp.label}</text>`;
    });
    // Smooth curve (Catmull-Rom → cubic bezier)
    const pts = _stromPts.map(p => ({x:xS(p.nm), y:yS(p.val)}));
    let curveD = `M ${pts[0].x.toFixed(1)} ${pts[0].y.toFixed(1)}`;
    for (let i=0;i<pts.length-1;i++) {
      const p0=pts[Math.max(i-1,0)], p1=pts[i], p2=pts[i+1], p3=pts[Math.min(i+2,pts.length-1)];
      const c1x=(p1.x+(p2.x-p0.x)/6).toFixed(1), c1y=(p1.y+(p2.y-p0.y)/6).toFixed(1);
      const c2x=(p2.x-(p3.x-p1.x)/6).toFixed(1), c2y=(p2.y-(p3.y-p1.y)/6).toFixed(1);
      curveD += ` C ${c1x} ${c1y} ${c2x} ${c2y} ${pts[i+1].x.toFixed(1)} ${pts[i+1].y.toFixed(1)}`;
    }
    const first=pts[0], last=pts[pts.length-1];
    const fillPath = `${curveD} L ${last.x.toFixed(1)} ${zeroY} L ${first.x.toFixed(1)} ${zeroY} Z`;
    // Dots + labels
    let dots='';
    _stromPts.forEach(p => {
      const x=xS(p.nm), y=yS(p.val);
      const col=p.val>0.5?'#16a34a':p.val<-0.5?'#dc2626':'#64748b';
      dots += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4" fill="${col}" stroke="#fff" stroke-width="1.5"/>`;
      const yLbl = p.val>=0 ? y-8 : y+13;
      dots += `<text x="${x.toFixed(1)}" y="${yLbl.toFixed(1)}" text-anchor="middle" font-size="9" font-weight="700" fill="${col}">${p.val>0?'+':''}${p.val.toFixed(1)}</text>`;
    });
    const kn_lbl = `<text x="10" y="${(PT+cH/2+4).toFixed(1)}" text-anchor="middle" font-size="9" fill="#64748b" transform="rotate(-90,10,${(PT+cH/2).toFixed(1)})">kn</text>`;
    dashCurrentChartHtml = `<div class="dash-section">
      <div class="dash-section-hdr">Strömungsverlauf</div>
      <div style="overflow-x:auto">
        <svg width="${W}" height="${H}" style="display:block;background:#fff">
          <defs>
            <clipPath id="ecClipP"><rect x="${PL}" y="${PT}" width="${cW}" height="${cH/2}"/></clipPath>
            <clipPath id="ecClipN"><rect x="${PL}" y="${zeroY}" width="${cW}" height="${cH/2}"/></clipPath>
          </defs>
          ${grid}${xlbls}${kn_lbl}
          <path d="${fillPath}" fill="#bbf7d0" fill-opacity="0.7" stroke="none" clip-path="url(#ecClipP)"/>
          <path d="${fillPath}" fill="#fecaca" fill-opacity="0.7" stroke="none" clip-path="url(#ecClipN)"/>
          <path d="${curveD}" fill="none" stroke="#1d4ed8" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
          ${dots}
        </svg>
      </div>
    </div>`;
  }

  document.getElementById('app-main').innerHTML = `
    <div class="epp-page">

      <!-- Toolbar ─────────────────────────────────────────────────────── -->
      <div class="epp-toolbar">
        <div class="epp-toolbar-left">
          <h2>⚓ Elbe Passage Planning</h2>
          ${eppCurrentId
            ? '<span class="epp-status-badge">Gespeichert</span>'
            : '<span class="epp-status-badge unsaved">Nicht gespeichert</span>'}
        </div>
        <div class="epp-toolbar-right">
          <button class="btn btn-secondary btn-sm" onclick="exportEPPPDF()" title="EPP als PDF drucken">🖨️ PDF</button>
          <button class="btn btn-secondary btn-sm" onclick="openEPPModal()">📁 Öffnen</button>
          <button class="btn btn-secondary btn-sm" onclick="newEPP()">+ Neues EPP</button>
          <button class="btn btn-primary btn-sm" onclick="saveCurrentEPP()">💾 Speichern</button>
        </div>
      </div>

      <!-- ① Schiffsdaten (kompakt) ────────────────────────────────────── -->
      <div class="epp-card ship-card">
        <div class="epp-card-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 17l5-10 4 6 3-4 5 8H3z"/></svg>
          Schiffsdaten
        </div>
        ${(() => {
          const _tg  = parseFloat(eppTiefgangSchiff)  || 0;
          const _tjz = parseFloat(eppTiefgangJederzeit) || 0;
          const _ws  = parseFloat(eppWasserstand)       || 0;
          const _delta = _tjz + _ws - _tg;
          const _hasDelta = eppTiefgangSchiff || eppTiefgangJederzeit || eppWasserstand;
          return `<div class="epp-ship-layout">
          <div class="epp-ship-fields">
            <div class="epp-grid-ship">
              <div class="epp-field">
                <label>Schiffsname</label>
                <input type="text" value="${esc(eppSchiffsname)}" placeholder="z. B. MS Hamburg"
                  onchange="eppSchiffsname=this.value">
              </div>
              <div class="epp-field-narrow">
                <label>Tiefgang (m)</label>
                <input type="number" value="${eppTiefgangSchiff}" placeholder="12.5"
                  step="0.1" min="0" max="25" onchange="eppTiefgangSchiff=this.value;renderEPPPage()">
              </div>
              <div class="epp-field-narrow">
                <label>TjZ (m)</label>
                <input type="number" value="${eppTiefgangJederzeit}" placeholder="10.5"
                  step="0.1" min="0" max="25" onchange="eppTiefgangJederzeit=this.value;renderEPPPage()">
              </div>
            </div>
            <div class="epp-grid-ship2">
              <div class="epp-field">
                <label>ATA Hamburg</label>
                <input type="datetime-local" value="${eppATA}" onchange="eppATA=this.value;eppAtaLocs['Hamburg']=this.value;renderEPPPage()">
              </div>
              <div class="epp-field-narrow">
                <label>Liegeplatz</label>
                <input type="text" value="${esc(eppLiegeplatz)}" placeholder="Terminal"
                  onchange="eppLiegeplatz=this.value">
              </div>
              <div class="epp-field-narrow">
                <label>v<sub>max-m</sub> (kn)</label>
                <input type="number" value="${eppVmanöver}" placeholder="8"
                  step="0.1" min="0" max="30" onchange="eppVmanöver=this.value">
              </div>
              <div class="epp-field-narrow">
                <label>v<sub>max-r</sub> (kn)</label>
                <input type="number" value="${eppVreise}" placeholder="14"
                  step="0.1" min="0" max="30" onchange="eppVreise=this.value">
              </div>
            </div>
          </div>
          <div>
            <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-muted);margin-bottom:6px;">Δ Tiefgangsreserve</div>
            <div class="epp-delta-schema">
              <div class="epp-delta-row">
                <span class="epp-delta-lbl">Tiefgang</span>
                <input class="epp-delta-input" type="number" step="0.1" min="0" max="25" placeholder="—" value="${eppTiefgangSchiff}"
                  onchange="eppTiefgangSchiff=this.value;renderEPPPage()">
              </div>
              <div class="epp-delta-row">
                <span class="epp-delta-lbl">TjZ</span>
                <input class="epp-delta-input" type="number" step="0.1" min="0" max="25" placeholder="—" value="${eppTiefgangJederzeit}"
                  onchange="eppTiefgangJederzeit=this.value;renderEPPPage()">
              </div>
              <div class="epp-delta-row">
                <span class="epp-delta-lbl">Wasserstand</span>
                <input class="epp-delta-input" type="number" step="0.1" min="-5" max="15" placeholder="—" value="${eppWasserstand}"
                  onchange="eppWasserstand=this.value;renderEPPPage()">
              </div>
              <div class="epp-delta-row epp-delta-sum">
                <span class="epp-delta-lbl">Δ</span>
                <span class="epp-delta-val ${_hasDelta ? (_delta >= 0 ? 'pos' : 'neg') : ''}">${_hasDelta ? _delta.toFixed(2)+' m' : '—'}</span>
              </div>
            </div>
          </div>
        </div>`;
        })()}
      </div>

      <!-- ② Gezeitenvorhersage ─────────────────────────────────────────── -->
      <div class="epp-card">
        <div class="epp-card-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12c2-4 6-4 8 0s6 4 8 0"/><path d="M2 17c2-4 6-4 8 0s6 4 8 0" opacity=".4"/></svg>
          Gezeitenvorhersage
        </div>
        ${(tideDbs.Cuxhaven.length || tideDbs.Brunsbuettel.length || tideDbs.Hamburg.length) ? `
        <div class="epp-stichtag-row">
          <label class="epp-stichtag-label">Stichtag:</label>
          <input type="datetime-local" class="epp-stichtag-input" value="${eppStichtag}"
            onchange="eppStichtag=this.value;autoFillTidesFromDb()">
          <button class="btn-stichtag-now" onclick="setStichtagNow()" title="Aktuelle Zeit verwenden">Jetzt</button>
          <button class="btn-stichtag-clear" onclick="eppStichtag='';autoFillTidesFromDb()" title="Stichtag löschen">×</button>
        </div>` : ''}
        <div class="epp-tide-grid">${tideCols}</div>
      </div>

      <!-- ③ ETA-Wegpunkte ──────────────────────────────────────────────── -->
      <div class="epp-card">
        <div class="epp-card-title" style="display:flex;align-items:center;justify-content:space-between;">
          <span style="display:flex;align-items:center;gap:6px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ETA-Wegpunkte
          </span>
          <button onclick="eppAtaLocs={E3:'',ElbeRakon:'',Glameyer:'',Brunsbuettel:'',Hamburg:''};eppAtaSpeeds={};eppAtaCurrents={};eppATA='';renderEPPPage()" title="Alle ETA-Werte zurücksetzen" style="background:#fee2e2;border:1.5px solid #fca5a5;color:#991b1b;border-radius:var(--r-sm);padding:2px 8px;font-size:12px;font-weight:700;cursor:pointer;line-height:1;">✕ Alles löschen</button>
        </div>
        <table class="epp-ata-table">
          <colgroup>
            <col style="width:115px">
            <col style="width:220px">
            <col>
            <col style="width:90px">
            <col style="width:110px">

function eppSetFrom(val) {
  eppFrom = val;
  // ensure 'to' is always after 'from'
  const wps    = eppWaypoints();
  const fromIdx = wps.findIndex(w => w.id === val);
  const toIdx   = wps.findIndex(w => w.id === eppTo);
  if (toIdx <= fromIdx) eppTo = wps[Math.min(fromIdx + 1, wps.length - 1)].id;
  eppResult = null;
  renderEPPPage();
}

function eppSetTo(val) {
  eppTo = val;
  const wps    = eppWaypoints();
  const fromIdx = wps.findIndex(w => w.id === eppFrom);
  const toIdx   = wps.findIndex(w => w.id === val);
  if (fromIdx >= toIdx) eppFrom = wps[Math.max(toIdx - 1, 0)].id;
  eppResult = null;
  renderEPPPage();
}

// ── Gezeiten-Status an einem Wegpunkt zur gegebenen ATA-Zeit ──────────────
// Rückgabe: 'flut' | 'ebbe' | 'stau' | null (keine Daten)
function eppGetTideStatus(ataDt, waypointKey) {
  if (!ataDt || isNaN(ataDt)) return null;

  const STAU_MS   = 15 * 60 * 1000;   // ±15 min Stauwasser-Toleranz
  const atMs      = ataDt.getTime();
  let   events    = [];                // { t: Date, afterState: 'flut'|'ebbe' }

  const addEvents = (tideLoc, offsetMs, hwAfter, nwAfter) => {
    const entries = eppTiden[tideLoc] || [];
    entries.forEach(e => {
      if (!e.dt) return;
      const t = new Date(new Date(e.dt).getTime() + offsetMs);
      if (!isNaN(t)) events.push({ t, afterState: e.type === 'HW' ? hwAfter : nwAfter });
    });
  };

  if (waypointKey === 'E3' || waypointKey === 'ElbeRakon') {
    // Vor HW Cuxhaven → Flut, nach HW → Ebbe; vor NW → Ebbe, nach NW → Flut
    addEvents('Cuxhaven', 0, 'ebbe', 'flut');

  } else if (waypointKey === 'Glameyer') {
    // Interpoliert: Cuxhaven + 30 min
    addEvents('Cuxhaven', 30 * 60 * 1000, 'ebbe', 'flut');

  } else if (waypointKey === 'Brunsbuettel') {
    // Flut läuft BIS (HW_Bru + 1h) → danach Ebbe
    // Ebbe läuft BIS (NW_Bru + 1h) → danach Flut
    addEvents('Brunsbuettel', 60 * 60 * 1000, 'ebbe', 'flut');

  } else if (waypointKey === 'Hamburg') {
    // Flut BIS HW Hamburg → danach Ebbe
    // Ebbe BIS NW Hamburg → danach Flut
    addEvents('Hamburg', 0, 'ebbe', 'flut');
  }

  if (events.length === 0) return null;
  events.sort((a, b) => a.t - b.t);

  // Stauwasser: ATA liegt innerhalb der Toleranz um ein Umkehrereignis
  for (const ev of events) {
    if (Math.abs(ev.t.getTime() - atMs) <= STAU_MS) return 'stau';
  }

  // Letztes Ereignis vor der ATA → bestimmt den aktuellen Status
  let last = null;
  for (const ev of events) {
    if (ev.t.getTime() <= atMs) last = ev;
  }
  if (last) return last.afterState;
  // ATA liegt vor dem ersten bekannten Ereignis → Zustand aus erstem Ereignis ableiten
  // Erstes Ereignis ist HW → davor war Flut; erstes ist NW → davor war Ebbe
  const first = events[0];
  return first.afterState === 'ebbe' ? 'flut' : 'ebbe';
}

// ── Geo-Utilities ─────────────────────────────────────────────────
function _hvNm(la1, lo1, la2, lo2) {
  const R = 3440.065, r = Math.PI / 180;
  const dLa = (la2-la1)*r, dLo = (lo2-lo1)*r;
  const a = Math.sin(dLa/2)**2 + Math.cos(la1*r)*Math.cos(la2*r)*Math.sin(dLo/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function _brgDeg(la1, lo1, la2, lo2) {
  const r = Math.PI/180, dL = (lo2-lo1)*r;
  const y = Math.sin(dL)*Math.cos(la2*r);
  const x = Math.cos(la1*r)*Math.sin(la2*r) - Math.sin(la1*r)*Math.cos(la2*r)*Math.cos(dL);
  return (Math.atan2(y,x)*180/Math.PI + 360) % 360;
}

const ELBE_TONNEN = [
  { tn:  1, wpIdx:  2 }, { tn:  5, wpIdx:  3 }, { tn: 19, wpIdx:  4 },

// Nächste Tonne zu einer trackNm-Position
// Einkommend (in): grüne Steuerbord-Tonne (ungerade), Ausgehend (out): rote Backbord-Tonne (gerade = tn+1)
function _nearestTonne(trackNm, dir) {
  if (!trackNm && trackNm !== 0) return null;
  let best = null, bestDist = Infinity;
  for (const t of ELBE_TONNEN) {
    const d = Math.abs(t.trackNm - trackNm);
    if (d < bestDist) { bestDist = d; best = t; }

  if (!best) return null;
  if (dir === 'out') return { label: `Tn.${best.tn + 1}`, css: '#dc2626' }; // rot
  if (dir === 'in')  return { label: `Tn.${best.tn}`,     css: '#16a34a' }; // grün
  return null; // Unbekannte Richtung → Stromkilometer anzeigen
}

// Stromkilometer ↔ Tracklänge (piecewise linear über Referenzpunkte)
const _KM_REFS = () => [
  [_etCum[ELBE_WP_IDX.racon],            755],   // südlich Tn.Elbe ≈ Racon (km 755)
  [_etCum[ELBE_WP_IDX.cuxhaven],         726],   // Cuxhaven (km 726)
  [_etCum[ELBE_WP_IDX.brunsbuettel],     695],   // Brunsbüttel (km 695)
  [_etCum[ELBE_WP_IDX.hamburg],          620],   // Hamburg (km 620)
];
function _elbKm(nm) {
  const refs = _KM_REFS();
  for (let i = 0; i < refs.length-1; i++) {
    const [n1,k1]=refs[i], [n2,k2]=refs[i+1];
    if (nm <= n2) return k1 + (nm-n1)/(n2-n1)*(k2-k1);
  }
  return 620;
}
function _elbKmToNm(km) {
  const refs = _KM_REFS();
  for (let i = 0; i < refs.length-1; i++) {
    const [n1,k1]=refs[i], [n2,k2]=refs[i+1];
    if (km <= k1 && km >= k2) return n1 + (k1-km)/(k1-k2)*(n2-n1);
  }
  return km > 755 ? 0 : _etCum[ELBE_WP_IDX.hamburg];
}

// Projiziert (lat,lon) auf die Elbe-Mittellinie
// Gibt { trackNm, distNm } zurück:
//   trackNm  = kum. Seemeilen von Racon bis Lotfußpunkt
//   distNm   = senkrechter Abstand zur Mittellinie in Seemeilen
function _elbeProject(lat, lon) {
  let bestDist = Infinity, bestCum = 0;
  for (let i = 0; i < ELBE_TRACK.length-1; i++) {
    const A = ELBE_TRACK[i], B = ELBE_TRACK[i+1];
    const dx = B.lon-A.lon, dy = B.lat-A.lat, len2 = dx*dx+dy*dy;
    const t  = len2 > 0 ? Math.max(0, Math.min(1, ((lon-A.lon)*dx+(lat-A.lat)*dy)/len2)) : 0;
    const pLon = A.lon+t*dx, pLat = A.lat+t*dy;
    const d = _hvNm(lat, lon, pLat, pLon);
    if (d < bestDist) { bestDist = d; bestCum = _etCum[i] + _hvNm(A.lat,A.lon,pLat,pLon); }
  }
  return { trackNm: bestCum, distNm: bestDist };
}
// Rückwärtskompatibel: gibt nur trackNm zurück
function _elbeNm(lat, lon) { return _elbeProject(lat, lon).trackNm; }

// Fahrtrichtung aus Position + COG
function _elbeDir(lat, lon, cog, sog, navStatus) {
  // Ankern, Vertäut, Aufgelaufen → stationary
  if (navStatus === 1 || navStatus === 5 || navStatus === 6) return 'stationary';
  // Sehr niedrige Fahrt → stationary, AUSSER Schlepper (navStatus 3 = eingeschr. Manövr.)
  // die auch bei SOG < 0.3 noch eine Richtung per COG melden
  if (sog < 0.3 && navStatus !== 3) return 'stationary';
  let best = Infinity, bestBrg = 90;
  for (let i = 0; i < ELBE_TRACK.length-1; i++) {
    const A = ELBE_TRACK[i], B = ELBE_TRACK[i+1];
    const mid = { lat:(A.lat+B.lat)/2, lon:(A.lon+B.lon)/2 };
    const d = _hvNm(lat, lon, mid.lat, mid.lon);
    if (d < best) { best = d; bestBrg = _brgDeg(A.lat,A.lon,B.lat,B.lon); }
  }
  return Math.abs(((cog - bestBrg + 180) % 360) - 180) <= 90 ? 'in' : 'out';
}

function _etaStr(distNm, sog) {
  if (distNm <= 0 || sog < 0.3) return '—';
  const eta = new Date(Date.now() + (distNm/sog)*3600000);
  const pad = n => String(n).padStart(2,'0');
  const today = new Date();
  const days = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  const hm = `${pad(eta.getHours())}:${pad(eta.getMinutes())}`;
  return (eta.toDateString() === today.toDateString()) ? hm : `${days[eta.getDay()]} ${hm}`;
}

function aisConnect() {
  const proxyUrl = _aisProxyUrl();
  if (!proxyUrl) { _aisShowSetup(); return; }
  if (_aisWs && (_aisWs.readyState === 0 || _aisWs.readyState === 1)) return;
  _aisStatus = 'connecting';
  _aisUpdateBadge();
  // Verbindung über Cloudflare Worker Proxy (aisstream.io blockiert Browser direkt)
  const wsUrl = proxyUrl.replace(/^https?:\/\//, m => m === 'https://' ? 'wss://' : 'ws://');
  _aisWs = new WebSocket(wsUrl.startsWith('ws') ? wsUrl : 'wss://' + wsUrl);
  _aisWs.onopen  = () => { _aisStatus = 'live'; _aisUpdateBadge(); };
  _aisWs.onmessage = e => {
    if (e.data instanceof Blob) {
      e.data.text().then(t => { try { _aisMsgIn(JSON.parse(t)); } catch {} });
    } else {
      try { _aisMsgIn(JSON.parse(e.data)); } catch {}
    }
  };
  _aisWs.onerror   = ()  => { _aisStatus = 'error'; _aisUpdateBadge(); };
  _aisWs.onclose   = ()  => { if (_aisStatus !== 'off') { _aisStatus = 'error'; _aisUpdateBadge(); } };

function _aisSaveAndConnect() {
  const input = document.getElementById('ais-proxy-input');
  const url = (input?.value || '').trim();
  if (!url) {
    const err = document.getElementById('ais-setup-err');
    if (err) { err.textContent = 'Bitte Worker-URL eingeben.'; err.style.display = 'block'; }
    return;
  }
  _aisSaveProxy(url);
  aisDisconnect();
  _aisShips.clear();
  const container = document.getElementById('ais-table-container');
  if (container) container.innerHTML = '<div class="ais-empty">Verbinde…</div>';
  aisConnect();
}

function aisDisconnect() {
  _aisStatus = 'off';
  if (_aisWs)          { _aisWs.close(); _aisWs = null; }
  if (_aisRenderTimer) { clearInterval(_aisRenderTimer); _aisRenderTimer = null; }
}

function _aisMsgIn(msg) {
  const meta = msg.MetaData || {};
  const mmsi = meta.MMSI; if (!mmsi) return;
  let s = _aisShips.get(mmsi) || { mmsi, name:'', lat:null, lon:null, sog:0, cog:0, navStatus:15, shipType:0, length:0, draught:0, destination:'', lastUpdate:null, dir:'unknown', trackNm:0 };

  if (msg.MessageType === 'PositionReport' || msg.MessageType === 'ExtendedClassBPositionReport') {
    const pr = msg.Message?.PositionReport || msg.Message?.ExtendedClassBPositionReport;
    if (pr) {
      if (meta.ShipName && !s.name) s.name = meta.ShipName.trim();
      s.lat = pr.Latitude  ?? meta.latitude  ?? s.lat;
      s.lon = pr.Longitude ?? meta.longitude ?? s.lon;
      s.sog = pr.Sog ?? 0;  s.cog = pr.Cog ?? 0;
      s.navStatus = pr.NavigationalStatus ?? s.navStatus;
    }
  } else if (msg.MessageType === 'ShipStaticData') {
    const sv = msg.Message?.ShipStaticData;
    if (sv) {
      const n = (sv.Name || meta.ShipName || '').trim();
      if (n) s.name = n;
      s.shipType   = sv.Type    ?? s.shipType;
      if (sv.MaximumStaticDraught > 0) s.draught = sv.MaximumStaticDraught;
      const newLen = (sv.Dimension?.A ?? 0) + (sv.Dimension?.B ?? 0);
      if (newLen > 0) s.length = newLen;
      const dest = (sv.Destination ?? '').trim().replace(/[^\x20-\x7E]/g,'').replace(/\s+/g,' ');
      if (dest) s.destination = dest;
    }
  }
  if (!s.name && meta.ShipName) s.name = meta.ShipName.trim();
  s.lastUpdate = new Date();
  if (s.lat !== null && s.lon !== null) {
    s.dir     = _elbeDir(s.lat, s.lon, s.cog, s.sog, s.navStatus);
    const proj = _elbeProject(s.lat, s.lon);
    s.trackNm    = proj.trackNm;
    s.elbeDistNm = proj.distNm;
    // Zonen-Klassifizierung wird beim Rendern gesetzt (abhängig von fahrwasserNm-Einstellung)
  }
  _aisShips.set(mmsi, s);
  // Quick-render nur solange noch kein erster Ladevorgang abgeschlossen — danach nur 30s-Timer
  if (!_aisInitialLoaded && !_aisRenderPending) {
    _aisRenderPending = true;
    setTimeout(() => { _aisRenderPending = false; _aisRenderTable(); }, 800);
  }
}

function _aisUpdateBadge() {
  const el = document.getElementById('ais-status-badge'); if (!el) return;
  const m = { connecting:['⟳ Verbinden…','ais-conn-connecting'], live:['● Live','ais-conn-live'], error:['✕ Fehler – neu verbinden','ais-conn-error'], off:['',''] };
  const [t,c] = m[_aisStatus] || ['',''];
  el.textContent = t; el.className = `ais-conn-status ${c}`;
}

// ── Filter & Sort ─────────────────────────────────────────────────
function _aisEtaMs(s, wpKey) {
  const wpNm = wpKey === 'custom'
    ? (_aisCustomKm !== null ? _elbKmToNm(_aisCustomKm) : null)
    : _etCum[ELBE_WP_IDX[wpKey]];
  if (wpNm === null) return Infinity;
  const rem  = s.dir === 'in' ? wpNm - s.trackNm : s.trackNm - wpNm;
  if (rem < -2) return -1;             // passiert → ganz vorne
  if (s.sog < 0.3) return Infinity;   // steht → ganz hinten
  return rem / s.sog * 3600000;
}
// ── Filter-Persistenz ─────────────────────────────────────────────
const _AIS_FILTER_KEY = 'ais_filter_v2';
function _aisSaveFilters() {
  try {
    localStorage.setItem(_AIS_FILTER_KEY, JSON.stringify({
      shownTypes:    [..._aisFilter.shownTypes],
      minLen:        _aisFilter.minLen,
      minSog:        _aisFilter.minSog,
      maxAge:        _aisFilter.maxAge,
      maxElbeDist:   _aisFilter.maxElbeDist,
      fahrwasserNm:  _aisFilter.fahrwasserNm,
      zoneFilter:    _aisFilter.zoneFilter,
      hideAnc:       _aisFilter.hideAnc,
      sortIn:        _aisFilter.sortIn,
      sortOut:       _aisFilter.sortOut,
      kmFrom:        _aisFilter.kmFrom,
      kmTo:          _aisFilter.kmTo,
      customKm:      _aisCustomKm,
      collapsed:     _aisCollapsed,
    }));
  } catch {}
}
function _aisLoadFilters() {
  try {
    const raw = localStorage.getItem(_AIS_FILTER_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    _aisFilter = {
      shownTypes:   new Set(d.shownTypes  || []),
      minLen:       d.minLen       ?? 0,
      minSog:       d.minSog       ?? 0,
      maxAge:       d.maxAge       ?? 30,
      maxElbeDist:  d.maxElbeDist  ?? 6,
      fahrwasserNm: d.fahrwasserNm ?? 0.5,
      zoneFilter:   d.zoneFilter   ?? 'all',
      hideAnc:      d.hideAnc      ?? false,
      sortIn:       d.sortIn       ?? null,
      sortOut:      d.sortOut      ?? null,
      kmFrom:       d.kmFrom       ?? null,
      kmTo:         d.kmTo         ?? null,
    };
    _aisCustomKm  = d.customKm  ?? null;
    _aisCollapsed = d.collapsed ?? { in: false, out: false };
  } catch {}
}
function _aisResetAllFilters() {
  _aisFilter = { shownTypes: new Set(), minLen: 0, minSog: 0, maxAge: 30, maxElbeDist: 6, fahrwasserNm: 0.25, zoneFilter: 'all', hideAnc: false, sortIn: null, sortOut: null, kmFrom: null, kmTo: null };
  _aisCustomKm = null;
  _aisCollapsed = { in: false, out: false };
  _aisSaveFilters(); _aisRenderTable();
}

function _aisFToggle(type) {
  if (_aisFilter.shownTypes.has(type)) _aisFilter.shownTypes.delete(type);
  else _aisFilter.shownTypes.add(type);
  _aisSaveFilters(); _aisRenderTable();
}
function _aisSetMinLen(v) {
  _aisFilter.minLen = parseInt(v) || 0;
  _aisSaveFilters(); _aisRenderTable();
}
function _aisSetMinSog(v) {
  _aisFilter.minSog = parseFloat(v) || 0;
  _aisSaveFilters(); _aisRenderTable();
}
function _aisToggleAnc() {
  _aisFilter.hideAnc = !_aisFilter.hideAnc;
  _aisSaveFilters(); _aisRenderTable();
}
function _aisSetCustomKm(v) {
  const n = parseInt(v);
  _aisCustomKm = (!v || isNaN(n)) ? null : Math.max(620, Math.min(760, n));
  _aisSaveFilters(); _aisRenderTable();
}
function _aisSortIn(key)  { _aisFilter.sortIn  = _aisFilter.sortIn  === key ? null : key; _aisSaveFilters(); _aisRenderTable(); }
function _aisSortOut(key) { _aisFilter.sortOut = _aisFilter.sortOut === key ? null : key; _aisSaveFilters(); _aisRenderTable(); }
function _aisToggleSection(key) { _aisCollapsed[key] = !_aisCollapsed[key]; _aisSaveFilters(); _aisRenderTable(); }
function _aisSetMaxAge(v)        { _aisFilter.maxAge        = parseInt(v)   || 0;   _aisSaveFilters(); _aisRenderTable(); }
function _aisSetMaxElbeDist(v)   { _aisFilter.maxElbeDist   = parseFloat(v) || 0;   _aisSaveFilters(); _aisRenderTable(); }
function _aisSetFahrwasserNm(v)  { _aisFilter.fahrwasserNm  = parseFloat(v) || 0.5; _aisSaveFilters(); _aisRenderTable(); }
function _aisSetZoneFilter(v)    { _aisFilter.zoneFilter    = v;                     _aisSaveFilters(); _aisRenderTable(); }
function _aisSetKmFrom(v) { _aisFilter.kmFrom = (v === '' || v === null) ? null : parseFloat(v); _aisSaveFilters(); _aisRenderTable(); }
function _aisSetKmTo(v)   { _aisFilter.kmTo   = (v === '' || v === null) ? null : parseFloat(v); _aisSaveFilters(); _aisRenderTable(); }
function _aisResetRange() { _aisFilter.kmFrom = null; _aisFilter.kmTo = null; _aisSaveFilters(); _aisRenderTable(); }

// ── Tabellen-Rendering ────────────────────────────────────────────
function _aisRenderTable() {
  const container = document.getElementById('ais-table-container');
  if (!container) { aisDisconnect(); return; }   // Seite verlassen
  if (!_aisProxyUrl()) { _aisShowSetup(); return; }  // kein Proxy → Setup anzeigen

  const now    = Date.now();

  // Alle Typen die aktuell vorkommen (für Filter-Bar)
  const allTypes = ['Frachter','Tanker','Fahrgast','Yacht','Schlepper','Fischer','Dienst','Sonstige','—'];

  // Zone bestimmen (Fahrwasser / Reede)
  function shipZone(s) {
    if (s.elbeDistNm == null) return 'reede';
    // SOG-Heuristik: fahrende Schiffe können nicht auf Reede liegen
    if (s.sog != null && s.sog > 3) return 'fahrwasser';
    return s.elbeDistNm <= _aisFilter.fahrwasserNm ? 'fahrwasser' : 'reede';
  }

  // Filter anwenden
  function applyFilter(list) {
    return list.filter(s => {
      const tL = _aisShipType(s.shipType).l;
      if (_aisFilter.shownTypes.size > 0 && !_aisFilter.shownTypes.has(tL)) return false;
      if (_aisFilter.minLen > 0 && s.length < _aisFilter.minLen) return false;
      if (_aisFilter.minSog > 0 && s.sog < _aisFilter.minSog) return false;
      if (_aisFilter.maxAge > 0 && s.lastUpdate) {
        const ageMin = (now - s.lastUpdate.getTime()) / 60000;
        if (ageMin > _aisFilter.maxAge) return false;
      }
      if (_aisFilter.maxElbeDist > 0 && s.elbeDistNm != null && s.elbeDistNm > _aisFilter.maxElbeDist) return false;
      if (_aisFilter.zoneFilter !== 'all' && shipZone(s) !== _aisFilter.zoneFilter) return false;
      if (_aisFilter.kmFrom !== null || _aisFilter.kmTo !== null) {
        const km = _elbKm(s.trackNm);
        const lo = _aisFilter.kmTo   !== null ? _aisFilter.kmTo   : 620;
        const hi = _aisFilter.kmFrom !== null ? _aisFilter.kmFrom : 755;
        if (km < lo || km > hi) return false;
      }
      return true;
    });
  }

  const ships   = [..._aisShips.values()].filter(s => s.lat !== null && s.lon !== null);
  // Erst als geladen markieren wenn echte Positionsdaten vorhanden
  if (ships.length > 0) _aisInitialLoaded = true;
  const inRaw   = ships.filter(s => s.dir === 'in');
  const outRaw  = ships.filter(s => s.dir === 'out');
  const ancList = _aisFilter.hideAnc ? [] : applyFilter(ships.filter(s => s.dir === 'stationary'));

  // Sortierung einkommend
  let inList = applyFilter(inRaw);
  if (_aisFilter.sortIn === 'position') {
    inList.sort((a,b) => b.trackNm - a.trackNm);   // Hamburg-nah zuerst
  } else if (_aisFilter.sortIn) {
    inList.sort((a,b) => _aisEtaMs(a, _aisFilter.sortIn) - _aisEtaMs(b, _aisFilter.sortIn));
  } else {
    inList.sort((a,b) => a.trackNm - b.trackNm);   // Racon-nah zuerst (Standard)
  }

  // Sortierung ausgehend
  let outList = applyFilter(outRaw);
  if (_aisFilter.sortOut === 'position') {
    outList.sort((a,b) => a.trackNm - b.trackNm);  // Racon-nah zuerst (am weitesten vorn)
  } else if (_aisFilter.sortOut) {
    outList.sort((a,b) => _aisEtaMs(a, _aisFilter.sortOut) - _aisEtaMs(b, _aisFilter.sortOut));
  } else {
    outList.sort((a,b) => b.trackNm - a.trackNm);  // Hamburg-nah zuerst (Standard)
  }

  function wpEtaCells(s, wps) {
    return wps.map(([k, lbl]) => {
      const wpNm = _etCum[ELBE_WP_IDX[k]];
      const rem  = s.dir === 'in' ? wpNm - s.trackNm : s.trackNm - wpNm;
      if (rem < -2)  return `<td class="ais-eta" title="${lbl}" style="color:#16a34a">✓</td>`;
      if (rem < 0.5) return `<td class="ais-eta soon" title="${lbl}">~jetzt</td>`;
      const str = _etaStr(rem, s.sog);
      return `<td class="ais-eta${rem < 3 ? ' soon' : ''}" title="${lbl}">${str}</td>`;
    }).join('');
  }

  function posLabel(trackNm) {
    const km = _elbKm(trackNm);
    let best = null, bestD = 4;
    for (const m of ELBE_KM_MARKS) {
      const d = Math.abs(m.km - km);
      if (d < bestD) { bestD = d; best = m; }
    }
    const kmStr = `<span style="color:var(--text-muted);font-size:10px"> km ${Math.round(km)}</span>`;
    return best ? `${best.n}${kmStr}` : kmStr;
  }

  function customEtaCell(s) {
    if (_aisCustomKm === null) return '<td class="ais-eta">—</td>';
    const wpNm = _elbKmToNm(_aisCustomKm);
    const rem  = s.dir === 'in' ? wpNm - s.trackNm : s.trackNm - wpNm;
    if (rem < -2)  return `<td class="ais-eta" style="color:#16a34a">✓</td>`;
    if (rem < 0.5) return `<td class="ais-eta soon">~jetzt</td>`;
    const str = _etaStr(rem, s.sog);
    return `<td class="ais-eta${rem < 3 ? ' soon' : ''}">${str}</td>`;
  }

  const customDdOpts = `<option value="">— Ort —</option>` +
    ELBE_KM_MARKS.map(m => `<option value="${m.km}"${_aisCustomKm===m.km?' selected':''}>${m.n} (km ${m.km})</option>`).join('');
  const customThInput = `<select onchange="_aisSetCustomKm(this.value)" onclick="event.stopPropagation()"
    style="font-size:10px;padding:1px 4px;border:1px solid var(--border);border-radius:3px;background:var(--bg);color:var(--text);font-family:inherit;max-width:130px">${customDdOpts}</select>`;

  function shipRow(s, wps) {
    const { l: tL, e: tE } = _aisShipType(s.shipType);
    const age = s.lastUpdate ? Math.round((now - s.lastUpdate.getTime())/60000) : 99;
    const dotColor = age < 5 ? '#22c55e' : age < 15 ? '#f59e0b' : '#ef4444';
    const dot = age < 3
      ? '<span class="ais-status-dot"></span>'
      : `<span style="color:${dotColor};font-size:10px;font-weight:600" title="Signal vor ${age} min">${age}m&nbsp;</span>`;
    const dest = s.destination ? `<span style="font-size:10px;color:var(--text-muted)"> → ${s.destination.substring(0,14)}</span>` : '';
    const len  = s.length  > 0 ? `${s.length}m`              : '—';
    const drg  = s.draught > 0 ? `${s.draught.toFixed(1)}m`  : '—';
    const sog  = s.sog     > 0 ? `${s.sog.toFixed(1)} kn`    : '—';
    const zone = shipZone(s);
    const zoneBadge = zone === 'fahrwasser'
      ? `<span style="font-size:9px;padding:1px 4px;border-radius:3px;background:#dbeafe;color:#1d4ed8;font-weight:700;white-space:nowrap">⛵ FW</span>`
      : `<span style="font-size:9px;padding:1px 4px;border-radius:3px;background:#f0fdf4;color:#15803d;font-weight:700;white-space:nowrap">⚓ Reede</span>`;
    const tonneBadge = (() => {
      const t = _nearestTonne(s.trackNm, s.dir);
      if (t) return `<br><span style="font-size:10px;font-weight:700;color:${t.css}">${t.label}</span>`;
      // Fallback: Stromkilometer wenn keine Tonne zuordenbar
      return '';
    })();
    return `<tr>
      <td><div class="ais-ship-name">${dot}${tE} ${s.name || s.mmsi}</div><div>${dest}<span class="ais-type-badge">${tL}</span> ${zoneBadge}</div></td>
      <td style="font-size:11px;white-space:nowrap">${len}<br><span style="color:var(--text-muted)">${drg}</span></td>
      <td class="ais-pos">${posLabel(s.trackNm)}${tonneBadge}</td>
      <td class="ais-sog">${sog}</td>
      ${wpEtaCells(s, wps)}
      ${customEtaCell(s)}
    </tr>`;
  }

  const inWps  = [['cuxhaven','Cuxhaven'],['brunsbuettel','Brunsbüttel'],['hamburg','Hamburg']];
  const outWps = [['brunsbuettel','Brunsbüttel'],['cuxhaven','Cuxhaven'],['racon','Elbe-Racon']];

  // ── Filter-Bar ──
  const anyTypeSelected = _aisFilter.shownTypes.size > 0;
  const typeBtns = allTypes.map(t => {
    // Einschluss-Logik: gewählt = aktiv (hervorgehoben), nicht gewählt = gedimmt wenn mind. einer aktiv
    const active = _aisFilter.shownTypes.has(t);
    const dimmed = anyTypeSelected && !active;
    const cls = active ? ' active' : (dimmed ? ' off' : '');
    return `<button class="ais-type-btn${cls}" onclick="_aisFToggle('${t}')">${t}</button>`;
  }).join('');
  const ancOff = _aisFilter.hideAnc ? ' off' : '';
  const lenVal = _aisFilter.minLen > 0 ? _aisFilter.minLen : '';
  const sogVal = _aisFilter.minSog > 0 ? _aisFilter.minSog : '';

  // Bereichs-Filter Dropdowns
  const kmFromSel = _aisFilter.kmFrom;
  const kmToSel   = _aisFilter.kmTo;
  const rangeActive = kmFromSel !== null || kmToSel !== null;
  // Von-Dropdown: absteigend (Racon oben, Hamburg unten)
  const rangeFromOpts = `<option value="">Von …</option>` +
    ELBE_KM_MARKS.slice().reverse().map(m =>
      `<option value="${m.km}"${kmFromSel===m.km?' selected':''}>${m.n} (km ${m.km})</option>`
    ).join('');
  // Bis-Dropdown: aufsteigend nach km-Wert (Hamburg oben, Racon unten)
  const rangeToOpts = `<option value="">… bis</option>` +
    ELBE_KM_MARKS.map(m =>
      `<option value="${m.km}"${kmToSel===m.km?' selected':''}>${m.n} (km ${m.km})</option>`
    ).join('');
  const rangeClearBtn = rangeActive
    ? `<button onclick="_aisResetRange()" style="font-size:10px;padding:1px 7px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--bg);cursor:pointer;color:var(--danger);font-family:inherit">✕</button>`
    : '';
  const rangeLabel = rangeActive
    ? `<span style="font-size:10px;color:var(--blue);font-weight:600;white-space:nowrap">km ${kmFromSel??755} – ${kmToSel??620}</span>`
    : '';
  const selStyle = (active) => `font-size:11px;padding:2px 4px;border:1.5px solid ${active?'var(--blue)':'var(--border)'};border-radius:var(--r-sm);background:var(--bg);color:var(--text);font-family:inherit;max-width:148px`;

  let html = `<div class="ais-filter-bar">

      const siC = _aisFilter.sortIn==='cuxhaven'     ? ' sort-active' : '';
      const siB = _aisFilter.sortIn==='brunsbuettel' ? ' sort-active' : '';
      const siH = _aisFilter.sortIn==='hamburg'      ? ' sort-active' : '';
      const siX = _aisFilter.sortIn==='custom'       ? ' sort-active' : '';
      html += `<table class="ais-table"><thead><tr>
        <th>Schiff</th><th>L / Tg</th>
        <th class="sortable${siP}" onclick="_aisSortIn('position')" title="Nach Position sortieren (HH-nah zuerst)">Position${siP?' ▼':' ⇅'}</th>
        <th>SOG</th>
        <th class="sortable${siC}" onclick="_aisSortIn('cuxhaven')">ETA Cux${siC?' ▲':' ⇅'}</th>
        <th class="sortable${siB}" onclick="_aisSortIn('brunsbuettel')">ETA Brb${siB?' ▲':' ⇅'}</th>
        <th class="sortable${siH}" onclick="_aisSortIn('hamburg')">ETA HH${siH?' ▲':' ⇅'}</th>
        <th class="sortable${siX}" onclick="_aisSortIn('custom')" style="white-space:nowrap">ETA${siX?' ▲':' ⇅'} ${customThInput}</th>

  html += '</div>';

  // ── Ausgehend ──
  const outCollapsed = _aisCollapsed.out;
  html += `<div class="ais-section">
    <div class="ais-section-title" onclick="_aisToggleSection('out')" style="cursor:pointer;user-select:none">
      <span style="color:#2a6495;font-size:14px">${outCollapsed?'◀':'▼'}</span>

      <span style="font-size:11px;color:var(--text-muted);font-weight:400;margin-left:6px">${outCollapsed?'(eingeklappt)':''}</span>
    </div>`;

    if (!outList.length) {
      html += `<div class="ais-empty">Keine ausgehenden Schiffe erkannt<br><small>Hamburg → Brunsbüttel → Cuxhaven → Elbe-Racon</small></div>`;

      const soP = _aisFilter.sortOut==='position'     ? ' sort-active' : '';
      const soB = _aisFilter.sortOut==='brunsbuettel' ? ' sort-active' : '';

      html += `<table class="ais-table"><thead><tr>

        <th class="sortable${soP}" onclick="_aisSortOut('position')" title="Nach Position sortieren (Racon-nah zuerst)">Position${soP?' ▼':' ⇅'}</th>

        <th class="sortable${soC}" onclick="_aisSortOut('cuxhaven')">ETA Cux${soC?' ▲':' ⇅'}</th>
        <th class="sortable${soR}" onclick="_aisSortOut('racon')">ETA Racon${soR?' ▲':' ⇅'}</th>
        <th class="sortable${soX}" onclick="_aisSortOut('custom')" style="white-space:nowrap">ETA${soX?' ▲':' ⇅'} ${customThInput}</th>
      </tr></thead><tbody>${outList.map(s => shipRow(s, outWps)).join('')}</tbody></table>`;
    }
  }
  html += '</div>';

  // ── Ankernde / Liegende ──
  if (ancList.length) {
    html += `<div class="ais-section">
      <div class="ais-section-title">⚓ Ankernde / Liegende · ${ancList.length} Schiffe</div>
      <table class="ais-table"><thead><tr>
        <th>Schiff</th><th>L / Tg</th><th>Position</th><th colspan="4">Status</th>
      </tr></thead><tbody>`;
    for (const s of ancList) {
      const { l: tL, e: tE } = _aisShipType(s.shipType);
      const nav = _AIS_NAV[s.navStatus] || 'Unbekannt';
      html += `<tr>
        <td><div class="ais-ship-name">${tE} ${s.name || s.mmsi}</div><span class="ais-type-badge">${tL}</span></td>
        <td style="font-size:11px">${s.length > 0 ? s.length+'m' : '—'}<br><span style="color:var(--text-muted)">${s.draught > 0 ? s.draught.toFixed(1)+'m' : '—'}</span></td>
        <td class="ais-pos">${posLabel(s.trackNm)}</td>
        <td colspan="4" class="ais-eta">${nav}</td>
      </tr>`;
    }
    html += '</tbody></table></div>';
  }

  container.innerHTML = html;
  _aisUpdateBadge();
}

  currentView = 'karte';
  setNavActive('nav-karte');
  document.getElementById('new-btn').style.display = 'none';

        </div>

          <div style="display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:22px;height:8px;background:#ff4400;border-radius:2px"></span><span>1,0 kn Ebbe</span></div>
          <div style="display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:22px;height:8px;background:#ff0000;border-radius:2px"></span><span>1,5 kn Ebbe</span></div>
          <div style="display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:22px;height:8px;background:#cc0000;border-radius:2px"></span><span>2,0 kn Ebbe</span></div>

  setTimeout(async () => {
    if (_karteMap) { _karteMap.remove(); _karteMap = null; }
