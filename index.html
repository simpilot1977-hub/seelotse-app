// Nächste N Gezeiten: aus Daten + Extrapolation per halbem Tidenzyklus
function _karteNextTides(detected, count) {
  const now = Date.now();
  // Zuerst zukünftige Ereignisse aus Rohdaten
  const future = detected.filter(e => e.t.getTime() > now);
  if (future.length >= count) return future.slice(0, count);

  const result = [...future];
  // Extrapolieren aus den letzten erkannten Ereignissen
  const recent = detected.slice(-4);
  if (recent.length < 2) return result;

  // Mittlere Halbperiode aus letzten Paaren berechnen
  let totalGap = 0, n = 0;
  for (let i = 1; i < recent.length; i++) {
    totalGap += recent[i].t.getTime() - recent[i-1].t.getTime();
    n++;
  }
  const halfPeriod = n > 0 ? totalGap / n : 6 * 3600000 + 12.5 * 60000;

  let last = recent[recent.length - 1];
  while (result.length < count) {
    const nextType = last.type === 'HW' ? 'NW' : 'HW';
    const nextT    = new Date(last.t.getTime() + halfPeriod);
    // Schätzwert: Durchschnitt der gleichartigen bekannten Ereignisse
    const similar  = detected.filter(e => e.type === nextType);
    const estV     = similar.length ? similar.reduce((s, e) => s + e.v, 0) / similar.length : last.v;
    last = { t: nextT, v: Math.round(estV), type: nextType, estimated: true };
    if (nextT.getTime() > now) result.push(last);
  }
  return result.slice(0, count);
}

// Einfacher Gezeitenscheitel-Detektor (lokale Extrema mit Mindestabstand ~4h)
function _karteFindTides(pts) {
  if (pts.length < 30) return [];
  // Glätten: 15-Punkt-Mittelwert (~15 min)
  const sm = pts.map((_, i) => {
    const s = Math.max(0, i - 7), e = Math.min(pts.length - 1, i + 7);
    const avg = pts.slice(s, e + 1).reduce((a, p) => a + p.v, 0) / (e - s + 1);
    return { t: pts[i].t, v: avg, raw: pts[i].v };
  });

  const results = [];
  const minGapMs = 3.5 * 3600 * 1000; // mind. 3,5h zwischen zwei Ereignissen
  let lastT = 0;

  for (let i = 10; i < sm.length - 10; i++) {
    const v = sm[i].v;
    const prev10 = sm.slice(i - 10, i);
    const next10 = sm.slice(i + 1, i + 11);
    const isHW = prev10.every(p => p.v <= v) && next10.every(p => p.v <= v);
    const isNW = prev10.every(p => p.v >= v) && next10.every(p => p.v >= v);
    if ((isHW || isNW) && (sm[i].t - lastT) >= minGapMs) {
      results.push({ t: sm[i].t, v: sm[i].raw, type: isHW ? 'HW' : 'NW' });
      lastT = sm[i].t;
    }
  }
  return results;
}

async function _karteLoadTides() {
  if (!_karteMap) return;
  _karteTideMarkers.forEach(m => m.remove()); _karteTideMarkers = [];

  // Daten holen: entweder aus _pegelData (schon geladen) oder frisch abrufen
  const BASE_PO = 'https://www.pegelonline.wsv.de/webservices/rest-api/v2/stations';
  await Promise.allSettled(KARTE_TIDE_STATIONS.map(async st => {
    try {
      let display = null;

      // Vorrang: importierte BSH-Datenbank (tideDbs)
      const dbEntries = tideDbs[st.dbKey] || [];
      if (dbEntries.length) {
        const now = Date.now();
        const upcoming = dbEntries
          .map(e => ({ type: e.type, t: new Date(e.dt), v: parseInt(e.ws) || 0, estimated: false }))
          .filter(e => e.t.getTime() >= now)
          .sort((a, b) => a.t - b.t);
        display = upcoming.slice(0, 2);
      } else {
        // Fallback: Pegelonline-Messdaten
        let pts = _pegelData[st.key] || [];
        if (pts.length < 30) {
          const station = PEGEL_STATIONS.find(s => s.key === st.key);
          if (!station) return;
          const raw = await fetch(`${BASE_PO}/${station.uuid}/W/measurements.json?start=P2D`).then(r => r.json());
          pts = (Array.isArray(raw) ? raw : []).map(m => ({ t: new Date(m.timestamp), v: m.value }));
          _pegelData[st.key] = pts;
        }
        const tides = _karteFindTides(pts);
        if (!tides.length) return;
        display = _karteNextTides(tides, 2);
      }

      if (!display || !display.length) return;

      const fmtT = d => d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }) + ' Uhr';
      const fmtDate = d => {
        const today = new Date(); const tom = new Date(today); tom.setDate(tom.getDate() + 1);
        if (d.toDateString() === today.toDateString()) return 'heute';
        if (d.toDateString() === tom.toDateString()) return 'morgen';
        return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' });
      };

      const rows = display.map(e => {
        const isHW  = e.type === 'HW';
        const col   = isHW ? '#1d4ed8' : '#059669';
        const arrow = isHW ? '↑' : '↓';
        const vStr  = e.estimated ? `~${Math.round(e.v)}cm` : `${Math.round(e.v)}cm`;
        return `<div style="display:flex;align-items:center;gap:5px;line-height:1.4">
          <span style="color:${col};font-weight:700;font-size:10px">${arrow}${e.type}</span>
          <span style="color:#374151;font-size:10px">${fmtDate(e.t)} ${fmtT(e.t)}</span>
          <span style="color:${col};font-weight:600;font-size:10px">${vStr}</span>
        </div>`;
      }).join('');

      const el = document.createElement('div');
      el.style.cssText = 'background:rgba(255,255,255,0.95);border:1.5px solid #1b3d5f;border-radius:8px;padding:4px 8px;font-size:10px;color:#1a2332;box-shadow:0 1px 4px rgba(0,0,0,0.15);pointer-events:none';
      el.innerHTML = `
        <div style="font-weight:700;font-size:10px;color:#1b3d5f;margin-bottom:2px">🌊 ${st.label}</div>
        ${rows}`;

      // Label-Position abseits des Fahrwassers (per Station konfiguriert)
      const marker = new maplibregl.Marker({ element: el, anchor: st.anchor })
        .setLngLat([st.labelLon, st.labelLat]).addTo(_karteMap);
      _karteTideMarkers.push(marker);
    } catch(e) { console.warn('Tide', st.label, e); }
  }));
}

// ── Schiffs-Tracking ───────────────────────────────────────────────
function _karteCOGEndpoint(lat, lon, cogDeg, sogKn, timeMin) {
  const distNm = sogKn * (timeMin / 60);
  const rad = cogDeg * Math.PI / 180;
  const newLat = lat + (distNm * Math.cos(rad)) / 60;
  const newLon = lon + (distNm * Math.sin(rad)) / (60 * Math.cos(lat * Math.PI / 180));
  return [newLon, newLat];
}

function _karteStartShips() {
  if (!_karteMap) return;
  if (!_aisShips || _aisShips.size === 0) {
    // AIS verbinden falls noch nicht aktiv
    aisConnect();
  }
  _karteUpdateShips();
  if (_karteShipTimer) clearInterval(_karteShipTimer);
  _karteShipTimer = setInterval(_karteUpdateShips, 20000);
}

function _karteStopShips() {
  if (_karteShipTimer) { clearInterval(_karteShipTimer); _karteShipTimer = null; }
  Object.values(_karteShipMarkers).forEach(({ marker }) => marker.remove());
  _karteShipMarkers = {};
  if (_karteMap && _karteMap.getSource('karte-cog')) {
    _karteMap.getSource('karte-cog').setData({ type: 'FeatureCollection', features: [] });
  }
  const sel = document.getElementById('karte-ship-select');
  if (sel) sel.innerHTML = '<option value="">— Alle Elbe-Schiffe —</option>';
}

function _karteUpdateShips() {
  if (!_karteMap || !_karteOverlays.schiffe) return;

  // Elbe-Begrenzungsbox (LV Elbe bis Hamburg)
  const ELBE_BOX = { W:7.9, E:10.2, S:53.3, N:54.3 };
  const RADARLINIE_MAX_NM = 250 / 1852; // 250 m beiderseits der Radarlinie
  const ships = [...(_aisShips?.values() || [])].filter(s =>
    s.lat !== null && s.lon !== null &&
    s.lon >= ELBE_BOX.W && s.lon <= ELBE_BOX.E &&
    s.lat >= ELBE_BOX.S && s.lat <= ELBE_BOX.N &&
    s.elbeDistNm != null && s.elbeDistNm <= RADARLINIE_MAX_NM
  );

  // Dropdown aktualisieren
  const sel = document.getElementById('karte-ship-select');
  if (sel) {
    const curVal = sel.value;
    sel.innerHTML = '<option value="">— Alle Elbe-Schiffe —</option>' +
      ships.sort((a, b) => (a.name || '').localeCompare(b.name || '')).map(s =>
        `<option value="${s.mmsi}" ${s.mmsi == _karteSelectedMMSI ? 'selected' : ''}>${s.name || s.mmsi} (${_msToKn(s.sog).toFixed(0)} kn)</option>`
      ).join('');
  }

  const targetShips = _karteSelectedMMSI
    ? ships.filter(s => s.mmsi == _karteSelectedMMSI)
    : ships;

  // Alte Marker entfernen die nicht mehr da sind
  const activeMMSIs = new Set(targetShips.map(s => String(s.mmsi)));
  Object.keys(_karteShipMarkers).forEach(mmsi => {
    if (!activeMMSIs.has(mmsi)) {
      _karteShipMarkers[mmsi].marker.remove();
      delete _karteShipMarkers[mmsi];
    }
  });

  // Marker erstellen/aktualisieren
  const cogFeatures = [];
  for (const s of targetShips) {
    const mmsiStr = String(s.mmsi);
    const isSelected = mmsiStr === _karteSelectedMMSI || _karteSelectedMMSI === '';
    const dotColor = mmsiStr === _karteSelectedMMSI ? '#f97316' : '#dc2626';

    if (_karteShipMarkers[mmsiStr]) {
      // Position aktualisieren
      _karteShipMarkers[mmsiStr].marker.setLngLat([s.lon, s.lat]);
    } else {
      // Neuen Marker erstellen
      const el = document.createElement('div');
      el.className = 'karte-ship-dot' + (mmsiStr === _karteSelectedMMSI ? ' selected' : '');
      el.title = `${s.name || s.mmsi}\n${_msToKn(s.sog).toFixed(0)} kn · COG ${Math.round(s.cog)}°`;
      el.onclick = () => {
        _karteSelectedMMSI = _karteSelectedMMSI === mmsiStr ? '' : mmsiStr;
        const sel2 = document.getElementById('karte-ship-select');
        if (sel2) sel2.value = _karteSelectedMMSI;
        _karteUpdateShips();
      };
      const marker = new maplibregl.Marker({ element: el, anchor: 'center' })
        .setLngLat([s.lon, s.lat])
        .addTo(_karteMap);
      _karteShipMarkers[mmsiStr] = { dot: el, marker };
    }

    // COG-Vektor: nur wenn SOG > 0.5 kn
    if (s.sog >= 0.5) {
      const endPt = _karteCOGEndpoint(s.lat, s.lon, s.cog, _msToKn(s.sog), _karteVectorMinutes);
      cogFeatures.push({
        type: 'Feature',
        geometry: { type: 'LineString', coordinates: [[s.lon, s.lat], endPt] },
        properties: { color: dotColor, isEnd: false, mmsi: mmsiStr }
      });
      // Endpunkt als Kreis
      cogFeatures.push({
        type: 'Feature',
        geometry: { type: 'Point', coordinates: endPt },
        properties: { color: dotColor, isEnd: true, mmsi: mmsiStr }
      });
    }
  }

  if (_karteMap.getSource('karte-cog')) {
    _karteMap.getSource('karte-cog').setData({ type: 'FeatureCollection', features: cogFeatures });
  }
}

function karteShipSelect(val) {
  _karteSelectedMMSI = val;
  _karteUpdateShips();
  // Karte auf das Schiff zentrieren wenn ausgewählt
  if (val && _aisShips?.has(Number(val))) {
    const s = _aisShips.get(Number(val));
    if (s?.lat && s?.lon) _karteMap.easeTo({ center: [s.lon, s.lat], zoom: Math.max(_karteMap.getZoom(), 11) });
  }
}

function karteVectorTimeChange(val) {
  _karteVectorMinutes = Number(val);
  _karteUpdateShips();
}

// ── Seezeichen-Overlay (Tonnen + Leuchttürme) ──────────────────────
function _karteSeamarkOnMove() {
  if (_karteOverlays.seezeichen) _karteLoadSeamarks();
}

function _karteSeamarkKeyframes(name, char_, group, period) {
  const T = period;
  const stops = [];
  const add = (pct, op) => stops.push(`${Math.min(pct, 99.99).toFixed(2)}% { opacity:${op} }`);

  if (char_ === 'Iso') {
    add(0, 1); add(49.99, 1); add(50, 0.08); add(99.99, 0.08);
  } else if (char_ === 'Q' || char_ === 'VQ') {
    add(0, 1); add(49.99, 1); add(50, 0.08); add(99.99, 0.08);
  } else if (char_ === 'Oc') {
    const offPct = Math.min(30, (0.5 / T) * 100 * 2);
    add(0, 0.08); add(offPct - 0.01, 0.08); add(offPct, 1); add(99.99, 1);
  } else {
    // Fl or Fl(n): n flashes of 0.5s each with 0.5s gap, then dark
    const flashOn = 0.5, flashOff = 0.5;
    const groupDur = group * flashOn + Math.max(0, group - 1) * flashOff;
    if (groupDur >= T) {
      add(0, 1); add(10, 1); add(10.01, 0.08); add(99.99, 0.08);
    } else {
      let t = 0;
      for (let i = 0; i < group; i++) {
        add((t / T) * 100, 1);
        add(((t + flashOn) / T) * 100 - 0.01, 1);
        add(((t + flashOn) / T) * 100, 0.08);
        t += flashOn;
        if (i < group - 1) {
          add(((t + flashOff) / T) * 100 - 0.01, 0.08);
          add(((t + flashOff) / T) * 100, 1);
          t += flashOff;
        }
      }
      add(99.99, 0.08);
    }
  }
  return `@keyframes ${name} { ${stops.join(' ')} } `;
}

// Opacity at a given phase (seconds within period) for a light characteristic
function _karteSeamarkPhase(char_, group, period, phase) {
  if (char_ === 'F' || period <= 0) return 1;
  if (char_ === 'Iso') return phase < period / 2 ? 1 : 0.05;
  if (char_ === 'Q' || char_ === 'VQ') return phase < period / 2 ? 1 : 0.05;
  if (char_ === 'Oc') return phase < period * 0.3 ? 0.05 : 1;
  // Fl(n)
  const flashOn = 0.5, flashOff = 0.5;
  let t = 0;
  for (let i = 0; i < group; i++) {
    if (phase >= t && phase < t + flashOn) return 1;
    t += flashOn;
    if (i < group - 1) {
      if (phase >= t && phase < t + flashOff) return 0.05;
      t += flashOff;
    }
  }
  return 0.05;
}

function _karteAnimateRangeLines(ts) {
  if (!_karteMap || !_karteOverlays.seezeichen || !_karteRangeLineLayers.length) {
    _karteRangeLineRAF = null;
    return;
  }
  const nowSec = (ts || performance.now()) / 1000;
  for (const { layerId, char_, period, group } of _karteRangeLineLayers) {
    if (!_karteMap.getLayer(layerId)) continue;
    const phase = period > 0 ? nowSec % period : 0;
    const opacity = _karteSeamarkPhase(char_, group, period, phase);
    _karteMap.setPaintProperty(layerId, 'line-opacity', opacity);
  }
  _karteRangeLineRAF = requestAnimationFrame(_karteAnimateRangeLines);
}

async function _karteLoadSeamarks() {
  if (!_karteMap) return;
  const zoom = _karteMap.getZoom();

  // Only show at zoom >= 9
  if (zoom < 9) {
    _karteSeamarkMarkers.forEach(m => m.remove()); _karteSeamarkMarkers = [];
    _karteSeamarkBbox = '';
    return;
  }

  const b = _karteMap.getBounds();
  const bbox = [b.getSouth(), b.getWest(), b.getNorth(), b.getEast()].map(v => v.toFixed(4)).join(',');
  if (bbox === _karteSeamarkBbox || _karteSeamarkFetching || Date.now() < _karteSeamarkRetryAfter) return;
  _karteSeamarkFetching = true;
  _karteSeamarkBbox = bbox;

  // Slightly expanded bbox for Richtfeuer to catch Ober/Unter pairs straddling the view edge.
  // Hard limits: Elbe only (south ≥ 53.70°N, west ≥ 8.40°E) to exclude Weser/Jade range lines.
  const pad = 0.15;
  const richtBbox = [
    Math.max(b.getSouth() - pad, 53.70), Math.max(b.getWest() - pad, 8.40),
    Math.min(b.getNorth() + pad, 54.3),  Math.min(b.getEast() + pad, 11.0)
  ].map(v => v.toFixed(4)).join(',');

  try {
    // seamark:type filter first → uses Overpass index, then name filter is cheap
    // Also fetch front/rear category lights (e.g. Richtfeuer Balje uses category instead of name)
    const query = `[out:json][timeout:10];(node["seamark:type"](${bbox});way["seamark:type"="leading_line"](${richtBbox});node["seamark:type"~"light_major|light_minor|lighthouse"](${bbox});node["seamark:type"~"light_major|light_minor|lighthouse"]["name"~"feuer"](${richtBbox});node["seamark:type"~"light_major|light_minor|lighthouse"]["seamark:light:category"~"front|rear"](${richtBbox}););out geom;`;
    const OVERPASS_ENDPOINTS = [
      'https://overpass-api.de/api/interpreter',
      'https://overpass.kumi.systems/api/interpreter',
      'https://overpass.private.coffee/api/interpreter',
    ];
    let data = null;
    for (const ep of OVERPASS_ENDPOINTS) {
      try {
        const ctrl = new AbortController();
        const tid = setTimeout(() => ctrl.abort(), 12000); // 12s per endpoint
        const resp = await fetch(ep, { method: 'POST', body: 'data=' + encodeURIComponent(query), signal: ctrl.signal });
        const text = await resp.text(); // keep abort signal active during body read
        clearTimeout(tid);
        if (text.trim().startsWith('{')) { data = JSON.parse(text); break; }
      } catch(e) { /* try next endpoint */ }
    }
    if (!data) throw new Error('All Overpass endpoints failed');

    _karteSeamarkMarkers.forEach(m => m.remove()); _karteSeamarkMarkers = [];

    // Robust cleanup: query the map style directly so we never miss a layer/source
    if (_karteRangeLineRAF) { cancelAnimationFrame(_karteRangeLineRAF); _karteRangeLineRAF = null; }
    try {
      const _style = _karteMap.getStyle();
      (_style.layers || []).map(l => l.id).filter(id => /^karte-(sec|rl)-/.test(id))
        .forEach(id => { try { _karteMap.removeLayer(id); } catch(e) {} });
      Object.keys(_style.sources || {}).filter(s => /^karte-(sec|rl)-/.test(s))
        .forEach(s => { try { _karteMap.removeSource(s); } catch(e) {} });
    } catch(e) {}
    _karteRangeLineLayers = [];
    _karteSectorLayers = [];

    if (!_karteSeamarkAnimStyle) {
      _karteSeamarkAnimStyle = document.createElement('style');
      document.head.appendChild(_karteSeamarkAnimStyle);
    }
    const animDefs = new Set();
    let styleText = _karteSeamarkAnimStyle.textContent || '';

    // Collect Richtfeuer nodes for name-based pairing (fallback for unpaired nodes)
    const richtfeuerByBase = {};
    // Collect front/rear category lights (e.g. Richtfeuer Balje — no "Ober"/"Unter" in name)
    const categoryLights = { fronts: [], rears: [] };
    // Collect sector light nodes for rendering
    const sectorLightNodes = [];
    // Collect unique buoy kennungen for the filter list
    const kennungSet = new Set();

    const nodes = (data.elements || []).filter(e => e.type === 'node');
    const ways  = (data.elements || []).filter(e => e.type === 'way');

    // ── Pre-pass: collect ALL light nodes for Richtfeuer pairing (whole Elbe) ──
    for (const node of nodes) {
      const t = node.tags || {};
      const smType = t['seamark:type'];
      if (smType !== 'light_major' && smType !== 'light_minor' && smType !== 'lighthouse') continue;
      const char_ = (t['seamark:light:character'] || t['seamark:light:1:character'] || 'F').replace(/\s/g, '');
      const period = parseFloat(t['seamark:light:period'] || t['seamark:light:1:period'] || '0');
      const group  = Math.max(1, parseInt(t['seamark:light:group'] || '1'));
      // front/rear category lights (e.g. Balje) — paired separately by proximity
      const cat = t['seamark:light:category'] || '';
      if (cat === 'rear')  { categoryLights.rears.push({ node, char_, period, group }); continue; }
      if (cat === 'front') { categoryLights.fronts.push({ node, char_, period, group }); continue; }
      // name-based pairing
      const name = (t.name || t['seamark:name'] || '').trim();
      if (!name) continue;
      const baseName = name.replace(/\b(Ober|Unter|oberes?|unteres?|Ober-Feuer|Unter-Feuer|Oberfeuer|Unterfeuer)\b/gi, '').replace(/\s+/g, ' ').trim();
      if (!baseName) continue;
      if (!richtfeuerByBase[baseName]) richtfeuerByBase[baseName] = [];
      richtfeuerByBase[baseName].push({ node, char_, period, group });
    }

    // ── Process nodes (dots) — only for visible viewport ─────────────
    const vw = b.getWest(), ve = b.getEast(), vs = b.getSouth(), vn = b.getNorth();
    for (const node of nodes) {
      // Skip nodes outside visible bounds (they were fetched for range line purposes only)
      if (node.lon < vw || node.lon > ve || node.lat < vs || node.lat > vn) continue;

      const t = node.tags || {};
      const smType = t['seamark:type'];
      if (!smType) continue;

      // Classify node for filter
      const _isTonne = smType === 'buoy_lateral' || smType === 'beacon_lateral' || smType === 'buoy_cardinal' || smType === 'beacon_cardinal';
      const _name_ = (t.name || t['seamark:name'] || '').toLowerCase();
      const _isRichtfeuer = smType === 'light_major' || smType === 'light_minor' || smType === 'lighthouse' || smType === 'light_vessel';
      const _isMole = _isRichtfeuer && (/mole/i.test(_name_) || parseFloat(t['seamark:light:1:range'] || t['seamark:light:range'] || '99') < 5);
      if (_isMole) continue; // Molenfeuer werden nicht angezeigt
      const _hasSectors = _isRichtfeuer && (() => {
        for (let i = 1; i <= 8; i++) { if (t[`seamark:light:${i}:sector_start`]) return true; } return false;
      })();

      // Apply filter
      if (_isTonne && !_karteSeamarkFilter.tonnen) continue;
      if (_isRichtfeuer && !_isMole) {
        if (_hasSectors && !_karteSeamarkFilter.sektoren) continue;
        if (!_hasSectors && !_karteSeamarkFilter.leuchtfeuer) continue;
      }
      if (_isMole && !_karteSeamarkFilter.leuchtfeuer) continue;
      if (!_isTonne && !_isRichtfeuer && !_karteSeamarkFilter.sonstige) continue;

      let color, size = 7;
      if (smType === 'buoy_lateral' || smType === 'beacon_lateral') {
        const col = (t['seamark:buoy_lateral:colour'] || t['seamark:beacon_lateral:colour'] || '').toLowerCase();
        if (col.includes('red')) color = '#dc2626';
        else if (col.includes('green')) color = '#16a34a';
        else continue;
      } else if (smType === 'light_major' || smType === 'light_minor' || smType === 'lighthouse' || smType === 'light_vessel') {
        color = '#f59e0b'; size = 9;
      } else if (smType === 'buoy_cardinal' || smType === 'beacon_cardinal') {
        color = '#1d1d1b'; size = 7;
      } else {
        continue;
      }

      const char_ = (t['seamark:light:character'] || t['seamark:light:1:character'] || 'F').replace(/\s/g, '');
      const period = parseFloat(t['seamark:light:period'] || t['seamark:light:1:period'] || '0');
      const group  = Math.max(1, parseInt(t['seamark:light:group'] || '1'));

      let animName = '', animDur = '';
      if (period > 0.1 && char_ !== 'F') {
        animName = `sm${char_.replace(/[^a-z0-9]/gi, '')}g${group}p${Math.round(period * 10)}`;
        animDur  = `${period}s`;
        if (!animDefs.has(animName)) {
          animDefs.add(animName);
          styleText += _karteSeamarkKeyframes(animName, char_, group, period);
        }
      }

      // Tooltip: Name + Kennung
      const name = t.name || t['seamark:name'] || t['ref'] || '';
      let kennung = '';
      if (char_ !== 'F' && period > 0) {
        kennung = `${char_}${group > 1 ? `(${group})` : ''} ${period}s`;
      } else if (char_ === 'F') {
        kennung = 'Festfeuer';
      } else if (smType === 'buoy_lateral' || smType === 'beacon_lateral') {
        const col = (t['seamark:buoy_lateral:colour'] || t['seamark:beacon_lateral:colour'] || '').toLowerCase();
        kennung = col.includes('red') ? 'Steuerbord (rot)' : col.includes('green') ? 'Backbord (grün)' : '';
      } else if (smType === 'buoy_cardinal' || smType === 'beacon_cardinal') {
        const cat = (t['seamark:buoy_cardinal:category'] || t['seamark:beacon_cardinal:category'] || '').toLowerCase();
        kennung = cat ? `Kardinaltonne ${cat}` : 'Kardinaltonne';
      }
      const tooltip = [name, kennung].filter(Boolean).join(' · ');

      // Apply kennung filter for buoys
      const kennungKey = _isTonne ? _karteGetKennungKey(t, smType) : null;
      if (_isTonne) {
        if (_karteSeamarkFilter.kennungenHide.has(kennungKey)) continue;
        kennungSet.add(kennungKey);
      }

      // Zero-size anchor element so anchor:'center' places the dot center exactly at coordinates
      const el = document.createElement('div');
      el.style.cssText = 'position:relative;width:0;height:0;';

      // The visible dot — animation applied here, not on the parent
      const dot = document.createElement('div');
      const half = size / 2;
      dot.style.cssText = `position:absolute;left:${-half}px;top:${-half}px;width:${size}px;height:${size}px;background:${color};border-radius:50%;box-shadow:0 0 3px rgba(0,0,0,0.4);cursor:help`;
      if (tooltip) dot.title = tooltip;
      if (animName) {
        // Sync marker blink phase with range line animation (both use performance.now()/1000 % period)
        const phaseDelay = -(performance.now() / 1000 % period);
        dot.style.animation = `${animName} ${animDur} linear ${phaseDelay.toFixed(3)}s infinite`;
      }
      el.appendChild(dot);

      // Buoy label (name/ref) — shown when "Beschriftung anzeigen" is checked
      if (_isTonne && _karteSeamarkFilter.labels && name) {
        const lbl = document.createElement('span');
        lbl.textContent = name.replace(/^(Tonne|Bake)\s*/i, '').trim();
        lbl.style.cssText = `position:absolute;left:0;transform:translateX(-50%);top:${-(half + 13)}px;font-size:8px;font-weight:700;color:#fff;text-shadow:0 0 2px #000,0 0 2px #000;white-space:nowrap;pointer-events:none;animation:none`;
        el.appendChild(lbl);
      }
      // Richtfeuer name label — placed toward land (north shore: above, south shore: below)
      const isRichtfeuerNode = _isRichtfeuer && name && /richtfeuer|ober|unter|leitfeuer/i.test(name);
      if (isRichtfeuerNode) {
        const rfl = document.createElement('span');
        rfl.textContent = name;
        // North shore (lat > 53.9°N) → label above dot (away from fairway northward)
        // South shore (lat ≤ 53.9°N) → label below dot (away from fairway southward)
        const onNorthShore = node.lat > 53.9;
        const topVal = onNorthShore ? `${-(half + 13)}px` : `${half + 2}px`;
        rfl.style.cssText = `position:absolute;left:0;transform:translateX(-50%);top:${topVal};font-size:8px;color:#f59e0b;text-shadow:0 0 2px #000,0 0 2px #000;white-space:nowrap;pointer-events:none;font-weight:600;animation:none`;
        el.appendChild(rfl);
      }

      const marker = new maplibregl.Marker({ element: el, anchor: 'center' })
        .setLngLat([node.lon, node.lat]).addTo(_karteMap);
      _karteSeamarkMarkers.push(marker);

      // Collect sector lights (only real lighthouses/major lights, not harbor mole lights)
      // Minimum range threshold to exclude mole lights (< 5 nm range)
      if (smType === 'lighthouse' || smType === 'light_major' || smType === 'light_vessel') {
        const range1 = parseFloat(t['seamark:light:1:range'] || t['seamark:light:range'] || '99');
        if (range1 < 5) continue; // skip short-range mole/harbor lights
        const sectors = [];
        for (let i = 1; i <= 8; i++) {
          const start = parseFloat(t[`seamark:light:${i}:sector_start`]);
          const end   = parseFloat(t[`seamark:light:${i}:sector_end`]);
          const col   = (t[`seamark:light:${i}:colour`] || '').toLowerCase();
          if (!isNaN(start) && !isNaN(end) && col) {
            // OSM sector_start/end are measured from the vessel's perspective (looking at lighthouse)
            // To draw from lighthouse outward, rotate 180° so sectors point toward the fairway
            sectors.push({ start: (start + 180) % 360, end: (end + 180) % 360, col });
          }
        }
        if (sectors.length > 0) {
          sectorLightNodes.push({ node, name, sectors });
        }
      }
    }

    _karteSeamarkAnimStyle.textContent = styleText;

    // Update kennung filter list with all found buoy kennungen
    _karteRenderKennungList(kennungSet);

    // ── Range lines: from OSM leading_line ways ───────────────────────
    const rangeLineFeatures = {}; // key → {features, char_, period, group}

    for (const way of ways) {
      const t = way.tags || {};
      if (t['seamark:type'] !== 'leading_line') continue;
      const coords = (way.geometry || []).map(g => [g.lon, g.lat]);
      if (coords.length < 2) continue;
      const char_ = (t['seamark:light:character'] || 'F').replace(/\s/g, '');
      const period = parseFloat(t['seamark:light:period'] || t['seamark:light:1:period'] || '0');
      const group  = Math.max(1, parseInt(t['seamark:light:group'] || '1'));
      const key = `${char_}-${period}-${group}`;
      if (!rangeLineFeatures[key]) rangeLineFeatures[key] = { features: [], char_, period, group };
      rangeLineFeatures[key].features.push({
        type: 'Feature',
        geometry: { type: 'LineString', coordinates: coords },
        properties: {}
      });
    }

    // ── Range lines: Ober/Unter pairs ──────────────────────────────────
    const handledNodeIds = new Set();
    // Pre-register static pairings so Pass 1/2/3 don't create duplicates.
    // Richtfeuer Otterndorf/Belum (064°): Leuchtfeuer 339261891 + Unterfeuer 854975325
    // Richtfeuer Belum (093°):            Oberfeuer Belum 340384841 + shared Unterfeuer 854975325
    // Richtfeuer Altenbruch (261°):       Oberfeuer Altenbruch 1469421139 + shared Unterfeuer 859486671
    // Richtfeuer Wehldorf (~311°):        Wehldorf Oberfeuer 1123906848  + shared Unterfeuer 859486671
    // Richtfeuer Scheelenkuhlen (~269°):  Scheelenkuhlen Oberfeuer 2651683813 + shared Unterfeuer 793148588
    // Richtfeuer St. Margarethen (~131°): St. Margarethen Oberfeuer 854975631 + shared Unterfeuer 793148588
    handledNodeIds.add(339261891);
    handledNodeIds.add(854975325);
    handledNodeIds.add(340384841);
    handledNodeIds.add(859486671);
    handledNodeIds.add(1469421139);
    handledNodeIds.add(1123906848);
    handledNodeIds.add(793148588);
    handledNodeIds.add(854975631);
    handledNodeIds.add(2651683813);
    // Richtfeuer Osterende:            Oberfeuer Osterende 1944306725 + Unterfeuer Osterende 1616725006
    // Richtfeuer Hollerwettern/Brokdorf: Oberfeuer Brokdorf 1616725002 + Unterfeuer Hollerwettern 1944307482
    handledNodeIds.add(1944306725);
    handledNodeIds.add(1616725006);
    handledNodeIds.add(1616725002);
    handledNodeIds.add(1944307482);
    // Richtfeuer Bützflethersand: type=landmark (never fetched), south of richtBbox 53.70°N
    handledNodeIds.add(634830137);   // Bützflethersand Unterfeuer
    handledNodeIds.add(854975740);   // Bützflethersand Oberfeuer
    // Richtfeuer Lühe-Grünendeich + Somfletherwisch: both south of richtBbox 53.70°N
    handledNodeIds.add(854975896);   // Lühe Unterfeuer (seamark:name "Grünendeich Unterfeuer")
    handledNodeIds.add(895762768);   // Unterfeuer Somfletherwisch

    // Helper: draw one Ober→Unter→fairway range line
    const drawOberUnterLine = (ober, unter, labelKey) => {
      handledNodeIds.add(ober.node.id);
      handledNodeIds.add(unter.node.id);
      const char_ = unter.char_, period = unter.period, group = unter.group;
      const lat1 = ober.node.lat  * Math.PI / 180;
      const lat2 = unter.node.lat * Math.PI / 180;
      const dLon = (unter.node.lon - ober.node.lon) * Math.PI / 180;
      const brg = Math.atan2(
        Math.sin(dLon) * Math.cos(lat2),
        Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon)
      );
      const ext = (lat, lon, d) => {
        const R = 6371, dd = d / R;
        const la = Math.asin(Math.sin(lat)*Math.cos(dd) + Math.cos(lat)*Math.sin(dd)*Math.cos(brg));
        const lo = lon + Math.atan2(Math.sin(brg)*Math.sin(dd)*Math.cos(lat), Math.cos(dd)-Math.sin(lat)*Math.sin(la));
        return [lo*180/Math.PI, la*180/Math.PI];
      };
      const coords = [[ober.node.lon, ober.node.lat], [unter.node.lon, unter.node.lat], ext(lat2, unter.node.lon*Math.PI/180, 10)];
      const key = `${char_}-${period}-${group}-${labelKey}`;
      if (!rangeLineFeatures[key]) rangeLineFeatures[key] = { features: [], char_, period, group };
      rangeLineFeatures[key].features.push({ type: 'Feature', geometry: { type: 'LineString', coordinates: coords }, properties: {} });
    };

    // Pass 1: exact name-based pairing
    const unpaired = { obers: [], unters: [] };
    for (const [baseName, items] of Object.entries(richtfeuerByBase)) {
      const ober  = items.find(i => /ober/i.test(i.node.tags?.name || ''));
      const unter = items.find(i => /unter/i.test(i.node.tags?.name || ''));
      if (ober && unter) {
        drawOberUnterLine(ober, unter, baseName);
      } else {
        if (ober  && !handledNodeIds.has(ober.node.id))  unpaired.obers.push(ober);
        if (unter && !handledNodeIds.has(unter.node.id)) unpaired.unters.push(unter);
      }
    }

    // Pass 2: proximity-based pairing for unmatched lights (within 3 km)
    const km = (a, b) => {
      const R = 6371, dlat = (b.node.lat - a.node.lat)*Math.PI/180, dlon = (b.node.lon - a.node.lon)*Math.PI/180;
      const s = Math.sin(dlat/2)**2 + Math.cos(a.node.lat*Math.PI/180)*Math.cos(b.node.lat*Math.PI/180)*Math.sin(dlon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
    };
    // Allow shared Unterfeuer (e.g. "Altenbruch/Wehldorf Unterfeuer" serves two Oberfeuers)
    for (const ober of unpaired.obers) {
      if (handledNodeIds.has(ober.node.id)) continue;
      let best = null, bestD = Infinity;
      for (const unter of unpaired.unters) {
        if (handledNodeIds.has(unter.node.id)) continue;
        const d = km(ober, unter);
        if (d < bestD && d < 3) { bestD = d; best = unter; }
      }
      if (best) { drawOberUnterLine(ober, best, `prox-${ober.node.id}`); }
    }

    // Pass 3: front/rear category pairing (e.g. Richtfeuer Balje — rear=Ober, front=Unter)
    for (const rear of categoryLights.rears) {
      if (handledNodeIds.has(rear.node.id)) continue;
      let best = null, bestD = Infinity;
      for (const front of categoryLights.fronts) {
        if (handledNodeIds.has(front.node.id)) continue;
        const d = km(rear, front);
        if (d < bestD && d < 4) { bestD = d; best = front; }
      }
      if (best) { drawOberUnterLine(rear, best, `cat-${rear.node.id}`); }
    }

    // Pass 4: static range lines for marks whose OSM names don't match Ober/Unter pattern.
    // Node IDs are pre-registered in handledNodeIds above so Pass 1/2/3 skip them.
    // Richtfeuer Otterndorf/Belum — OSM 339261891 (rear, "Leuchtfeuer Otterndorf/Belum", Iso 4s)
    //   + OSM 854975325 (front, "Otterndorf/Belum Unterfeuer", Iso 4s). Bearing ~064°.
    {
      const oberNode = nodes.find(n => n.id === 339261891)
                     || { id: 339261891, lat: 53.82600, lon: 8.90113, tags: {} };
      const unterNode = nodes.find(n => n.id === 854975325)
                      || { id: 854975325, lat: 53.83537, lon: 8.93575, tags: {} };
      drawOberUnterLine(
        { node: oberNode,  char_: 'Iso', period: 4, group: 1 },
        { node: unterNode, char_: 'Iso', period: 4, group: 1 },
        'static-otterndorf-belum'
      );
    }
    // Richtfeuer Belum (093°/273°): Oberfeuer Belum (OSM 340384841, Iso 4s) als Ober,
    // Otterndorf/Belum Unterfeuer (OSM 854975325, Iso 4s) als gemeinsames Unter.
    {
      const oberNode = nodes.find(n => n.id === 340384841)
                     || { id: 340384841, lat: 53.83474, lon: 8.95581, tags: {} };
      const unterNode = nodes.find(n => n.id === 854975325)
                      || { id: 854975325, lat: 53.83537, lon: 8.93575, tags: {} };
      drawOberUnterLine(
        { node: oberNode,  char_: 'Iso', period: 4, group: 1 },
        { node: unterNode, char_: 'Iso', period: 4, group: 1 },
        'static-belum'
      );
    }
    // Richtfeuer Altenbruch (261°/081°): Oberfeuer Altenbruch "Schlanke Anna" (OSM 1469421139, Iso 4s)
    // + Altenbruch/Wehldorf Unterfeuer (OSM 859486671, Iso 8s).
    {
      const oberNode = nodes.find(n => n.id === 1469421139)
                     || { id: 1469421139, lat: 53.83009, lon: 8.75743, tags: {} };
      const unterNode = nodes.find(n => n.id === 859486671)
                      || { id: 859486671, lat: 53.83364, lon: 8.79480, tags: {} };
      drawOberUnterLine(
        { node: oberNode,  char_: 'Iso', period: 4, group: 1 },
        { node: unterNode, char_: 'Iso', period: 8, group: 1 },
        'static-altenbruch'
      );
    }
    // Richtfeuer Wehldorf (~311°): Wehldorf Oberfeuer (OSM 1123906848, Iso 8s) als Ober,
    // teilt das Altenbruch/Wehldorf Unterfeuer (OSM 859486671, Iso 8s) mit Richtfeuer Altenbruch.
    {
      const oberNode = nodes.find(n => n.id === 1123906848)
                     || { id: 1123906848, lat: 53.83010, lon: 8.80168, tags: {} };
      const unterNode = nodes.find(n => n.id === 859486671)
                      || { id: 859486671, lat: 53.83364, lon: 8.79480, tags: {} };
      drawOberUnterLine(
        { node: oberNode,  char_: 'Iso', period: 8, group: 1 },
        { node: unterNode, char_: 'Iso', period: 8, group: 1 },
        'static-wehldorf'
      );
    }
    // Richtfeuer Scheelenkuhlen (~269°/089°): Scheelenkuhlen Oberfeuer (2651683813, Iso 8s)
    // + Unterfeuer Scheelenkuhlen (793148588, Iso 8s). Unterfeuer ist geteilt mit St. Margarethen.
    {
      const oberNode = nodes.find(n => n.id === 2651683813)
                     || { id: 2651683813, lat: 53.88111, lon: 9.28889, tags: {} };
      const unterNode = nodes.find(n => n.id === 793148588)
                      || { id: 793148588, lat: 53.88084, lon: 9.26099, tags: {} };
      drawOberUnterLine(
        { node: oberNode,  char_: 'Iso', period: 8, group: 1 },
        { node: unterNode, char_: 'Iso', period: 8, group: 1 },
        'static-scheelenkuhlen'
      );
    }
    // Richtfeuer St. Margarethen (~131°/311°): St. Margarethen Oberfeuer (854975631, Iso 8s)
    // + gemeinsames Unterfeuer Scheelenkuhlen (793148588, Iso 8s).
    {
      const oberNode = nodes.find(n => n.id === 854975631)
                     || { id: 854975631, lat: 53.88722, lon: 9.24880, tags: {} };
      const unterNode = nodes.find(n => n.id === 793148588)
                      || { id: 793148588, lat: 53.88084, lon: 9.26099, tags: {} };
      drawOberUnterLine(
        { node: oberNode,  char_: 'Iso', period: 8, group: 1 },
        { node: unterNode, char_: 'Iso', period: 8, group: 1 },
        'static-st-margarethen'
      );
    }
    // Richtfeuer Osterende: Oberfeuer Osterende (1944306725, Iso 4s) + Unterfeuer Osterende (1616725006, Iso 4s)
    {
      const oberNode = nodes.find(n => n.id === 1944306725)
                     || { id: 1944306725, lat: 53.84597, lon: 9.35472, tags: {} };
      const unterNode = nodes.find(n => n.id === 1616725006)
                      || { id: 1616725006, lat: 53.85003, lon: 9.34057, tags: {} };
      drawOberUnterLine(
        { node: oberNode,  char_: 'Iso', period: 4, group: 1 },
        { node: unterNode, char_: 'Iso', period: 4, group: 1 },
        'static-osterende'
      );
    }
    // Richtfeuer Hollerwettern/Brokdorf: Oberfeuer Brokdorf (1616725002, Iso 4s) + Unterfeuer Hollerwettern (1944307482, Iso 4s)
    {
      const oberNode = nodes.find(n => n.id === 1616725002)
                     || { id: 1616725002, lat: 53.85259, lon: 9.34647, tags: {} };
      const unterNode = nodes.find(n => n.id === 1944307482)
                      || { id: 1944307482, lat: 53.83940, lon: 9.35442, tags: {} };
      drawOberUnterLine(
        { node: oberNode,  char_: 'Iso', period: 4, group: 1 },
        { node: unterNode, char_: 'Iso', period: 4, group: 1 },
        'static-brokdorf-hollerwettern'
      );
    }
    // Richtfeuer Bützflethersand: Oberfeuer (OSM 854975740, landmark, Iso 4s) + Unterfeuer (OSM 634830137, landmark, Iso 4s)
    // Both are seamark:type=landmark (not light_minor) and south of richtBbox → always use fallback coords.
    {
      const oberNode = nodes.find(n => n.id === 854975740)
                     || { id: 854975740, lat: 53.63484, lon: 9.51730, tags: {} };
      const unterNode = nodes.find(n => n.id === 634830137)
                      || { id: 634830137, lat: 53.63154, lon: 9.52447, tags: {} };
      drawOberUnterLine(
        { node: oberNode,  char_: 'Iso', period: 4, group: 1 },
        { node: unterNode, char_: 'Iso', period: 4, group: 1 },
        'static-buetzflethersand'
      );
    }
    // Richtfeuer Lühe-Grünendeich (278.3°): Oberfeuer Grünendeich (B1540.1, not in OSM, Iso 4s)
    // + Unterfeuer Lühe (OSM 854975896, seamark:name "Grünendeich Unterfeuer", Iso 4s).
    {
      const oberNode = { id: 0, lat: 53.57389, lon: 9.60944, tags: {} };
      const unterNode = nodes.find(n => n.id === 854975896)
                      || { id: 854975896, lat: 53.57183, lon: 9.63270, tags: {} };
      drawOberUnterLine(
        { node: oberNode,  char_: 'Iso', period: 4, group: 1 },
        { node: unterNode, char_: 'Iso', period: 4, group: 1 },
        'static-luehe-gruenendeich'
      );
    }
    // Richtfeuer Somfletherwisch (136.3°): Oberfeuer Somfletherwisch (B1534.1, not in OSM, Iso 8s)
    // + Unterfeuer Somfletherwisch (OSM 895762768, Iso 8s).
    {
      const oberNode = { id: 0, lat: 53.56356, lon: 9.64964, tags: {} };
      const unterNode = nodes.find(n => n.id === 895762768)
                      || { id: 895762768, lat: 53.56957, lon: 9.63998, tags: {} };
      drawOberUnterLine(
        { node: oberNode,  char_: 'Iso', period: 8, group: 1 },
        { node: unterNode, char_: 'Iso', period: 8, group: 1 },
        'static-somfletherwisch'
      );
    }
    // Richtfeuer Altenbruch-Wehldorf (261°/081°) is already drawn by the Balje front/rear pair
    // (OSM nodes 1445813371 rear + 1460138804 front, Iso 8s) via Pass 3. No static needed.

    // Static markers for lights not in OSM or landmark type (not rendered by normal dot path).
    // Grünendeich Oberfeuer (B1540.1) and Somfletherwisch Oberfeuer (B1534.1) are not in OSM.
    // Bützflethersand Ober/Unter have seamark:type=landmark → skipped by normal Richtfeuer renderer.
    if (_karteSeamarkFilter.leuchtfeuer) {
      const _addStaticRichtfeuerMarker = (name, lat, lon, char_, period) => {
        if (lat < vs || lat > vn || lon < vw || lon > ve) return;
        const animName_ = `sm${char_.replace(/[^a-z0-9]/gi,'')}g1p${Math.round(period*10)}`;
        if (period > 0.1 && !animDefs.has(animName_)) {
          animDefs.add(animName_);
          _karteSeamarkAnimStyle.textContent += _karteSeamarkKeyframes(animName_, char_, 1, period);
        }
        const el = document.createElement('div');
        el.style.cssText = 'position:relative;width:0;height:0;';
        const dot = document.createElement('div');
        dot.style.cssText = `position:absolute;left:-4.5px;top:-4.5px;width:9px;height:9px;background:#f59e0b;border-radius:50%;box-shadow:0 0 3px rgba(0,0,0,0.4);cursor:help`;
        dot.title = name;
        if (period > 0.1) {
          const phaseDelay = -(performance.now() / 1000 % period);
          dot.style.animation = `${animName_} ${period}s linear ${phaseDelay.toFixed(3)}s infinite`;
        }
        el.appendChild(dot);
        const rfl = document.createElement('span');
        rfl.textContent = name;
        const onNorthShore = lat > 53.9;
        rfl.style.cssText = `position:absolute;left:0;transform:translateX(-50%);top:${onNorthShore ? '-17px' : '6px'};font-size:8px;color:#f59e0b;text-shadow:0 0 2px #000,0 0 2px #000;white-space:nowrap;pointer-events:none;font-weight:600;animation:none`;
        el.appendChild(rfl);
        const m = new maplibregl.Marker({ element: el, anchor: 'center' }).setLngLat([lon, lat]).addTo(_karteMap);
        _karteSeamarkMarkers.push(m);
      };
      _addStaticRichtfeuerMarker('Grünendeich Oberfeuer',     53.57389, 9.60944, 'Iso', 4);
      _addStaticRichtfeuerMarker('Somfletherwisch Oberfeuer', 53.56356, 9.64964, 'Iso', 8);
      _addStaticRichtfeuerMarker('Bützflethersand Oberfeuer', 53.63484, 9.51730, 'Iso', 4);
      _addStaticRichtfeuerMarker('Bützflethersand Unterfeuer',53.63154, 9.52447, 'Iso', 4);
    }

    // ── Range lines: ALL lights with bearing tags (not yet handled above) ──
    // Covers all Richtfeuer with seamark:leading_light:bearing / seamark:light:bearing
    for (const node of nodes) {
      const t = node.tags || {};
      const smType = t['seamark:type'];
      if (!(smType === 'light_major' || smType === 'light_minor' || smType === 'lighthouse')) continue;
      if (handledNodeIds.has(node.id)) continue;
      const brg = parseFloat(
        t['seamark:leading_light:bearing'] || t['seamark:light:bearing'] ||
        t['seamark:light:1:bearing'] || 'NaN'
      );
      if (isNaN(brg)) continue;
      const char_ = (t['seamark:light:character'] || t['seamark:light:1:character'] || 'F').replace(/\s/g, '');
      const period = parseFloat(t['seamark:light:period'] || t['seamark:light:1:period'] || '0');
      const group  = Math.max(1, parseInt(t['seamark:light:group'] || '1'));
      const lat0 = node.lat * Math.PI / 180, lon0 = node.lon * Math.PI / 180;
      const brgRad = brg * Math.PI / 180;
      const projDir = (d, dir) => {
        const R = 6371, dd = d / R;
        const la = Math.asin(Math.sin(lat0)*Math.cos(dd) + Math.cos(lat0)*Math.sin(dd)*Math.cos(dir));
        const lo = lon0 + Math.atan2(Math.sin(dir)*Math.sin(dd)*Math.cos(lat0), Math.cos(dd)-Math.sin(lat0)*Math.sin(la));
        return [lo*180/Math.PI, la*180/Math.PI];
      };
      const keyB = `brg-${node.id}`;
      if (!rangeLineFeatures[keyB]) rangeLineFeatures[keyB] = { features: [], char_, period, group };
      rangeLineFeatures[keyB].features.push({
        type: 'Feature',
        geometry: { type: 'LineString', coordinates: [projDir(3, brgRad + Math.PI), [node.lon, node.lat], projDir(10, brgRad)] },
        properties: {}
      });
    }

    // ── Create one MapLibre layer per unique (char, period, group) ────
    let layerIdx = 0;
    for (const [key, grp] of Object.entries(rangeLineFeatures)) {
      if (!grp.features.length) continue;
      if (!_karteSeamarkFilter.richtfeuer) continue;
      const sourceId = `karte-rl-src-${layerIdx}`;
      const layerId  = `karte-rl-lyr-${layerIdx}`;
      _karteMap.addSource(sourceId, {
        type: 'geojson',
        data: { type: 'FeatureCollection', features: grp.features }
      });
      _karteMap.addLayer({
        id: layerId, type: 'line', source: sourceId,
        paint: {
          'line-color': '#f59e0b',
          'line-width': 1.5,
          'line-dasharray': [5, 3],
          'line-opacity': 1
        }
      });
      _karteRangeLineLayers.push({ layerId, sourceId, char_: grp.char_, period: grp.period, group: grp.group });
      layerIdx++;
    }

    // Start rAF animation for range lines
    if (_karteRangeLineLayers.length) {
      _karteRangeLineRAF = requestAnimationFrame(_karteAnimateRangeLines);
    }

    // ── Sektorenfeuer rendering ───────────────────────────────────────
    // Build GeoJSON polygon wedges for each light sector
    const sectorColorMap = {
      white: { fill: 'rgba(255,255,220,0.18)', stroke: 'rgba(255,255,200,0.55)' },
      red:   { fill: 'rgba(220,50,50,0.18)',   stroke: 'rgba(220,50,50,0.55)' },
      green: { fill: 'rgba(30,160,60,0.18)',   stroke: 'rgba(30,160,60,0.55)' },
    };

    let sectorIdx = 0;
    if (_karteSeamarkFilter.sektoren) for (const { node, name: sName, sectors } of sectorLightNodes) {
      for (const { start, end, col } of sectors) {
        const colKey = col.includes('red') ? 'red' : col.includes('green') ? 'green' : 'white';
        const style = sectorColorMap[colKey];
        // Build polygon arc (wedge) with 6 km radius
        const R = 6371, rangKm = 6;
        const lat0 = node.lat * Math.PI / 180;
        const lon0 = node.lon * Math.PI / 180;
        // Generate arc points every 2 degrees; handle wrap-around
        let s = start, e = end;
        if (e <= s) e += 360; // handle wrap
        const steps = Math.max(2, Math.round((e - s) / 2));
        const arcPts = [];
        for (let i = 0; i <= steps; i++) {
          const brg = ((s + (e - s) * i / steps) % 360) * Math.PI / 180;
          const d = rangKm / R;
          const la = Math.asin(Math.sin(lat0) * Math.cos(d) + Math.cos(lat0) * Math.sin(d) * Math.cos(brg));
          const lo = lon0 + Math.atan2(Math.sin(brg) * Math.sin(d) * Math.cos(lat0), Math.cos(d) - Math.sin(lat0) * Math.sin(la));
          arcPts.push([lo * 180 / Math.PI, la * 180 / Math.PI]);
        }
        const ring = [[node.lon, node.lat], ...arcPts, [node.lon, node.lat]];
        const srcId = `karte-sec-src-${sectorIdx}`;
        const fillId = `karte-sec-fill-${sectorIdx}`;
        const lineId = `karte-sec-line-${sectorIdx}`;
        _karteMap.addSource(srcId, { type: 'geojson', data: { type: 'Feature', geometry: { type: 'Polygon', coordinates: [ring] }, properties: {} } });
        _karteMap.addLayer({ id: fillId, type: 'fill', source: srcId, paint: { 'fill-color': style.fill } });
        _karteMap.addLayer({ id: lineId, type: 'line', source: srcId, paint: { 'line-color': style.stroke, 'line-width': 1 } });
        _karteSectorLayers.push({ layerId: fillId, sourceId: srcId });
        _karteSectorLayers.push({ layerId: lineId, sourceId: srcId });
        sectorIdx++;
      }
    }

  } catch(e) {
    console.warn('Seamark', e);
    _karteSeamarkBbox = ''; // allow retry after cooldown
    _karteSeamarkRetryAfter = Date.now() + 30000; // 30s cooldown after failure
  } finally {
    _karteSeamarkFetching = false;
  }
}

function renderWetterPage() {
  const btnStyle = 'padding:2px 9px;font-size:11px;border:1.5px solid var(--border);border-radius:20px;background:var(--bg);cursor:pointer;font-family:inherit';
  document.getElementById('app-main').innerHTML = `
    <div style="max-width:960px;margin:0 auto">
      <div class="fd-card" id="ar-wind-card">
        <div class="fd-card-title" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <span>🌬️ Aktueller Wind</span>
          <div style="display:flex;gap:8px;align-items:center">
            <button onclick="fetchWindData()" style="padding:3px 10px;font-size:11px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--bg);cursor:pointer;color:var(--text-muted);display:flex;align-items:center;gap:4px" id="ar-wind-refresh-btn">↻ Aktualisieren</button>
            <button onclick="exportWetterPDF()" style="padding:3px 10px;font-size:11px;border:1px solid var(--blue);border-radius:var(--r-sm);background:var(--blue);cursor:pointer;color:#fff;display:flex;align-items:center;gap:4px">↓ PDF Export</button>
          </div>
        </div>
        <div id="ar-wind-inner" class="wind-grid">
          <div class="wind-err">Winddaten werden geladen…</div>
        </div>
        <div id="ar-wind-meta" style="text-align:right;font-size:9px;color:#94a3b8;margin-top:6px"></div>
        <!-- Astronomie & Umwelt -->
        <div id="ar-astro-grid" class="astro-grid"></div>
        <!-- Verlaufskurven -->
        <div id="ar-pressure-card" style="margin-top:10px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-md);padding:14px 16px 12px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px">
            <div style="display:flex;align-items:center;gap:10px">
              <div id="pchart-title" style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted)">📈 Verlaufskurven · Cuxhaven</div>
              <select id="pstation-select" onchange="selectPressureStation(this.value)" style="font-size:11px;padding:2px 6px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--bg);color:var(--text);font-family:inherit;cursor:pointer">
                <option value="helgoland">Helgoland</option>
                <option value="cuxhaven" selected>Cuxhaven</option>
                <option value="brunsbuettel">Brunsbüttel</option>
                <option value="hamburg">Hamburg</option>
              </select>
            </div>
            <div style="display:flex;gap:6px">
              <button onclick="fetchPressureHistory(6)"  id="pbtn-6"  style="${btnStyle}">6h</button>
              <button onclick="fetchPressureHistory(12)" id="pbtn-12" style="${btnStyle}">12h</button>
              <button onclick="fetchPressureHistory(24)" id="pbtn-24" style="${btnStyle.replace('background:var(--bg)','background:var(--blue)')};color:#fff;border-color:var(--blue)">24h</button>
              <button onclick="fetchPressureHistory(48)" id="pbtn-48" style="${btnStyle}">48h</button>
              <button onclick="fetchPressureHistory(72)" id="pbtn-72" style="${btnStyle}">72h</button>
            </div>
          </div>
          <div id="ar-pressure-inner" style="min-height:80px;color:var(--text-muted);font-size:12px">Wird geladen…</div>
        </div>
      </div>
    </div>`;
  // Sync dropdown to current station state
  const sel = document.getElementById('pstation-select');
  if (sel) sel.value = _pressureStation;
  const title = document.getElementById('pchart-title');
  if (title) title.textContent = `📈 Verlaufskurven · ${WEATHER_STATIONS[_pressureStation]?.label || 'Cuxhaven'}`;
  if (_pressureRefreshTimer) clearTimeout(_pressureRefreshTimer);
  setTimeout(() => {
    // Winddaten nur neu laden wenn Daten fehlen oder älter als 15 min
    const needsRefresh = !_windLastFetch || (Date.now() - _windLastFetch) >= WIND_REFRESH_MS;
    if (needsRefresh) {
      if (_windRefreshTimer) { clearTimeout(_windRefreshTimer); _windRefreshTimer = null; }
      fetchWindData();
    }
    renderAstroDashboard();
    fetchPressureHistory(_pressureHours);
  }, 0);
}

function exportWetterPDF() {
  const now = new Date();
  const fmtDt = d => d.toLocaleString('de-DE', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});

  // Capture current rendered wind cards
  const windInner  = document.getElementById('ar-wind-inner')?.innerHTML || '';
  const astroInner = document.getElementById('ar-astro-grid')?.innerHTML || '';
  const pressInner = document.getElementById('ar-pressure-inner')?.innerHTML || '';
  const windMeta   = document.getElementById('ar-wind-meta')?.innerHTML || '';

  // Time range buttons — replicate active state
  const activeH = _pressureHours;
  const timeRangeBtns = [6,12,24,48,72].map(h =>
    `<span style="padding:2px 9px;font-size:10px;border:1px solid ${h===activeH?'#2a6495':'#cbd5e1'};border-radius:20px;background:${h===activeH?'#2a6495':'#fff'};color:${h===activeH?'#fff':'#64748b'}">${h}h</span>`
  ).join(' ');

  // Collect CSS variables & wind-specific styles
  const styles = [...document.styleSheets].flatMap(ss => {
    try { return [...ss.cssRules].map(r => r.cssText); } catch { return []; }
  }).join('\n');

  const html = `<!DOCTYPE html><html lang="de"><head>
  <meta charset="UTF-8">
  <title>Wetter-Report ${fmtDt(now)}</title>
  <style>
    @page { size: A4 landscape; margin: 8mm 10mm; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 9px; margin: 0; color: #1e293b; print-color-adjust: exact; -webkit-print-color-adjust: exact; }
    h2 { font-size: 13px; margin: 0 0 8px; color: #1b3d5f; }
    .meta { font-size: 8px; color: #64748b; margin-bottom: 10px; }
    .wind-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
    .astro-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
    .wind-station { border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 10px 12px; background: #fff; min-width: 0; }
    .wind-station-name { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #637485; margin-bottom: 6px; }
    .wind-kn { font-size: 22px; font-weight: 800; color: #1b3d5f; line-height: 1; }
    .wind-ms { font-size: 10px; color: #64748b; margin-top: 2px; }
    .wind-dir { font-size: 11px; color: #334155; font-weight: 600; margin-top: 4px; }
    .wind-badge { display: inline-block; font-size: 8px; font-weight: 700; padding: 1px 5px; border-radius: 10px; background: #f1f5f9; color: #475569; margin-top: 3px; }
    .astro-card { border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 10px 12px; background: #fff; }
    .astro-card-title { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #637485; margin-bottom: 6px; }
    .pressure-section { border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 10px 12px; background: #fff; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .section-title { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #637485; }
    .tidal-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    svg text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    ${styles}
  </style>
</head><body>
  <h2>☁️ Wetter-Report · Cuxhaven/Elbe</h2>
  <div class="meta">Erstellt: ${fmtDt(now)} Uhr · Seelotsen-Fahrtenbuch</div>
  <div class="wind-grid">${windInner}</div>
  <div class="meta" style="text-align:right">${windMeta}</div>
  <div class="astro-grid">${astroInner}</div>
  <div class="pressure-section">
    <div class="section-header">
      <span class="section-title">📈 Verlaufskurven · Cuxhaven</span>
      <span>${timeRangeBtns}</span>
    </div>
    <div>${pressInner}</div>
  </div>
  <script>window.onload=()=>window.print();<\/script>
</body></html>`;

  const blob = new Blob([html], { type: 'text/html' });
  const url  = URL.createObjectURL(blob);
  const win  = window.open(url, '_blank');
  if (win) win.onload = () => URL.revokeObjectURL(url);
}

/* ════════════════════════════════════════════
   RENDER: LIST
════════════════════════════════════════════ */
function renderList() {
  const term = searchTerm.toLowerCase();
  const total = fahrten.length;

  // Apply date range filter
  const dateFiltered = fahrten.filter(f => {
    if (!filterFrom && !filterTo) return true;
    const date = (f.anBord || '').slice(0, 10);
    if (!date) return false;
    if (filterFrom && date < filterFrom) return false;
    if (filterTo   && date > filterTo)   return false;
    return true;
  });

  // Text search within date-filtered entries
  const filtered = dateFiltered
    .filter(f => !term ||
      (f.schiffsname||'').toLowerCase().includes(term) ||
      (f.streckeVon||'').toLowerCase().includes(term) ||
      (f.streckeNach||'').toLowerCase().includes(term) ||
      (f.artDesEinsatzes||'').toLowerCase().includes(term) ||
      (f.agentur||'').toLowerCase().includes(term))
    .sort((a,b) => {
      const av = a[sortField]||'', bv = b[sortField]||'';
      const cmp = av < bv ? -1 : av > bv ? 1 : 0;
      return sortDir === 'asc' ? cmp : -cmp;
    });

  function si(field) {
    if (sortField !== field) return '<span class="sort-icon">↕</span>';
    return `<span class="sort-icon active">${sortDir==='asc'?'↑':'↓'}</span>`;
  }
  function th(field, label) {
    return `<th class="sortable" onclick="setSort('${field}')">${label} ${si(field)}</th>`;
  }

  const dfCount = dateFiltered.length;
  const periodLabel = (filterFrom || filterTo)
    ? `${filterFrom ? fmtDateStr(filterFrom) : '…'} – ${filterTo ? fmtDateStr(filterTo) : '…'}`
    : 'Alle Einträge';

  // ── Filter Bar ────────────────────────────────────────────────────────
  const filterBarHtml = total > 0 ? `
    <div class="filter-bar">
      <span class="filter-bar-label">📅 Zeitraum</span>
      <div class="filter-inputs">
        <input class="filter-date-input" type="date" id="filter-from" value="${esc(filterFrom)}" onchange="handleFilterFrom(this.value)">
        <span class="filter-sep">–</span>
        <input class="filter-date-input" type="date" id="filter-to" value="${esc(filterTo)}" onchange="handleFilterTo(this.value)">
      </div>
      <div class="filter-quick">
        <button class="fq-btn${filterPreset==='today'?' active':''}" onclick="setQuickFilter('today')">Heute</button>
        <button class="fq-btn${filterPreset==='week'?' active':''}" onclick="setQuickFilter('week')">Diese Woche</button>
        <button class="fq-btn${filterPreset==='month'?' active':''}" onclick="setQuickFilter('month')">Dieser Monat</button>
        <button class="fq-btn${filterPreset==='year'?' active':''}" onclick="setQuickFilter('year')">Dieses Jahr</button>
        ${(filterFrom||filterTo) ? `<button class="fq-btn clear-btn" onclick="clearDateFilter()">✕ Zurücksetzen</button>` : ''}
      </div>
    </div>` : '';

  // ── Dashboard ─────────────────────────────────────────────────────────
  const EIGHT_H = 8 * 3600000;
  let bis8h = 0, ueber8h = 0, manöverCount = 0, wartestundenSum = 0, schiffsanteileSum = 0;
  const typCount = {};
  EINSATZ_OPTS.forEach(t => { typCount[t] = 0; });
  dateFiltered.forEach(f => {
    if (typCount[f.artDesEinsatzes] !== undefined) typCount[f.artDesEinsatzes]++;
    const ms = getEinsatzdauerMs(f, fahrten);
    if (ms !== null) { if (ms <= EIGHT_H) bis8h++; else ueber8h++; }
    if (f.manöver) manöverCount++;
    if (f.wartestunden) wartestundenSum += parseFloat(f.wartestunden) || 0;
    if (f.schiffsanteile) schiffsanteileSum += parseFloat(f.schiffsanteile) || 0;
  });

  const dashHtml = total > 0 ? `
    <div class="dash-section">
      <div class="dash-section-title" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <span>📊 Auswertung · ${esc(periodLabel)} · ${dfCount} ${dfCount===1?'Eintrag':'Einträge'}</span>
        <span style="display:flex;gap:8px">
          <button class="btn btn-secondary" style="height:32px;padding:0 14px;font-size:13px" onclick="exportExcelPeriod()" title="Zeitraum als Excel exportieren">📊 Excel</button>
          <button class="btn btn-secondary" style="height:32px;padding:0 14px;font-size:13px" onclick="exportPDFPeriod()" title="Zeitraum als PDF drucken">🖨️ PDF</button>
        </span>
      </div>
      <div class="dash-grid">
        <div class="dash-card dc-blue">
          <div class="dash-num num-blue">${dfCount}</div>
          <div class="dash-label">Reisen gesamt</div>
        </div>
        <div class="dash-card dc-green">
          <div class="dash-num num-green">${bis8h}</div>
          <div class="dash-label">Einsatz ≤ 8 h</div>
        </div>
        <div class="dash-card dc-amber">
          <div class="dash-num num-amber">${ueber8h}</div>
          <div class="dash-label">Einsatz > 8 h</div>
        </div>
        <div class="dash-card">
          <div class="dash-num">${typCount['Schiff']}</div>
          <div class="dash-label">Schiff</div>
        </div>
        <div class="dash-card">
          <div class="dash-num">${typCount['Radar']}</div>
          <div class="dash-label">Radar</div>
        </div>
        <div class="dash-card">
          <div class="dash-num">${typCount['AG-Fahrt']}</div>
          <div class="dash-label">AG-Fahrt</div>
        </div>
        <div class="dash-card">
          <div class="dash-num">${typCount['2+2']}</div>
          <div class="dash-label">2+2</div>
        </div>
        <div class="dash-card">
          <div class="dash-num">${manöverCount}</div>
          <div class="dash-label">Manöver</div>
        </div>
        <div class="dash-card">
          <div class="dash-num">${wartestundenSum % 1 === 0 ? wartestundenSum : wartestundenSum.toFixed(1)}</div>
          <div class="dash-label">Wartestunden</div>
        </div>
        <div class="dash-card">
          <div class="dash-num">${schiffsanteileSum % 1 === 0 ? schiffsanteileSum : schiffsanteileSum.toFixed(2)}</div>
          <div class="dash-label">Schiffsanteile</div>
        </div>
      </div>
    </div>` : '';

  // ── Table ─────────────────────────────────────────────────────────────
  let tableHtml = '';
  if (total === 0) {
    tableHtml = `
      <div class="empty-state">
        <div class="empty-icon">⚓</div>
        <h3>Noch keine Fahrten erfasst</h3>
        <p>Beginnen Sie mit der Dokumentation Ihrer ersten Fahrt.</p>
        <button class="btn btn-primary" onclick="goForm(null)">+ Erste Fahrt erfassen</button>
      </div>`;
  } else if (filtered.length === 0) {
    tableHtml = `
      <div class="empty-state">
        <div class="empty-icon" style="font-size:40px;margin-bottom:12px">🔍</div>
        <h3>Keine Ergebnisse</h3>
        <p>Kein Eintrag entspricht den gewählten Filtern.</p>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px">
          ${searchTerm ? `<button class="btn btn-secondary" onclick="clearSearch()">Suche zurücksetzen</button>` : ''}
          ${(filterFrom||filterTo) ? `<button class="btn btn-secondary" onclick="clearDateFilter()">Zeitraum zurücksetzen</button>` : ''}
        </div>
      </div>`;
  } else {
    const pairMap = buildPairMap(fahrten);
    const rows = filtered.map(f => {
      const isCfm = confirmingId === f.id;
      const reiseDur   = calcDuration(f.anBord, f.vonBord);
      const einsatzRes = getEinsatzdauer(f, fahrten);
      const pairInfo   = pairMap[f.id];
      const isLinkedAusgehend = !einsatzRes && pairInfo && f.ausgehend;
      const palette    = pairInfo ? PAIR_PALETTES[pairInfo.idx % PAIR_PALETTES.length] : null;
      const trStyle    = palette
        ? `style="background:${palette.bg};border-left:3px solid ${palette.border}"`
        : '';
      return `<tr ${trStyle}>
        <td>${esc(fmtDate(f.anBord))}</td>
        <td class="ship-name">${esc(f.schiffsname)||'<span style="opacity:.4">—</span>'}</td>
        <td>${esc(f.streckeVon)||'<span style="opacity:.4">—</span>'}</td>
        <td>${esc(f.streckeNach)||'<span style="opacity:.4">—</span>'}</td>
        <td>${f.artDesEinsatzes ? `<span class="badge-einsatz">${esc(f.artDesEinsatzes)}</span>` : '<span style="opacity:.4">—</span>'}</td>
        <td>${f.tiefgang != null && f.tiefgang !== '' ? esc(f.tiefgang)+' m' : '<span style="opacity:.4">—</span>'}</td>
        <td>${f.personenAnBord != null && f.personenAnBord !== '' ? esc(f.personenAnBord) : '<span style="opacity:.4">—</span>'}</td>
        <td>${f.manöver ? '<span style="color:#1a7340;font-weight:700">✓</span>' : f.anspleissen ? '<span style="color:#0369a1;font-weight:700">→</span>' : '<span style="opacity:.4">—</span>'}</td>
        <td>${f.wartestunden ? esc(f.wartestunden)+' h' : '<span style="opacity:.4">—</span>'}</td>
        <td>${f.schiffsanteile != null && f.schiffsanteile !== '' ? esc(f.schiffsanteile) : '<span style="opacity:.4">—</span>'}</td>
        <td>${esc(f.agentur)||'<span style="opacity:.4">—</span>'}</td>
        <td style="white-space:nowrap">${esc(fmtDTShort(f.anBord))}</td>
        <td style="white-space:nowrap">${esc(fmtDTShort(f.vonBord))}</td>
        <td>${reiseDur ? `<span class="dur-badge dur-reise">${esc(reiseDur)}</span>` : '<span style="opacity:.4">—</span>'}</td>
        <td style="white-space:nowrap">${esc(fmtDTShort(f.abfahrt))}</td>
        <td style="white-space:nowrap">${esc(fmtDTShort(f.ankunft))}</td>
        <td>${f.abgeschöpft ? '<span style="color:#1a7340;font-weight:700">✓</span>' : '<span style="opacity:.4">—</span>'}</td>
        <td>${einsatzRes
          ? `<span class="dur-badge ${einsatzRes.cross?'dur-cross':'dur-einsatz'}" title="${einsatzRes.cross?'Eintragsübergreifend (Ausgehend → Einkommend)':''}">${esc(einsatzRes.dur)}${einsatzRes.cross?' ↗':''}</span>`
          : isLinkedAusgehend
            ? `<span class="dur-badge dur-pending" title="Ausgehende Reise – Einsatzdauer auf der Einkommend-Zeile">⬇ Ausgehend</span>`
            : '<span style="opacity:.4">—</span>'
        }</td>
        <td class="actions-cell">
          <button class="btn-icon" onclick="goAktuelleReiseWith('${esc(f.id)}')" title="In Aktuelle Reise ansehen" style="font-size:12px;padding:0 8px;width:auto;background:#e0f2fe;color:#0369a1;border:1px solid #7dd3fc;border-radius:6px">Ansehen</button>
          <button class="btn-icon btn-edit" onclick="goForm('${esc(f.id)}')" title="Bearbeiten">✏️</button>
          ${isCfm
            ? `<button class="btn-icon" style="background:var(--danger-bg);color:var(--danger);width:auto;padding:0 10px;font-size:13px;font-weight:700;border-radius:var(--r-sm)" onclick="confirmDelete('${esc(f.id)}')">Löschen?</button>
               <button class="btn-icon btn-ghost" onclick="cancelDelete()" title="Abbrechen" style="font-size:13px">✕</button>`
            : `<button class="btn-icon btn-delete" onclick="askDelete('${esc(f.id)}')" title="Löschen">🗑️</button>`
          }
        </td>
      </tr>`;
    }).join('');

    tableHtml = `
      <div class="table-container">
        <table class="entries-table">
          <thead><tr>
            ${th('anBord','Datum')}
            ${th('schiffsname','Schiffsname')}
            ${th('streckeVon','Von')}
            ${th('streckeNach','Nach')}
            ${th('artDesEinsatzes','Art')}
            <th>Tiefg.</th><th>POB</th><th>Man.</th><th>Wartest.</th><th>Anteile</th>
            ${th('agentur','Agentur')}
            ${th('anBord','An Bord')}
            <th>Von Bord</th><th>Reise</th>
            <th>Abfahrt</th><th>Ankunft</th><th>Abg.</th>
            <th>Einsatz</th><th>Aktionen</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  document.getElementById('app-main').innerHTML = `
    ${filterBarHtml}
    ${dashHtml}
    <div class="list-toolbar">
      <div class="list-title-group">
        <h2>Fahrtenübersicht</h2>
        <div class="list-subtitle">${total} ${total===1?'Eintrag':'Einträge'} gesamt${(filterFrom||filterTo)?' · '+dfCount+' im Zeitraum':''}${filtered.length !== dfCount ? ' · '+filtered.length+' angezeigt' : ''}</div>
      </div>
      ${total > 0 ? `
      <div class="search-wrap">
        <svg class="search-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-box" type="search" placeholder="Schiff, Strecke, Einsatz, Agentur …" value="${esc(searchTerm)}" oninput="handleSearch(this.value)" id="search-input">
        ${searchTerm ? `<button class="search-clear" onclick="clearSearch()" title="Suche löschen">✕</button>` : ''}
      </div>` : ''}
    </div>
    ${tableHtml}`;
}

function setSort(field) {
  if (sortField === field) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortField = field;
    sortDir = 'asc';
  }
  renderList();
  // Keep search focus
  const si = document.getElementById('search-input');
  if (si) si.focus();
}

function handleSearch(val) {
  searchTerm = val;
  renderList();
  const si = document.getElementById('search-input');
  if (si) { si.focus(); const l = val.length; si.setSelectionRange(l,l); }
}

function clearSearch() {
  searchTerm = '';
  renderList();
}

function setQuickFilter(preset) {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  filterPreset = preset;
  if (preset === 'today') {
    filterFrom = filterTo = fmt(now);
  } else if (preset === 'week') {
    const day = now.getDay() || 7;
    const mon = new Date(now); mon.setDate(now.getDate() - day + 1);
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    filterFrom = fmt(mon); filterTo = fmt(sun);
  } else if (preset === 'month') {
    filterFrom = `${now.getFullYear()}-${pad(now.getMonth()+1)}-01`;
    filterTo = fmt(new Date(now.getFullYear(), now.getMonth()+1, 0));
  } else if (preset === 'year') {
    filterFrom = `${now.getFullYear()}-01-01`;
    filterTo = `${now.getFullYear()}-12-31`;
  }
  renderList();
}

function clearDateFilter() {
  filterFrom = filterTo = '';
  filterPreset = '';
  renderList();
}

function handleFilterFrom(val) {
  filterFrom = val;
  filterPreset = '';
  renderList();
}

function handleFilterTo(val) {
  filterTo = val;
  filterPreset = '';
  renderList();
}

function getDateFiltered() {
  return fahrten.filter(f => {
    if (!filterFrom && !filterTo) return true;
    const date = (f.anBord || '').slice(0, 10);
    if (!date) return false;
    if (filterFrom && date < filterFrom) return false;
    if (filterTo   && date > filterTo)   return false;
    return true;
  });
}

function exportExcelPeriod() {
  if (typeof XLSX === 'undefined') { showToast('Excel-Bibliothek nicht geladen.', 'error'); return; }
  const entries = getDateFiltered().sort((a,b) => (a.anBord||'') < (b.anBord||'') ? -1 : 1);
  if (!entries.length) { showToast('Keine Einträge im gewählten Zeitraum.', 'error'); return; }
  const pairM = buildPairMap(fahrten);
  const rows = entries.map(f => {
    const reiseDur  = calcDuration(f.anBord, f.vonBord) || '';
    const einsatzR  = getEinsatzdauer(f, fahrten);
    const pairInfo  = pairM[f.id];
    const isLinked  = !einsatzR && pairInfo && f.ausgehend;
    const einsatzTxt = einsatzR
      ? einsatzR.dur + (einsatzR.cross ? ' ↗' : '')
      : isLinked ? '⬇ Ausgehend' : '';
    return {
      'Datum (An Bord)':   fmtDT(f.anBord),
      'Schiffsname':       f.schiffsname        || '',
      'Von':               f.streckeVon         || '',
      'Nach':              f.streckeNach        || '',
      'Art des Einsatzes': f.artDesEinsatzes    || '',
      'Tiefgang (m)':      f.tiefgang !== ''    ? f.tiefgang        : '',
      'POB':               f.personenAnBord !== '' ? f.personenAnBord : '',
      'Manöver':           f.manöver            ? 'Ja' : '',
      'Wartestunden':      f.wartestunden       || '',
      'Schiffsanteile':    f.schiffsanteile !== '' && f.schiffsanteile != null ? parseFloat(f.schiffsanteile) : '',
      'Agentur':           f.agentur            || '',
      'An Bord':           fmtDT(f.anBord),
      'Von Bord':          fmtDT(f.vonBord),
      'Reisedauer':        reiseDur,
      'Abfahrt Haustür':   fmtDT(f.abfahrt),
      'Ankunft Haustür':   fmtDT(f.ankunft),
      'Abgeschöpft':       f.abgeschöpft        ? 'Ja' : '',
      'Einsatzdauer':      einsatzTxt,
    };
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:20},{wch:22},{wch:8},{wch:8},{wch:16},{wch:12},{wch:6},{wch:9},{wch:12},{wch:12},{wch:22},{wch:20},{wch:20},{wch:12},{wch:20},{wch:20},{wch:12},{wch:14}];
  const wb = XLSX.utils.book_new();
  const label = (filterFrom || filterTo)
    ? `${filterFrom||'?'}_${filterTo||'?'}`
    : new Date().toISOString().slice(0,10);
  XLSX.utils.book_append_sheet(wb, ws, 'Fahrten');
  XLSX.writeFile(wb, `seelotse-${label}.xlsx`);
  showToast(`✓ Excel exportiert (${entries.length} Einträge).`, 'success');
}

    <div class="sub">Zeitraum: ${esc(periodLabel)} · ${entries.length} Einträge · Erstellt: ${fmtDate(new Date().toISOString())}</div>

function exportEPPPDF() {
  const pad = n => String(n).padStart(2,'0');
  const fmtDT = v => {
    if (!v) return '—';
    const d = new Date(v); if (isNaN(d)) return '—';
    return `${pad(d.getDate())}.${pad(d.getMonth()+1)}. ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  };
  const fmtT = v => {
    if (!v) return '';
    const d = new Date(v); if (isNaN(d)) return '';
    return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  };
  const esc2 = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const fmtWs = ws => ws ? (parseInt(ws)/100).toFixed(2)+' m' : '—';

  // ── Gezeitenvorhersage ─────────────────────────────────────────────────
  const pdfRefTs = eppStichtag ? new Date(eppStichtag).getTime() : Date.now();
  const tideCurvesCols = EPP_TIDE_LOCS.map(loc => {
    const label = loc === 'Brunsbuettel' ? 'Brunsbüttel' : loc;
    const entries = eppTiden[loc] || [];
    const svgStr = makeTideCurveSVG(entries, pdfRefTs);
    const dataRows = entries.filter(e=>e.dt).map(e =>
      `<div class="td-row">
        <span class="td-badge ${e.type==='HW'?'hw':'nw'}">${e.type==='HW'?'↑ HW':'↓ NW'}</span>
        <span class="td-time">${fmtDT(e.dt)}</span>
        <span class="td-ws">${fmtWs(e.ws)}</span>
      </div>`
    ).join('');
    return `<div class="tide-col">
      <div class="tide-col-hdr">${label}</div>
      ${svgStr || '<div class="no-data">Keine Tidedaten</div>'}
      <div class="td-rows">${dataRows}</div>
    </div>`;
  }).join('');

  // ── ETA-Wegpunkte (reversed: Hamburg → E3) ────────────────────────────
  const etaLegs = [
    { key:'Hamburg',      label:'Hamburg',      distToNext: 36 },
    { key:'Brunsbuettel', label:'Brunsbüttel',  distToNext: 10 },
    { key:'Glameyer',     label:'Glameyer',     distToNext: 30 },
    { key:'ElbeRakon',    label:'Elbe-Racon',   distToNext: 13 },
    { key:'E3',           label:'E3',           distToNext: null },
  ];
  const etaRows = etaLegs.map((leg, i) => {
    const ataDt  = eppAtaLocs[leg.key] ? new Date(eppAtaLocs[leg.key]) : null;
    const ata    = ataDt ? fmtDT(eppAtaLocs[leg.key]) : '—';
    const tide   = eppGetTideStatus(ataDt, leg.key);
    const tideBadge = tide==='flut' ? '<span class="eta-badge flut">↑ Flut</span>'
                    : tide==='ebbe' ? '<span class="eta-badge ebbe">↓ Ebbe</span>'
                    : tide==='stau' ? '<span class="eta-badge stau">≈ Stau</span>' : '';
    const cur    = eppAtaCurrents[leg.key] ? eppAtaCurrents[leg.key]+' kn' : '—';
    const nextLeg = etaLegs[i+1];
    const speedKey = nextLeg ? nextLeg.key+'-'+leg.key : null;
    const speed  = speedKey ? (eppAtaSpeeds[speedKey] ? eppAtaSpeeds[speedKey]+' kn' : '—') : '—';
    const dist   = leg.distToNext ? leg.distToNext+' NM' : '—';
    const isLast = !nextLeg;
    return `<tr class="${isLast?'last-row':''}">
      <td class="loc-cell"><strong>${esc2(leg.label)}</strong></td>
      <td class="mono">${ata}</td>
      <td>${tideBadge}</td>

      <td class="dist">${dist}</td>

    </tr>`;
  }).join('');

  // ── Delta ──────────────────────────────────────────────────────────────
  const _tg    = parseFloat(eppTiefgangSchiff)   || 0;
