    _karteWindMarkers.forEach(m => m.remove()); _karteWindMarkers = [];
    if (_karteShipTimer) { clearInterval(_karteShipTimer); _karteShipTimer = null; }
    _karteShipMarkers = {};
    _karteTideMarkers.forEach(m => m.remove()); _karteTideMarkers = [];
    _karteSeamarkMarkers.forEach(m => m.remove()); _karteSeamarkMarkers = [];
    _karteSeamarkBbox = '';
    if (_karteRangeLineRAF) { cancelAnimationFrame(_karteRangeLineRAF); _karteRangeLineRAF = null; }
    _karteRangeLineLayers = [];
    _karteSectorLayers = [];

    // ── Nautisches Flat-Design (demotiles) ────────────────────────────
    _karteLandLayerIds = []; _karteWaterLayerIds = []; _karteBgLayerId = null;
    const styleResp = await fetch('https://demotiles.maplibre.org/style.json').then(r => r.json());
    styleResp.layers.forEach(l => {
      if (!l.paint) return;
      const fc = l.paint['fill-color'];
      if (l.type === 'background') {
        l.paint['background-color'] = '#e8ddc8';
        _karteBgLayerId = l.id;
      } else if (fc && (l.id.includes('water') || l.id.includes('ocean') || l.id.includes('sea') || l.id.includes('lake') || l.id.includes('river'))) {
        l.paint['fill-color'] = '#9cc4d8';
        _karteWaterLayerIds.push(l.id);
      } else if (fc && (l.id.includes('land') || l.id.includes('earth') || l.id.includes('country') || l.id.includes('admin'))) {
        l.paint['fill-color'] = '#e8ddc8';
        _karteLandLayerIds.push(l.id);
      }
      if (l.paint['line-color'] && l.id.includes('water')) l.paint['line-color'] = '#5a8fa8';
      if (l.type === 'symbol' && !l.id.includes('water')) { l.layout = l.layout || {}; l.layout.visibility = 'none'; }
      if (['road','building','bridge','tunnel','rail'].some(k => l.id.includes(k))) { l.layout = l.layout || {}; l.layout.visibility = 'none'; }
    });
    const bgLayer = styleResp.layers.find(l => l.type === 'background');
    if (bgLayer) { bgLayer.paint = { 'background-color': '#e8ddc8' }; _karteBgLayerId = bgLayer.id; }

    _karteMap = new maplibregl.Map({
      container: 'karte-map',
      center: [9.05, 53.78],
      zoom: 8,
      style: styleResp,
      attributionControl: { compact: true },
    });

    _karteMap.on('load', async () => {

      // ── Detaillierte Küste & Gewässer (OSM Shortbread Vector Tiles) ──
      // CORS: access-control-allow-origin: * ✓
      _karteMap.addSource('osm-water', {
        type: 'vector',
        tiles: ['https://vector.openstreetmap.org/shortbread_v1/{z}/{x}/{y}.mvt'],
        minzoom: 0, maxzoom: 15,
        attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      });
      // Ozean-Füllung (very early, below everything)
      _karteMap.addLayer({
        id: 'water-ocean', type: 'fill', source: 'osm-water', 'source-layer': 'ocean',
        paint: { 'fill-color': '#9cc4d8' }
      });
      // Alle Wasserflächen (Flüsse, Seen, Küstengewässer)
      _karteMap.addLayer({
        id: 'water-poly', type: 'fill', source: 'osm-water', 'source-layer': 'water_polygons',
        paint: { 'fill-color': '#9cc4d8' }
      });
      // Küstenlinie & Uferlinie als präzise Linie
      _karteMap.addLayer({
        id: 'water-line', type: 'line', source: 'osm-water', 'source-layer': 'water_polygons',
        paint: { 'line-color': '#4d8aaa', 'line-width': ['interpolate',['linear'],['zoom'],8,0.8,12,1.5,15,2] }
      });

      // ── OpenSeaMap Overlay (Hafen-Details, Seezeichen, Hamburg-Hafen) ─
      _karteMap.addSource('openseamap', {
        type: 'raster',
        tiles: ['https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png'],
        tileSize: 256,
        attribution: '© <a href="https://www.openseamap.org" target="_blank">OpenSeaMap</a>',
      });
      _karteMap.addLayer({
        id: 'openseamap-layer', type: 'raster', source: 'openseamap',
        minzoom: 8,
        layout: { visibility: _karteOverlays.seemap ? 'visible' : 'none' },
        paint: { 'raster-opacity': 0.85 }
      });

      // ── Koordinatengitter ────────────────────────────────────────────
      _karteMap.addSource('grid-lines', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
      _karteMap.addLayer({
        id: 'grid-lines-layer', type: 'line', source: 'grid-lines',
        layout: { visibility: _karteOverlays.grid ? 'visible' : 'none' },
        paint: { 'line-color': '#7a9aaa', 'line-width': 0.5, 'line-dasharray': [4, 4] }
      });
      _karteMap.addSource('grid-labels', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
      _karteMap.addLayer({
        id: 'grid-labels-layer', type: 'symbol', source: 'grid-labels',
        layout: {
          visibility: _karteOverlays.grid ? 'visible' : 'none',
          'text-field': ['get', 'label'],
          'text-size': 10, 'text-anchor': 'center',
          'text-font': ['Noto Sans Regular'],
          'text-allow-overlap': true,
        },
        paint: { 'text-color': '#4a6a80', 'text-halo-color': 'rgba(232,221,200,0.85)', 'text-halo-width': 1.5 }
      });
      _karteUpdateGrid();
      _karteMap.on('moveend', _karteUpdateGrid);
      _karteMap.on('zoomend', _karteUpdateGrid);

      // ── Fahrwasserlinie: äußere Elbe + WSV BWaStr-Locator (innen) ────
      // Richtung: LV Elbe → Cuxhaven (Außenelbe, korrekte Tonne-Positionen)
      //           + Cuxhaven → Hamburg (WSV km 727→640, umgekehrt)
      let fairwayCoords = OUTER_ELBE_COORDS.slice();
      try {
        const BASE = 'https://via.bund.de/wsv/bwastr-locator/rest/geokodierung/query?bwastrid=0701&wkid=4326&f=json';
        const resp = await fetch(BASE + '&km_von=640&km_bis=727').then(r => r.json());
        const g = resp?.result?.[0]?.geometry || resp?.features?.[0]?.geometry;
        if (g) {
          const raw = g.type === 'MultiLineString' ? g.coordinates.flat() : (g.coordinates || []);
          if (raw.length > 5) {
            // raw[0] ≈ km 640 (Hamburg, lon ~9.9), raw[-1] ≈ km 727 (Cuxhaven, lon ~8.7)
            // Umkehren: Cuxhaven → Hamburg, erstes Element überspringen (bereits in outerElbe)
            const innerReversed = raw.slice().reverse();
            fairwayCoords = [...OUTER_ELBE_COORDS, ...innerReversed.slice(1)];
          }
        }
      } catch(e) {
        console.warn('BWaStr-Locator:', e);
        // Fallback über KARTE_WP (ab Cuxhaven = Index 10)
        fairwayCoords = [...OUTER_ELBE_COORDS, ...KARTE_WP.slice(10).map(wp => [wp.lon, wp.lat])];
      }

      _karteFairwayCoords = fairwayCoords; // store for Strömung overlay
      _karteMap.addSource('fairway', {
        type: 'geojson',
        data: { type: 'Feature', geometry: { type: 'LineString', coordinates: fairwayCoords } }
      });
      // ── Radarlinie: Deutsche Bucht → Hamburg (SEAiq GPX-Wegpunkte) ───
      const _radarCoords = KARTE_WP.map(wp => [wp.lon, wp.lat]);
      _karteMap.addSource('radarlinie', {
        type: 'geojson',
        data: {
          type: 'FeatureCollection',
          features: [
            { type: 'Feature', geometry: { type: 'LineString', coordinates: _radarCoords }, properties: {} },
            ...KARTE_WP.map(wp => ({
              type: 'Feature',
              geometry: { type: 'Point', coordinates: [wp.lon, wp.lat] },
              properties: { label: wp.label }
            }))
          ]
        }
      });
      _karteMap.addLayer({
        id: 'radarlinie-line', type: 'line', source: 'radarlinie',
        filter: ['==', ['geometry-type'], 'LineString'],
        paint: { 'line-color': '#7c3aed', 'line-width': 2, 'line-opacity': 0.85 }
      });
      _karteMap.addLayer({
        id: 'radarlinie-dots', type: 'circle', source: 'radarlinie',
        filter: ['==', ['geometry-type'], 'Point'],
        paint: { 'circle-radius': 4, 'circle-color': '#7c3aed', 'circle-stroke-width': 1.5, 'circle-stroke-color': '#fff' }
      });
      _karteMap.addLayer({
        id: 'radarlinie-labels', type: 'symbol', source: 'radarlinie',
        filter: ['==', ['geometry-type'], 'Point'],
        layout: {
          'text-field': ['get', 'label'],
          'text-size': 10, 'text-anchor': 'left', 'text-offset': [0.7, 0],
          'text-font': ['Noto Sans Regular'],
          'text-optional': true,
        },
        paint: { 'text-color': '#4c1d95' }
      });

      // ── Kurs & Distanz Labels (je Segment, beide Richtungen) ─────────
      // Jedes Segment als eigene LineString-Feature → symbol-placement:'line-center'
      // richtet Text automatisch in Fahrtrichtung aus; text-keep-upright verhindert
      // auf-dem-Kopf-stehen; linke Seite der Fahrtrichtung = "oben" für Ausfahrt,
      // "unten" für Einfahrt (weil Linie umgekehrt).
      const _kursFeatOut = [], _kursFeatIn = [];
      for (let i = 0; i < KARTE_WP.length - 1; i++) {
        const A = KARTE_WP[i], B = KARTE_WP[i+1];
        const brg    = _brgDeg(A.lat, A.lon, B.lat, B.lon);
        const brgIn  = (brg + 180) % 360;
        const dist   = _hvNm(A.lat, A.lon, B.lat, B.lon);
        const distStr = (dist < 1 ? dist.toFixed(2) : dist.toFixed(1)) + ' sm';
        _kursFeatOut.push({
          type: 'Feature',
          geometry: { type: 'LineString', coordinates: [[A.lon,A.lat],[B.lon,B.lat]] },
          properties: { label: `▶ ${String(Math.round(brg)).padStart(3,'0')}°  ${distStr}` }
        });
        _kursFeatIn.push({
          type: 'Feature',
          geometry: { type: 'LineString', coordinates: [[B.lon,B.lat],[A.lon,A.lat]] },
          properties: { label: `◀ ${String(Math.round(brgIn)).padStart(3,'0')}°  ${distStr}` }
        });
      }
      _karteMap.addSource('kurs-out', { type: 'geojson', data: { type: 'FeatureCollection', features: _kursFeatOut } });
      _karteMap.addSource('kurs-in',  { type: 'geojson', data: { type: 'FeatureCollection', features: _kursFeatIn  } });
      _karteMap.addLayer({
        id: 'kurs-oben', type: 'symbol', source: 'kurs-out', minzoom: 9,
        layout: {
          'symbol-placement': 'line-center',
          'text-field': ['get', 'label'],
          'text-size': 9,
          'text-font': ['Noto Sans Regular'],
          'text-offset': [0, -1.1],   // linke Seite der Fahrtrichtung = über der Linie
          'text-keep-upright': true,
          'text-optional': true,
          'text-allow-overlap': false,
        },
        paint: { 'text-color': '#4c1d95' }
      });
      _karteMap.addLayer({
        id: 'kurs-unten', type: 'symbol', source: 'kurs-in', minzoom: 9,
        layout: {
          'symbol-placement': 'line-center',
          'text-field': ['get', 'label'],
          'text-size': 9,
          'text-font': ['Noto Sans Regular'],
          'text-offset': [0, -1.1],   // linke Seite = unter der ursprünglichen Linie
          'text-keep-upright': true,
          'text-optional': true,
          'text-allow-overlap': false,
        },
        paint: { 'text-color': '#7e22ce' }
      });

      // ── Schiffe: COG-Vektor-Layer (GeoJSON LineStrings) ──────────────
      _karteMap.addSource('karte-cog', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
      _karteMap.addLayer({
        id: 'karte-cog-line', type: 'line', source: 'karte-cog',
        paint: { 'line-color': ['get', 'color'], 'line-width': 2, 'line-dasharray': [4, 2] }

        id: 'karte-cog-arrow', type: 'circle', source: 'karte-cog',

      if (_karteOverlays.wind) _karteLoadWind();
      if (_karteOverlays.schiffe) _karteStartShips();

    }); // end map.on('load')
  }, 100);
}

// ── Koordinatengitter ──────────────────────────────────────────────
function _karteFmtDeg(deg, isLat) {
  const abs = Math.abs(deg);
  const d = Math.floor(abs);
  const m = ((abs - d) * 60).toFixed(1);
  const dir = isLat ? (deg >= 0 ? 'N' : 'S') : (deg >= 0 ? 'E' : 'W');
  return `${d}°${m}'${dir}`;
}

function _karteGetGridStep(zoom) {
  if (zoom >= 13) return 1/60;      // 1'
  if (zoom >= 11) return 5/60;      // 5'
  if (zoom >= 10) return 10/60;     // 10'
  if (zoom >= 8)  return 0.5;       // 30'
  if (zoom >= 6)  return 1.0;       // 1°
  return 2.0;
}

function _karteUpdateGrid() {
  if (!_karteMap || !_karteMap.getSource('grid-lines')) return;
  const zoom = _karteMap.getZoom();
  const step = _karteGetGridStep(zoom);
  const b = _karteMap.getBounds();
  const W = b.getWest(), E = b.getEast(), S = b.getSouth(), N = b.getNorth();
  const pad = step * 2;

  const lineFeats = [], labelFeats = [];
  const snap = v => Math.round(v / step) * step;

  // Meridiane (Längengrade)
  for (let lon = snap(W - pad); lon <= E + pad; lon = snap(lon + step)) {
    lineFeats.push({ type:'Feature', geometry:{ type:'LineString', coordinates:[[lon, S-pad],[lon, N+pad]] }, properties:{} });
    labelFeats.push({ type:'Feature', geometry:{ type:'Point', coordinates:[lon, S + (N-S)*0.04] }, properties:{ label: _karteFmtDeg(lon, false) } });
  }
  // Breitengrade (Parallelen)
  for (let lat = snap(S - pad); lat <= N + pad; lat = snap(lat + step)) {
    lineFeats.push({ type:'Feature', geometry:{ type:'LineString', coordinates:[[W-pad, lat],[E+pad, lat]] }, properties:{} });
    labelFeats.push({ type:'Feature', geometry:{ type:'Point', coordinates:[W + (E-W)*0.03, lat] }, properties:{ label: _karteFmtDeg(lat, true) } });
  }

  _karteMap.getSource('grid-lines').setData({ type:'FeatureCollection', features: lineFeats });
  _karteMap.getSource('grid-labels').setData({ type:'FeatureCollection', features: labelFeats });
}

// ── Overlay-Toggle ─────────────────────────────────────────────────
// ── Strömungs-Overlay: färbt Fahrwasser nach Tidenströmung ein ─────
// ── Strömungs-Hilfsfunktionen ─────────────────────────────────────────────────

function _lerpColor(c1, c2, t) {
  // Interpoliert zwischen zwei Hex-Farben (#rrggbb)
  const h = (a, b) => Math.round(parseInt(a, 16) + (parseInt(b, 16) - parseInt(a, 16)) * t)
    .toString(16).padStart(2, '0');
  return '#' + h(c1.slice(1,3), c2.slice(1,3)) + h(c1.slice(3,5), c2.slice(3,5)) + h(c1.slice(5,7), c2.slice(5,7));
}

function _stroemColorV2(strom_kn, phase) {
  // Ebbe = Rot, Stauwasser = Gelb, Flut = Grün (knallig), 0.5-kn-Schritte bis ±3.0 kn
  const s = phase === 'F' ? strom_kn : phase === 'E' ? -strom_kn : 0;
  const stops = [
    [-3.0, '#660000'],
    [-2.5, '#990000'],
    [-2.0, '#cc0000'],
    [-1.5, '#ff0000'],
    [-1.0, '#ff4400'],
    [-0.5, '#ff9900'],
    [ 0.0, '#ffff00'], // Stauwasser → knallgelb
    [ 0.5, '#aaff00'],
    [ 1.0, '#55ee00'],
    [ 1.5, '#00dd00'],
    [ 2.0, '#00aa00'],
    [ 2.5, '#007700'],
    [ 3.0, '#004400'],
  ];
  for (let i = 0; i < stops.length - 1; i++) {
    if (s >= stops[i][0] && s <= stops[i+1][0]) {
      return _lerpColor(stops[i][1], stops[i+1][1], (s - stops[i][0]) / (stops[i+1][0] - stops[i][0]));
    }
  }
  return s < -3 ? stops[0][1] : stops[stops.length-1][1];
}

function _stromdatenLookup(tableIdx, dtHW) {
  // Sucht die zutreffende Zeile in ELBE_STROMDATEN[tableIdx] für dtHW (h relativ zu HW)
  const table = ELBE_STROMDATEN[tableIdx];
  if (!table) return { phase:'S', strom_kn:0, sog_see_hh:table?.maxFDW??12, sog_hh_see:table?.maxFDW??12 };
  const idx = Math.min(49, Math.max(0, Math.floor((dtHW + 6.5) / 0.25)));
  const row = table.rows[idx];
  return { phase:row[1], strom_kn:row[2], sog_see_hh:row[3], sog_hh_see:row[4] };
}

async function _fetchHWOffset(uuid) {
  // Gibt { dtHW, hwTime, nwTime } zurück oder null bei Fehler
  // dtHW: Stunden seit letztem HW; Korrektur auf nächsten Zyklus nur wenn NW bereits beobachtet
  try {
    const BASE = 'https://www.pegelonline.wsv.de/webservices/rest-api/v2/stations';
    const pts = await fetch(`${BASE}/${uuid}/W/measurements.json?start=PT15H`).then(r => r.json());
    if (!Array.isArray(pts) || pts.length < 12) return null;

    // Letztes lokales Maximum (HW) UND letztes lokales Minimum (NW) suchen — von hinten, Fenster ±5
    const WIN = 5;
    let hwIdx = -1, nwIdx = -1;
    for (let i = pts.length - 1 - WIN; i >= WIN; i--) {
      let isMax = true, isMin = true;
      for (let j = i - WIN; j <= i + WIN; j++) {
        if (j === i) continue;
        if (pts[j].value > pts[i].value) isMax = false;
        if (pts[j].value < pts[i].value) isMin = false;
      }
      if (hwIdx < 0 && isMax) hwIdx = i;
      if (nwIdx < 0 && isMin) nwIdx = i;
      if (hwIdx >= 0 && nwIdx >= 0) break;
    }
    if (hwIdx < 0) { hwIdx = 0; for (let i=1; i<pts.length; i++) if (pts[i].value > pts[hwIdx].value) hwIdx = i; }
    if (nwIdx < 0) { nwIdx = 0; for (let i=1; i<pts.length; i++) if (pts[i].value < pts[nwIdx].value) nwIdx = i; }

    const hwTime = new Date(pts[hwIdx].timestamp);
    const nwTime = new Date(pts[nwIdx].timestamp);
    // Näheres HW verwenden (letztes vergangenes vs. aktuell erkanntes)
    const dtFromPast = (Date.now() - hwTime.getTime()) / 3600000;
    // Wenn dtFromPast > halber Gezeitenzyklus → nächstes HW ist näher
    const dtHW = dtFromPast > 6.21 ? dtFromPast - 12.42 : dtFromPast;

    return { dtHW, hwTime, nwTime };
  } catch { return null; }
}

// HW-Offset aus importierter BSH-Datenbank (tideDbs) berechnen
// dtHW relativ zum NÄHEREN HW (negativ = vor HW, positiv = nach HW), immer im Tabellenbereich [-6.5, +6.0]
function _hwOffsetFromDb(dbKey) {
  const db = tideDbs[dbKey];
  if (!db || !db.length) return null;
  const now = Date.now();
  const all = db.map(e => ({ type: e.type, t: new Date(e.dt) })).sort((a, b) => a.t - b.t);

  // Letztes vergangenes HW und nächstes zukünftiges HW
  const pastHW = [...all].filter(e => e.type === 'HW' && e.t.getTime() <= now).pop();
  const nextHW = all.find(e => e.type === 'HW' && e.t.getTime() > now);
  if (!pastHW && !nextHW) return null;

  // dtHW relativ zum näheren HW (kleinerer Absolutbetrag → immer im Tabellenbereich)
  const dtFromPast = pastHW ? (now - pastHW.t.getTime()) / 3600000 : Infinity;   // positiv
  const dtToNext   = nextHW ? (now - nextHW.t.getTime()) / 3600000 : -Infinity;  // negativ
  const dtHW = Math.abs(dtFromPast) <= Math.abs(dtToNext) ? dtFromPast : dtToNext;

  // Für Anzeige: letztes vergangenes HW und letztes vergangenes NW
  const hwTime = pastHW?.t ?? nextHW?.t;
  const nwTime = [...all].filter(e => e.type === 'NW' && e.t.getTime() <= now).pop()?.t ?? null;
  return { dtHW, hwTime, nwTime };
}

// HW-Offset: DB-Daten bevorzugen, Pegelonline als Fallback
async function _getHWOffset(dbKey, uuid) {
  const fromDb = _hwOffsetFromDb(dbKey);
  if (fromDb) return fromDb;
  return _fetchHWOffset(uuid);
}

function _fracToCoord(frac, fracs) {
  // Konvertiert line-progress-Fraktion in geografische Koordinate [lon, lat]
  for (let i = 1; i < KARTE_WP.length; i++) {
    if (frac <= fracs[i] + 1e-9) {
      const t = (frac - fracs[i-1]) / (fracs[i] - fracs[i-1]);
      return [
        KARTE_WP[i-1].lon + (KARTE_WP[i].lon - KARTE_WP[i-1].lon) * t,
        KARTE_WP[i-1].lat + (KARTE_WP[i].lat - KARTE_WP[i-1].lat) * t,
      ];
    }
  }
  return [KARTE_WP[KARTE_WP.length-1].lon, KARTE_WP[KARTE_WP.length-1].lat];
}

function _elbeSegFracs() {
  // Liefert line-progress-Fraktionen [0..1] für jeden Wegpunkt in KARTE_WP
  const dists = [0];
  let total = 0;
  for (let i = 1; i < KARTE_WP.length; i++) {
    const A = KARTE_WP[i-1], B = KARTE_WP[i];
    total += _hvNm(A.lat, A.lon, B.lat, B.lon);
    dists.push(total);
  }
  return dists.map(d => d / total);
}

function _karteRemoveStroem() {
  if (_karteStroemTimer) { clearTimeout(_karteStroemTimer); _karteStroemTimer = null; }
  if (!_karteMap) return;
  ['stroem-stau-halo','stroem-stau-dot','stroem-line'].forEach(id => { try { _karteMap.removeLayer(id); } catch(e) {} });
  ['stroem-stau','stroem'].forEach(id => { try { _karteMap.removeSource(id); } catch(e) {} });
  const leg = document.getElementById('stroem-legend');
  if (leg) leg.style.display = 'none';
}

async function _karteLoadStroem() {
  if (!_karteMap) return;
  _karteRemoveStroem();

  // Strömungsdaten: HW-Zeitpunkt für drei Bezugspegel — tideDbs bevorzugen, Pegelonline als Fallback
  const [resCux, resBrb, resStP] = await Promise.all([
    _getHWOffset('Cuxhaven',    'aad49293-242a-43ad-a8b1-e91d7792c4b2'),
    _getHWOffset('Brunsbuettel','d4f5f719-8c52-4f8d-945d-1c31404cc628'),
    _getHWOffset('Hamburg',     'd488c5cc-4de9-4631-8ce1-0db0e700b546'),
  ]);
  const dtCux = resCux?.dtHW ?? null;
  const dtBrb = resBrb?.dtHW ?? null;
  const dtStP = resStP?.dtHW ?? null;
  // Glückstadt: kein eigener Pegel, HW ~45 min nach Brunsbüttel
  const dtGlk = dtBrb !== null ? dtBrb - 0.75 : null;

  // Segment-Zuweisung: vonWp, bisWp, Tabelle (0-basiert), HW-Offset
  const segments = [
    { tableIdx:0, dt:dtCux },  // Tn31–Tn47  (wp0–wp14)
    { tableIdx:1, dt:dtBrb },  // Tn47–Tn55a (wp14–wp16)
    { tableIdx:2, dt:dtBrb },  // Tn55a–Tn63 (wp16–wp20)
    { tableIdx:3, dt:dtGlk },  // Tn63–Tn79  (wp20–wp24)
    { tableIdx:4, dt:dtGlk },  // Tn79–Tn107 (wp24–wp38)
    { tableIdx:5, dt:dtStP },  // Tn107–Tn119(wp38–wp44)
    { tableIdx:6, dt:dtStP },  // Tn119–HH   (wp44–wp51)
  ];

  // Farbe je Segment bestimmen (Segmente 1-6; Segment 0 bekommt eigene Behandlung)
  const segColors = segments.map(({ tableIdx, dt }) => {
    if (dt === null) return '#94a3b8';
    const r = _stromdatenLookup(tableIdx, dt);
    return _stroemColorV2(r.strom_kn, r.phase);
  });

  // Linienfortschritts-Fraktionen für alle Wegpunkte berechnen
  const fracs = _elbeSegFracs();

  // === ÄUSSERE ELBE: Zeitinterpolation Racon→Kugelbake + Geschwindigkeitsgrenzen ===
  // HW/NW Cuxhaven = Stauwasser bei Racon (E3); Kugelbake: wie Tabelle (STAU_EF=-3.75h)
  // Zeitlich: dtHW_eff(pos) = dtCux − (1−t)·3.75  [t=0 Racon, t=1 Kugelbake]
  // Geschwindigkeit: westlich Tn.7 max 1 kn, Tn.7–Tn.17 max 2 kn, östlich Tn.17 voll
  const OUTER_RACON_OFFSET = 3.75; // h Zeitversatz Racon vs. Kugelbake-Tabelle
  const fRacon     = fracs[0];
  const fKugelbake = fracs[8];
  // Tn.7 und Tn.17 linear interpoliert zwischen wp3 (Tn.5) und wp4 (≈Tn.19)
  const fTn7  = fracs[3] + (2  / 14) * (fracs[4] - fracs[3]);
  const fTn17 = fracs[3] + (12 / 14) * (fracs[4] - fracs[3]);

  function _outerDtEff(frac) {
    const t = Math.min(1, Math.max(0, (frac - fRacon) / (fKugelbake - fRacon)));
    return dtCux - (1 - t) * OUTER_RACON_OFFSET;
  }
  function _outerMaxKn(frac) {
    if (frac < fTn7)  return 1.0;
    if (frac < fTn17) return 2.0;
    return Infinity;
  }
  function _outerColor(frac, capOverride) {
    if (dtCux === null) return '#94a3b8';
    const dt = frac <= fKugelbake ? _outerDtEff(frac) : dtCux;
    const r  = _stromdatenLookup(0, dt);
    const kn = Math.min(r.strom_kn, capOverride ?? _outerMaxKn(frac));
    return _stroemColorV2(kn, r.phase);
  }

  // Kentering-Front im äußeren Bereich: t_stau ∈ (0,1) → Frontposition zwischen Racon und Kugelbake
  let outerStauFrac = null;
  if (dtCux !== null) {
    const t_stau = -dtCux / OUTER_RACON_OFFSET;
    if (t_stau > 1e-6 && t_stau < 1 - 1e-6)
      outerStauFrac = fRacon + t_stau * (fKugelbake - fRacon);
  }

  // === STAUWASSER für Segmente 1-6 (innerhalb der Tabellen-Bezugsorte) ===
  const STAU_EF = [-3.75, -4.50, -4.25, -5.25, -4.75, -5.50, -5.50];
  const segDtsArr = [dtCux, dtBrb, dtBrb, dtGlk, dtGlk, dtStP, dtStP];

  // Minuten bis zum/seit Ebbe→Flut-Stauwasser (negativ = Stau vorbei → Flut läuft)
  const minToStau = STAU_EF.map((s, i) =>
    segDtsArr[i] !== null ? (s - segDtsArr[i]) * 60 : null
  );

  // Alle Phasenübergänge finden (Segmente 1-6; Segment 0 gesondert über outerStauFrac)
  const stauFracs    = [];
  const stauTransIdxs = [];
  for (let i = 1; i < STAU_EF.length; i++) {
    const prev = minToStau[i-1], curr = minToStau[i];
    if (prev === null || curr === null) continue;
    if ((prev <= 0 && curr > 0) || (prev > 0 && curr <= 0)) {
      const vonWp = ELBE_STROMDATEN[i].vonWp;
      const bisWp = ELBE_STROMDATEN[i].bisWp;
      const t = Math.abs(prev) / (Math.abs(prev) + Math.abs(curr));
      stauFracs.push(fracs[vonWp] + (fracs[bisWp] - fracs[vonWp]) * t);
      stauTransIdxs.push(i);
    }
  }
  // Kentering-Front im äußeren Bereich hinzufügen (für Marker)
  if (outerStauFrac !== null) stauFracs.unshift(outerStauFrac);

  // === GRADIENT AUFBAUEN ===
  const EPS = 0.0002;
  // stauFracs wurde ggf. mit outerStauFrac vorne ergänzt → Offset berücksichtigen
  const outerOffset = outerStauFrac !== null ? 1 : 0;
  const stauTransMapFixed = new Map();
  stauTransIdxs.forEach((si, j) => {
    stauTransMapFixed.set(si, stauFracs[j + outerOffset]);
  });

  const grad = ['interpolate', ['linear'], ['line-progress']];

  // Segment 0: Äußere Elbe mit Zeitinterpolation und Geschwindigkeitsgrenzen
  const outerEndFrac = fracs[14]; // Ende Segment 0 (bei Tn.43/wp14)

  // Stops für äußeres Segment in aufsteigender Reihenfolge der Fraktionen
  // Grundpunkte: Racon, Tn.7, Tn.17, Kugelbake, wp14
  const outerStops = [
    { f: fRacon,          cap: 1.0      },
    { f: fTn7  - EPS,     cap: 1.0      },
    { f: fTn7,            cap: 2.0      },  // Geschwindigkeitsgrenze
    { f: fTn17 - EPS,     cap: 2.0      },
    { f: fTn17,           cap: Infinity },  // volle Geschwindigkeit
    { f: fKugelbake,      cap: Infinity },
    { f: outerEndFrac - EPS, cap: Infinity },
  ];
  // Kentering-Front einfügen
  if (outerStauFrac !== null) {
    outerStops.push({ f: outerStauFrac - EPS, cap: _outerMaxKn(outerStauFrac - EPS), isStauPre: true });
    outerStops.push({ f: outerStauFrac,        cap: _outerMaxKn(outerStauFrac),       isStauPost: true });
  }
  outerStops.sort((a, b) => a.f - b.f);

  grad.push(0, _outerColor(outerStops[0].f, outerStops[0].cap));
  for (const stop of outerStops) {
    grad.push(stop.f, _outerColor(stop.f, stop.cap));
  }
  // Scharfer Übergang von Segment 0 auf Segment 1 am Segment-Ende (fracs[14])
  const colorAtOuterEnd = _outerColor(outerEndFrac, Infinity);
  if (stauTransMapFixed.has(1)) {
    grad.push(outerEndFrac, colorAtOuterEnd); // äußere Farbe läuft weiter bis Stau in Seg 1
  } else {
    grad.push(outerEndFrac, segColors[1]); // direkte Transition auf Segment 1
  }

  // Segmente 1-6: innere Elbe (Brunsbüttel bis Hamburg)
  for (let i = 1; i < segments.length; i++) {
    const bisWp = ELBE_STROMDATEN[segments[i].tableIdx].bisWp;
    const segEndFrac = fracs[bisWp];
    const isLast = i === segments.length - 1;

    if (stauTransMapFixed.has(i)) {
      const sf = stauTransMapFixed.get(i);
      const prevColor = i === 1 ? colorAtOuterEnd : segColors[i-1];
      grad.push(sf - EPS, prevColor);
      grad.push(sf, segColors[i]);
      grad.push(segEndFrac - EPS, segColors[i]);
      if (!isLast) grad.push(segEndFrac, segColors[i+1]);
      else grad.push(Math.min(1, segEndFrac), segColors[i]);
    } else if (!isLast && stauTransMapFixed.has(i + 1)) {
      grad.push(segEndFrac, segColors[i]);
    } else {
      grad.push(segEndFrac - EPS, segColors[i]);
      if (!isLast) grad.push(segEndFrac, segColors[i+1]);
      else grad.push(Math.min(1, segEndFrac), segColors[i]);
    }
  }

  // Stau-Koordinaten für GeoJSON-Marker
  const stauPoints = stauFracs.map(sf => _fracToCoord(sf, fracs));
  const stauGeoJSON = {
    type: 'FeatureCollection',
    features: stauPoints.map(coord => ({
      type: 'Feature', geometry: { type: 'Point', coordinates: coord }, properties: {}
    }))
  };

  const radarLineCoords = KARTE_WP.map(wp => [wp.lon, wp.lat]);
  try {
    _karteMap.addSource('stroem', {
      type: 'geojson',
      lineMetrics: true,
      data: { type: 'Feature', geometry: { type: 'LineString', coordinates: radarLineCoords } }
    });
    _karteMap.addLayer({
      id: 'stroem-line', type: 'line', source: 'stroem',
      layout: { 'line-cap': 'round', 'line-join': 'round' },
      paint: { 'line-width': 6, 'line-opacity': 0.75, 'line-gradient': grad }
    }, 'radarlinie-line');

    // Stauwasser-Marker (Halo + Punkt)
    _karteMap.addSource('stroem-stau', { type:'geojson', data: stauGeoJSON });
    _karteMap.addLayer({ id:'stroem-stau-halo', type:'circle', source:'stroem-stau',
      paint:{ 'circle-radius':14, 'circle-color':'#ffff00', 'circle-opacity':0.3 }
    });
    _karteMap.addLayer({ id:'stroem-stau-dot', type:'circle', source:'stroem-stau',
      paint:{ 'circle-radius':7, 'circle-color':'#ffff00', 'circle-stroke-width':2.5, 'circle-stroke-color':'#1a2332' }
    });

    const leg = document.getElementById('stroem-legend');
    if (leg) {
      leg.style.display = 'block';
      // Zeitstempel für HW/NW je Station anzeigen
      const _fmtTs = d => d ? d.toLocaleString('de-DE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '–';
      const _fmtDt = h => h !== null ? (h >= 0 ? `+${h.toFixed(1)}h` : `${h.toFixed(1)}h`) : '–';
      const dbg = document.getElementById('stroem-debug');
      if (dbg) dbg.innerHTML =
        `<div style="font-weight:600;margin-bottom:2px;color:#475569">Bezugspegel HW/NW</div>` +
        `<div>Cuxhaven &nbsp;HW ${_fmtTs(resCux?.hwTime)} | NW ${_fmtTs(resCux?.nwTime)} | dt ${_fmtDt(dtCux)}</div>` +
        `<div>Brunsbüttel HW ${_fmtTs(resBrb?.hwTime)} | NW ${_fmtTs(resBrb?.nwTime)} | dt ${_fmtDt(dtBrb)}</div>` +
        `<div>Hamburg &nbsp;&nbsp;&nbsp;HW ${_fmtTs(resStP?.hwTime)} | NW ${_fmtTs(resStP?.nwTime)} | dt ${_fmtDt(dtStP)}</div>` +
        `<div style="color:#94a3b8;margin-top:1px">Stand: ${new Date().toLocaleString('de-DE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})} Uhr</div>`;
    }
  } catch(e) { console.warn('Strömung:', e); }

  // Auto-Refresh alle 10 Minuten
  if (_karteOverlays.stroem) {
    _karteStroemTimer = setTimeout(_karteLoadStroem, 10 * 60 * 1000);
  }
}

function karteToggleOverlay(type, visible) {
  _karteOverlays[type] = visible;
  if (!_karteMap) return;
  if (type === 'grid') {
    ['grid-lines-layer','grid-labels-layer'].forEach(id => {
      if (_karteMap.getLayer(id)) _karteMap.setLayoutProperty(id, 'visibility', visible ? 'visible' : 'none');
    });
  } else if (type === 'seemap') {
    if (_karteMap.getLayer('openseamap-layer')) _karteMap.setLayoutProperty('openseamap-layer', 'visibility', visible ? 'visible' : 'none');
  } else if (type === 'pegel') {
    if (visible) _karteLoadPegel();
    else { _kartePegelMarkers.forEach(m => m.remove()); _kartePegelMarkers = []; }
  } else if (type === 'wind') {
    if (visible) _karteLoadWind();
    else { _karteWindMarkers.forEach(m => m.remove()); _karteWindMarkers = []; }
  } else if (type === 'tide') {
    if (visible) _karteLoadTides();
    else { _karteTideMarkers.forEach(m => m.remove()); _karteTideMarkers = []; }
  } else if (type === 'stroem') {
    if (visible) _karteLoadStroem();
    else _karteRemoveStroem();
  } else if (type === 'schiffe') {
    const panel = document.getElementById('karte-schiffe-panel');
    if (panel) panel.style.display = visible ? 'block' : 'none';
    if (visible) _karteStartShips();
    else _karteStopShips();
  } else if (type === 'radarlinie') {
    ['radarlinie-line','radarlinie-dots'].forEach(id => {
      if (_karteMap.getLayer(id)) _karteMap.setLayoutProperty(id, 'visibility', visible ? 'visible' : 'none');
    });
    if (_karteMap.getLayer('radarlinie-labels'))
      _karteMap.setLayoutProperty('radarlinie-labels', 'visibility', (visible && _karteOverlays.schnittpunkte) ? 'visible' : 'none');
    ['kurs-oben','kurs-unten'].forEach(id => {
      if (_karteMap.getLayer(id)) _karteMap.setLayoutProperty(id, 'visibility', (visible && _karteOverlays.kursdistanz) ? 'visible' : 'none');
    });
    const sub = document.getElementById('karte-radarlinie-sub');
    if (sub) sub.style.display = visible ? 'block' : 'none';
  } else if (type === 'schnittpunkte') {
    if (_karteMap.getLayer('radarlinie-labels'))
      _karteMap.setLayoutProperty('radarlinie-labels', 'visibility', (visible && _karteOverlays.radarlinie) ? 'visible' : 'none');
  } else if (type === 'kursdistanz') {
    ['kurs-oben','kurs-unten'].forEach(id => {
      if (_karteMap.getLayer(id)) _karteMap.setLayoutProperty(id, 'visibility', (visible && _karteOverlays.radarlinie) ? 'visible' : 'none');
    });
  } else if (type === 'seezeichen') {
    const filterPanel = document.getElementById('karte-seezeichen-filter');
    if (filterPanel) {
      filterPanel.style.display = visible ? 'block' : 'none';
      if (visible) {
        // Sync checkbox states from the filter object (fixes initialization)
        ['tonnen','richtfeuer','sektoren','leuchtfeuer','sonstige','labels'].forEach(k => {
          const el = document.getElementById('sz-filter-' + k);
          if (el) el.checked = _karteSeamarkFilter[k];
        });
      }
    }
    if (visible) {
      _karteLoadSeamarks();
      _karteMap.on('moveend', _karteSeamarkOnMove);
      _karteMap.on('zoomend', _karteSeamarkOnMove);
    } else {
      _karteSeamarkMarkers.forEach(m => m.remove()); _karteSeamarkMarkers = [];
      _karteSeamarkBbox = '';
      _karteMap.off('moveend', _karteSeamarkOnMove);
      _karteMap.off('zoomend', _karteSeamarkOnMove);
      if (_karteRangeLineRAF) { cancelAnimationFrame(_karteRangeLineRAF); _karteRangeLineRAF = null; }
      try {
        const _togStyle = _karteMap.getStyle();
        (_togStyle.layers || []).map(l => l.id).filter(id => /^karte-(sec|rl)-/.test(id))
          .forEach(id => { try { _karteMap.removeLayer(id); } catch(e) {} });
        Object.keys(_togStyle.sources || {}).filter(s => /^karte-(sec|rl)-/.test(s))
          .forEach(s => { try { _karteMap.removeSource(s); } catch(e) {} });
      } catch(e) {}
      _karteRangeLineLayers = [];
      _karteSectorLayers = [];
    }
  }
}

function karteSeamarkKennungChange(key, checked) {

function _karteGetKennungKey(t, smType) {
  const char_ = (t['seamark:light:character'] || t['seamark:light:1:character'] || '').replace(/\s/g, '');
  const period = parseFloat(t['seamark:light:period'] || t['seamark:light:1:period'] || '0');
  const group  = Math.max(1, parseInt(t['seamark:light:group'] || '1'));
  if (char_ && char_ !== 'F' && period > 0) {
    return char_ + (group > 1 ? `(${group})` : '') + ' ' + period + 's';
  }
  if (char_ === 'F') return 'Festfeuer';
  if (smType === 'buoy_lateral' || smType === 'beacon_lateral') {
    const col = (t['seamark:buoy_lateral:colour'] || t['seamark:beacon_lateral:colour'] || '').toLowerCase();
    return col.includes('red') ? 'Steuerbord' : col.includes('green') ? 'Backbord' : 'Lateral';
  }
  if (smType === 'buoy_cardinal' || smType === 'beacon_cardinal') {
    const cat = (t['seamark:buoy_cardinal:category'] || t['seamark:beacon_cardinal:category'] || '').toLowerCase();
    return cat ? 'Kardinal ' + cat : 'Kardinaltonne';
  }
  return 'Sonstige';
}

function _karteRenderKennungList(kennungSet) {
  const listEl = document.getElementById('sz-kennung-list');
  const checksEl = document.getElementById('sz-kennung-checks');
  if (!listEl || !checksEl) return;
  listEl.style.display = kennungSet.size ? 'block' : 'none';
  // Add new entries, keep existing state
  for (const key of [...kennungSet].sort()) {
    if (document.querySelector(`#sz-kennung-checks input[data-key="${CSS.escape(key)}"]`)) continue;
    const hidden = _karteSeamarkFilter.kennungenHide.has(key);
    const lbl = document.createElement('label');
    lbl.style.cssText = 'display:flex;align-items:center;gap:5px;font-size:10px;margin-bottom:2px;cursor:pointer';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.dataset.key = key;
    cb.checked = !hidden;
    cb.onchange = () => karteSeamarkKennungChange(key, cb.checked);
    lbl.appendChild(cb);
    lbl.appendChild(document.createTextNode(key));
    checksEl.appendChild(lbl);
  }
}

async function _karteLoadPegel() {
  if (!_karteMap) return;
  _kartePegelMarkers.forEach(m => m.remove()); _kartePegelMarkers = [];

  await Promise.allSettled(KARTE_PEGEL_STATIONS.map(async st => {
    try {
      const [currR, histR] = await Promise.allSettled([
        fetch(`https://www.pegelonline.wsv.de/webservices/rest-api/v2/stations/${st.uuid}/W/currentmeasurement.json`).then(r => r.json()),
        fetch(`https://www.pegelonline.wsv.de/webservices/rest-api/v2/stations/${st.uuid}/W/measurements.json?start=P1D`).then(r => r.json()),
      ]);
      const curr = currR.status === 'fulfilled' ? currR.value : null;
      const hist = histR.status === 'fulfilled' && Array.isArray(histR.value) ? histR.value : [];
      const currentCm = curr?.value ?? null;
      const valText = currentCm !== null ? `${Math.round(currentCm)} cm` : '–';

      // Mini-Tidekurve als SVG (kompakt)
      let svgHtml = '';
      if (hist.length > 5) {
        const vals = hist.map(p => p.value);
        const times = hist.map(p => new Date(p.timestamp).getTime());
        const vMin = Math.min(...vals), vMax = Math.max(...vals);
        const tMin = Math.min(...times), tMax = Math.max(...times);
        const PW = 120, PH = 32;
        const ptStr = hist.map((p, i) => {
          const x = ((times[i] - tMin) / (tMax - tMin || 1)) * PW;
          const y = PH - ((vals[i] - vMin) / (vMax - vMin || 1)) * PH;
          return `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${y.toFixed(1)}`;
        }).join(' ');
        let dotSvg = '';
        if (currentCm !== null) {
          const dotX = PW;
          const dotY = PH - ((currentCm - vMin) / (vMax - vMin || 1)) * PH;
          dotSvg = `<circle cx="${dotX.toFixed(1)}" cy="${Math.max(2,Math.min(PH-2,dotY)).toFixed(1)}" r="2.5" fill="#c9a227" stroke="#1b3d5f" stroke-width="1"/>`;
        }
        svgHtml = `<svg width="${PW}" height="${PH}" style="display:block;overflow:visible;margin:2px 0">
          <path d="${ptStr}" fill="none" stroke="#1b3d5f" stroke-width="1.5" stroke-linejoin="round"/>
          ${dotSvg}
        </svg>`;
      }

      const el = document.createElement('div');
      el.style.cssText = 'background:rgba(255,255,255,0.96);border:1.5px solid #1b3d5f;border-radius:6px;padding:4px 7px;font-size:10px;color:#1a2332;box-shadow:0 1px 5px rgba(0,0,0,0.15);min-width:140px;pointer-events:none';
      el.innerHTML = `
        <div style="display:flex;align-items:baseline;gap:6px;margin-bottom:1px">
          <span style="font-weight:700;font-size:10px;color:#1b3d5f">📊 ${st.label}</span>
          <span style="font-size:12px;font-weight:700;color:#0c4a6e">${valText}</span>
        </div>
        ${svgHtml}`;

      const marker = new maplibregl.Marker({ element: el, anchor: 'bottom-left', offset: [0, -2] })
        .setLngLat([st.lon, st.lat]).addTo(_karteMap);
      _kartePegelMarkers.push(marker);
    } catch(e) { console.warn('Pegel', st.label, e); }
  }));
}
