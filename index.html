// EPP ship data – Beispielwerte (werden durch gespeicherte EPPs überschrieben)
let eppSchiffsname       = 'MS Ameise';
let eppTiefgangSchiff    = '11.5';
let eppLiegeplatz        = 'CTA 1';
let eppTiefgangJederzeit = '10.0';
let eppATA               = '2026-03-09T16:30';
let eppVmanöver          = '8';
let eppVreise            = '15';
let eppWasserstand       = ''; // Wasserstandsvorhersage in m für Delta-Berechnung

// EPP Gezeitenvorhersage – je 2 Einträge pro Ort
const EPP_TIDE_LOCS = ['Cuxhaven','Brunsbuettel','Hamburg'];
let eppTiden = {
  Cuxhaven:     [{type:'HW',dt:'2026-03-09T10:31',ws:'750'},{type:'NW',dt:'2026-03-09T16:32',ws:'150'}],
  Brunsbuettel: [{type:'HW',dt:'2026-03-09T11:32',ws:'800'},{type:'NW',dt:'2026-03-09T17:32',ws:'100'}],
  Hamburg:      [{type:'HW',dt:'2026-03-09T14:32',ws:'850'},{type:'NW',dt:'2026-03-09T20:32',ws:'80'}],
};

// EPP ATA-Tabelle (Ankunftszeiten an den Wegpunkten)
let eppAtaLocs = {
  Hamburg:     '2026-03-09T16:30',
  Brunsbuettel:'2026-03-09T13:00',
  Glameyer:    '2026-03-09T11:00',
  ElbeRakon:   '',
  E3:          '2026-03-09T07:00',
};

// EPP Vorgabegeschwindigkeiten pro Abschnitt (für Rückwärtsberechnung)
let eppAtaSpeeds = {
  'E3-ElbeRakon':          '',
  'ElbeRakon-Glameyer':    '',
  'Glameyer-Brunsbuettel': '',
  'Brunsbuettel-Hamburg':  '',
};

// EPP Strömungsgeschwindigkeit pro Wegpunkt (für Fdw-Berechnung)
let eppAtaCurrents = { E3:'1.5', ElbeRakon:'1.2', Glameyer:'1.0', Brunsbuettel:'0.8', Hamburg:'' };

// ── Elbe-Stromdatenbank (WSA Elbe-Nordsee, 21.03.2024) ───────────────────────
// 50 Werte je Abschnitt: Index 0 = HW–6,5h … Index 25 = HW–0,25h
//                        Index 26 = HW±0     … Index 49 = HW+6,0h
// Vorzeichen: positiv = Flutstrom (Richtung Hamburg), negativ = Ebbstrom
const ELBE_CURRENT_DB = {
  Cuxhaven:     { section:'Tn 31–47',   values:[-2.8,-2.7,-2.7,-2.6,-2.4,-2.2,-2.1,-1.5,-1.0,-0.7,-0.4,0.0,0.8,1.3,1.7,1.9,2.2,2.3,2.4,2.5,2.5,2.4,2.4,2.3,2.2,2.0,1.7,1.6,1.3,1.2,1.0,0.6,0.3,0.0,-0.3,-0.5,-0.7,-1.1,-1.4,-1.7,-2.1,-2.3,-2.4,-2.6,-2.8,-2.9,-2.9,-2.9,-2.8,-2.8] },
  Brunsbuettel: { section:'Tn 47–55a',  values:[-2.3,-2.1,-2.0,-1.8,-1.6,-1.3,-0.9,-0.5,0.0,0.8,1.0,1.2,1.6,1.8,2.0,2.2,2.2,2.3,2.2,2.2,2.2,2.1,2.0,1.8,1.7,1.6,1.4,1.2,0.9,0.7,0.4,0.0,-0.3,-0.6,-0.9,-1.2,-1.3,-1.6,-1.8,-2.0,-2.2,-2.3,-2.3,-2.4,-2.4,-2.4,-2.3,-2.3,-2.2,-2.2] },
  Hamburg:      { section:'Tn 107–119', values:[-1.3,-1.2,-1.0,-0.6,0.0,0.8,1.3,1.7,2.0,2.2,2.3,2.4,2.3,2.3,2.2,2.1,2.0,1.8,1.7,1.6,1.4,1.3,1.1,0.9,0.6,0.3,0.0,-0.4,-0.7,-1.1,-1.4,-1.7,-1.9,-2.0,-2.1,-2.1,-2.1,-2.0,-2.0,-1.9,-1.8,-1.8,-1.7,-1.7,-1.6,-1.6,-1.5,-1.5,-1.4,-1.4] },
};
// Bezugsort-Mapping: Wegpunkt-Key → Station in ELBE_CURRENT_DB
const ELBE_CURRENT_BEZUG = {
  E3:'Cuxhaven', ElbeRakon:'Cuxhaven', Glameyer:'Cuxhaven',
  Brunsbuettel:'Brunsbuettel', Hamburg:'Hamburg',
};
// Gibt Stromgeschwindigkeit in kn zurück (positiv=Flut, negativ=Ebbe, 0=Stau, null=keine Daten)
function getElbeCurrent(ataDt, waypointKey) {
  const station = ELBE_CURRENT_BEZUG[waypointKey];
  if (!station) return null;
  const db = ELBE_CURRENT_DB[station];
  if (!db) return null;
  const tides = eppTiden[station];
  if (!tides || !tides.length) return null;
  const hwEvents = tides.filter(t => t.type === 'HW');
  if (!hwEvents.length) return null;
  const ataMs = ataDt instanceof Date ? ataDt.getTime() : new Date(ataDt).getTime();
  if (isNaN(ataMs)) return null;
  const nearest = hwEvents.reduce((a, b) =>
    Math.abs(new Date(a.dt) - ataMs) < Math.abs(new Date(b.dt) - ataMs) ? a : b
  );
  const offsetH = (ataMs - new Date(nearest.dt).getTime()) / 3600000;
  if (offsetH < -6.5 || offsetH > 6.25) return null;
  let idx;
  if      (offsetH < 0)    idx = Math.floor((offsetH + 6.5) / 0.25);
  else if (offsetH < 0.25) idx = 26;
  else                     idx = Math.floor((offsetH - 0.25) / 0.25) + 27;
  idx = Math.max(0, Math.min(49, idx));
  return db.values[idx];
}

// ── Wind Widget ──────────────────────────────────────────────────────────────

let _windRefreshTimer     = null;
let _pressureRefreshTimer = null;
let _windLastFetch        = null; // Zeitstempel des letzten erfolgreichen Fetches
const WIND_REFRESH_MS     = 15 * 60 * 1000; // 15 min = 4× pro Stunde
const WIND_MAX_AGE_MS     = 60 * 60 * 1000; // 1 h = max Datenalter
let _arMeteo = null; // Letzte Wetterdaten von Cuxhaven für das Umwelt-Dashboard

function _msToKn(ms) { return ms * 1.94384; }

function _msToBeaufort(ms) {
  const bfts = [0.3,1.6,3.4,5.5,8.0,10.8,13.9,17.2,20.8,24.5,28.5,32.7];
  for (let i = 0; i < bfts.length; i++) if (ms < bfts[i]) return i;
  return 12;
}

function _bftColor(bft) {
  if (bft <= 3) return '#16a34a';
  if (bft <= 5) return '#ca8a04';
  if (bft <= 7) return '#ea580c';
  return '#dc2626';
}

function _degToCompass(deg) {
  const d = ['N','NNO','NO','ONO','O','OSO','SO','SSO','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return d[Math.round(((deg % 360) + 360) % 360 / 22.5) % 16];
}

function _makeWindCompassSVG(deg, bft) {
  const sz = 76, cx = sz/2, cy = sz/2, r = sz/2 - 10;
  const col = _bftColor(bft);
  // Arrow points DOWNWIND (toward deg+180), tail at deg position (upwind source)
  const fromRad = ((deg - 90) * Math.PI / 180);
  const toRad   = ((deg + 180 - 90) * Math.PI / 180);
  const x1 = cx + Math.cos(fromRad) * r * 0.72;
  const y1 = cy + Math.sin(fromRad) * r * 0.72;
  const x2 = cx + Math.cos(toRad)   * r * 0.72;
  const y2 = cy + Math.sin(toRad)   * r * 0.72;
  const ticks = Array.from({length:16},(_,i) => {
    const a = (i * 22.5 - 90) * Math.PI / 180;
    const len = i%4===0 ? 6 : 3;
    const sw  = i%4===0 ? 1.5 : 0.8;
    const col2 = i%4===0 ? '#94a3b8' : '#cbd5e1';
    return `<line x1="${cx+Math.cos(a)*(r-len)}" y1="${cy+Math.sin(a)*(r-len)}" x2="${cx+Math.cos(a)*r}" y2="${cy+Math.sin(a)*r}" stroke="${col2}" stroke-width="${sw}"/>`;
  }).join('');
  const lbls = [{a:0,t:'N'},{a:90,t:'O'},{a:180,t:'S'},{a:270,t:'W'}].map(({a,t}) => {
    const lr = (a-90)*Math.PI/180;
    return `<text x="${cx+Math.cos(lr)*(r-11)}" y="${cy+Math.sin(lr)*(r-11)}" text-anchor="middle" dominant-baseline="central" font-size="7.5" font-weight="800" fill="#64748b">${t}</text>`;
  }).join('');
  const uid = 'ah' + Math.random().toString(36).slice(2,7);
  return `<svg viewBox="0 0 ${sz} ${sz}" width="${sz}" height="${sz}" style="overflow:visible">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    ${ticks}${lbls}
    <defs><marker id="${uid}" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="${col}"/>
    </marker></defs>
    <line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="2.8" stroke-linecap="round" marker-end="url(#${uid})"/>
    <circle cx="${x1}" cy="${y1}" r="3" fill="${col}" opacity="0.4"/>
  </svg>`;
}

function _renderWindStation(name, ms, dirDeg, gustMs, badge, stationInfo) {
  if (ms == null || dirDeg == null) {
    return `<div class="wind-station"><div class="wind-station-name">${name}</div><div class="wind-err">Keine Daten</div></div>`;
  }
  const kn   = _msToKn(ms);
  const bft  = _msToBeaufort(ms);
  const col  = _bftColor(bft);
  const comp = _degToCompass(dirDeg);
  const svg  = _makeWindCompassSVG(dirDeg, bft);
  const gustStr = gustMs != null ? `Böen: ${_msToKn(gustMs).toFixed(0)} kn` : '';
  return `<div class="wind-station">
    <div class="wind-station-name">${name}</div>
    <div class="wind-main">
      <div class="wind-compass">${svg}</div>
      <div class="wind-data">
        <div class="wind-speed-row">
          <span class="wind-kn">${kn.toFixed(0)}</span>
          <span class="wind-kn-unit">kn</span>
          <span class="wind-bft" style="background:${col}">${bft}</span>
        </div>
        <div class="wind-dir-label">aus ${comp} (${Math.round(dirDeg)}°)</div>
        ${gustStr ? `<div class="wind-gusts">${gustStr}</div>` : ''}
      </div>
    </div>
    <div class="wind-source" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%"><span class="${badge==='SYNOP'?'wind-badge-synop':'wind-badge-model'}">${badge}</span> ${stationInfo}</div>
  </div>`;
}

async function fetchWindData() {
  const inner = document.getElementById('ar-wind-inner');
  const meta  = document.getElementById('ar-wind-meta');
  const btn   = document.getElementById('ar-wind-refresh-btn');
  if (!inner) return;
  if (btn) btn.textContent = '⏳ Laden…';

  const results = { bakeA: null, cux: null, brb: null, hh: null };

  await Promise.allSettled([
    // Bake A – Open-Meteo Modell für exakte Position Elbe-Mündung (53.99°N, 8.49°E)
    // Keine SYNOP-Station an Bake A (Feuerschiff Elbe 1 kapselte 1999, nicht ersetzt)
    fetch('https://api.open-meteo.com/v1/forecast?latitude=53.99&longitude=8.49&current=wind_speed_10m,wind_direction_10m,wind_gusts_10m&wind_speed_unit=ms&timezone=UTC')
      .then(r => r.json())
      .then(d => {
        const c = d.current;
        results.bakeA = { ms: c.wind_speed_10m, dir: c.wind_direction_10m, gust: c.wind_gusts_10m, ts: c.time };
      }).catch(() => {}),

    // Cuxhaven – echter DWD SYNOP (station 00891)
    // Bright Sky liefert Windgeschwindigkeit in km/h → durch 3.6 in m/s umrechnen
    fetch('https://api.brightsky.dev/current_weather?dwd_station_id=00891')
      .then(r => r.json())
      .then(d => {
        const w = d.weather;
        results.cux = { ms: w.wind_speed_10 / 3.6, dir: w.wind_direction_10, gust: w.wind_gust_speed_10 / 3.6, ts: w.timestamp, src: d.sources?.[0]?.station_name,
          temp: w.temperature, dewpoint: w.dew_point, pressure: w.pressure_msl, visibility: w.visibility };
      }).catch(() => {}),

    // Brunsbüttel – Bright Sky SYNOP mit Koordinaten (gibt nächste aktive Station zurück: Freiburg/Elbe ~12 km)
    fetch('https://api.brightsky.dev/current_weather?lat=53.9196&lon=9.1417')
      .then(r => r.json())
      .then(d => {
        const w = d.weather;
        const stn = d.sources?.[0]?.station_name || 'DWD';
        results.brb = { ms: w.wind_speed_10 / 3.6, dir: w.wind_direction_10, gust: w.wind_gust_speed_10 / 3.6, ts: w.timestamp, src: stn, obsType: d.sources?.[0]?.observation_type };
      }).catch(() => {}),

    // Hamburg – DWD SYNOP via Bright Sky Koordinaten Hamburg-Hafen
    fetch('https://api.brightsky.dev/current_weather?lat=53.545&lon=9.966')
      .then(r => r.json())
      .then(d => {
        const w = d.weather;
        const stn = d.sources?.[0]?.station_name || 'Hamburg';
        results.hh = { ms: w.wind_speed_10 / 3.6, dir: w.wind_direction_10, gust: w.wind_gust_speed_10 / 3.6, ts: w.timestamp, src: stn, obsType: d.sources?.[0]?.observation_type };
      }).catch(() => {})
  ]);

  const fmtTs = ts => {
    if (!ts) return '';
    try {
      const d = new Date(ts);
      const now = new Date();
      const sameDay = d.getDate() === now.getDate() && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
      const timeStr = d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})+' Uhr';
      return sameDay ? timeStr : d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}) + ' ' + timeStr;
    } catch { return ''; }
  };

  const brbBadge = (results.brb?.obsType === 'synop') ? 'SYNOP' : 'Modell';
  const hhBadge  = (results.hh?.obsType  === 'synop') ? 'SYNOP' : 'Modell';

  inner.innerHTML =
    _renderWindStation('Bake A',
      results.bakeA?.ms, results.bakeA?.dir, results.bakeA?.gust,
      'Modell', 'Open-Meteo · ' + fmtTs(results.bakeA?.ts)) +
    _renderWindStation('Cuxhaven',
      results.cux?.ms, results.cux?.dir, results.cux?.gust,
      'SYNOP', 'DWD · ' + fmtTs(results.cux?.ts)) +
    _renderWindStation('Brunsbüttel',
      results.brb?.ms, results.brb?.dir, results.brb?.gust,
      brbBadge, (results.brb?.src || 'DWD') + ' · ' + fmtTs(results.brb?.ts)) +
    _renderWindStation('Hamburg',
      results.hh?.ms, results.hh?.dir, results.hh?.gust,
      hhBadge, (results.hh?.src || 'DWD') + ' · ' + fmtTs(results.hh?.ts));

  // Wetterdaten für Umwelt-Dashboard speichern und Kacheln aktualisieren
  if (results.cux) {
    _arMeteo = { temp: results.cux.temp, dewpoint: results.cux.dewpoint, pressure: results.cux.pressure, visibility: results.cux.visibility, ts: results.cux.ts };
    renderAstroDashboard();
  }

  _windLastFetch = Date.now();

  // Datenalter prüfen: älteste Beobachtungszeit aus allen Stationen ermitteln
  const obsTs = [results.bakeA?.ts, results.cux?.ts, results.brb?.ts, results.hh?.ts]
    .filter(Boolean).map(t => new Date(t).getTime()).filter(t => !isNaN(t));
  const oldestObs = obsTs.length ? Math.min(...obsTs) : null;
  const obsAgeMin = oldestObs ? Math.round((Date.now() - oldestObs) / 60000) : null;
  const isStale   = oldestObs && (Date.now() - oldestObs) > WIND_MAX_AGE_MS;

  if (meta) {
    const ageStr = obsAgeMin != null ? ` · Beobachtung vor ${obsAgeMin} Min.` : '';
    const staleWarn = isStale ? ' ⚠️ Daten älter als 1 h' : '';
    meta.textContent = 'Aktualisiert: ' + new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}) + ' Uhr · Quellen: DWD / Open-Meteo' + ageStr + staleWarn;
    meta.style.color = isStale ? '#dc2626' : '';
  }
  if (btn) btn.textContent = '↻ Aktualisieren';

  // Auto-refresh alle 15 Minuten (= 4× pro Stunde)
  if (_windRefreshTimer) clearTimeout(_windRefreshTimer);
  _windRefreshTimer = setTimeout(() => { if (document.getElementById('ar-wind-inner')) fetchWindData(); }, WIND_REFRESH_MS);
}

// ── Astronomie / Umwelt-Dashboard ────────────────────────────────────────────
function getMoonData() {
  if (typeof SunCalc === 'undefined') return null;
  const now = new Date();
  const illum = SunCalc.getMoonIllumination(now);
  const phase = illum.phase; // 0=Neu, 0.25=Erst.Viertel, 0.5=Voll, 0.75=Letzt.Viertel
  const ageDays = phase * 29.53;
  let phaseName, phaseIcon;
  if      (phase < 0.0625 || phase >= 0.9375) { phaseName = 'Neumond';        phaseIcon = '🌑'; }
  else if (phase < 0.1875)                     { phaseName = 'Zunehmend';      phaseIcon = '🌒'; }
  else if (phase < 0.3125)                     { phaseName = 'Erstes Viertel'; phaseIcon = '🌓'; }
  else if (phase < 0.4375)                     { phaseName = 'Zunehmend';      phaseIcon = '🌔'; }
  else if (phase < 0.5625)                     { phaseName = 'Vollmond';       phaseIcon = '🌕'; }
  else if (phase < 0.6875)                     { phaseName = 'Abnehmend';      phaseIcon = '🌖'; }
  else if (phase < 0.8125)                     { phaseName = 'Letztes Viertel';phaseIcon = '🌗'; }
  else                                         { phaseName = 'Abnehmend';      phaseIcon = '🌘'; }
  // Letztes Phasenereignis berechnen
  let lastEventName, daysSinceLast;
  if      (phase < 0.25) { lastEventName = 'Neumond';         daysSinceLast = phase * 29.53; }
  else if (phase < 0.50) { lastEventName = 'Erstes Viertel';  daysSinceLast = (phase - 0.25) * 29.53; }
  else if (phase < 0.75) { lastEventName = 'Vollmond';        daysSinceLast = (phase - 0.50) * 29.53; }
  else                   { lastEventName = 'Letztes Viertel'; daysSinceLast = (phase - 0.75) * 29.53; }
  const lastEventDate = new Date(now.getTime() - daysSinceLast * 86400000);
  const fmtEvent = d => d.toLocaleDateString('de-DE',{day:'numeric',month:'long'}) + ', ' + d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}) + ' Uhr';

  return { phase, ageDays, phaseName, phaseIcon, illumination: illum.fraction, lastEventName, lastEventDate, fmtEvent };
}

function getTidalAge(moonAgeDays) {
  const cyclePos = moonAgeDays % 14.765;
  const dist = Math.min(cyclePos, 14.765 - cyclePos);
  if (dist <= 2)  return { label: 'Springtide', color: '#dc2626', bg: '#fef2f2' };
  if (dist >= 5)  return { label: 'Niptide',    color: '#16a34a', bg: '#f0fdf4' };
  return               { label: 'Mittide',    color: '#ca8a04', bg: '#fffbeb' };
}

function getSunData() {
  if (typeof SunCalc === 'undefined') return null;
  const now = new Date();
  const times = SunCalc.getTimes(now, 53.9, 9.1); // Brunsbüttel
  const fmt = t => {
    if (!t || isNaN(t.getTime())) return '–';
    return t.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}) + ' Uhr';
  };
  const dayLen = (times.sunset - times.sunrise) / 60000;
  const h = Math.floor(dayLen / 60), m = Math.round(dayLen % 60);
  return { sunrise: fmt(times.sunrise), sunset: fmt(times.sunset), dayLength: `${h}h ${m}m` };
}

function renderAstroDashboard() {
  const el = document.getElementById('ar-astro-grid');
  if (!el) return;
  const moon = getMoonData();
  const sun  = getSunData();
  if (!moon || !sun) { el.innerHTML = '<div style="color:var(--text-muted);font-size:12px">SunCalc nicht geladen</div>'; return; }
  const tidal = getTidalAge(moon.ageDays);
  const distFromSpring = (() => { const c = moon.ageDays % 14.765; return Math.min(c, 14.765 - c); })();
  const tidalContext = distFromSpring <= 2
    ? `${distFromSpring.toFixed(1)} Tage nach Neu-/Vollmond`
    : distFromSpring >= 5
      ? `${(7.4 - distFromSpring + 7.4).toFixed(1)} Tage bis Springtide`
      : `Übergang (${distFromSpring.toFixed(1)} Tage)`;

  const fmtTemp = v => v != null ? v.toFixed(1) + ' °C' : '–';
  const fmtHpa  = v => v != null ? v.toFixed(1) + ' hPa' : '–';
  const fmtVis  = v => v != null ? (v >= 1000 ? (v/1000).toFixed(1) + ' km' : v + ' m') : '–';

  el.innerHTML = `
    <div class="astro-card">
      <div class="astro-card-title">🌙 Mond</div>
      <div class="astro-big"><span class="astro-moon-icon">${moon.phaseIcon}</span>${moon.phaseName}</div>
      <div class="astro-sub">Beleuchtung: ${Math.round(moon.illumination * 100)} % · Alter: ${moon.ageDays.toFixed(1)} Tage</div>
      <div class="astro-sub" style="margin-top:4px;color:var(--navy);font-weight:600">${moon.lastEventName}: ${moon.fmtEvent(moon.lastEventDate)}</div>
    </div>
    <div class="astro-card">
      <div class="astro-card-title">🌊 Alter der Gezeit</div>
      <div class="astro-big" style="color:${tidal.color}">${tidal.label}</div>
      <div><span class="tidal-badge" style="background:${tidal.bg};color:${tidal.color}">${tidalContext}</span></div>
    </div>
    <div class="astro-card">
      <div class="astro-card-title">☀️ Sonne · Brunsbüttel</div>
      <div class="astro-sun-row">
        <div class="astro-sun-item"><span>🌅</span><div><div>${sun.sunrise}</div><span class="lbl">Aufgang</span></div></div>
        <div class="astro-sun-item"><span>🌇</span><div><div>${sun.sunset}</div><span class="lbl">Untergang</span></div></div>
      </div>
      <div class="astro-sub">Tageslänge: ${sun.dayLength}</div>
    </div>
    <div class="astro-card">
      <div class="astro-card-title">🌡️ Wetter · Cuxhaven</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 10px;margin-top:2px">
        <div><div class="astro-sub">Temperatur</div><div style="font-size:15px;font-weight:700;color:var(--navy)">${fmtTemp(_arMeteo?.temp)}</div></div>
        <div><div class="astro-sub">Taupunkt</div><div style="font-size:15px;font-weight:700;color:var(--navy)">${fmtTemp(_arMeteo?.dewpoint)}</div></div>
        <div><div class="astro-sub">Luftdruck</div><div style="font-size:15px;font-weight:700;color:var(--navy)">${fmtHpa(_arMeteo?.pressure)}</div></div>
        <div><div class="astro-sub">Sichtweite</div><div style="font-size:15px;font-weight:700;color:var(--navy)">${fmtVis(_arMeteo?.visibility)}</div></div>
      </div>
      ${_arMeteo?.ts ? (() => {
        const tsDate = new Date(_arMeteo.ts);
        const ageMs = Date.now() - tsDate.getTime();
        const ageH = ageMs / 3600000;
        const tsStr = tsDate.toLocaleString('de-DE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) + ' Uhr';
        const color = ageH > 3 ? 'var(--danger)' : 'var(--text-muted)';
        return `<div class="astro-sub" style="margin-top:6px;color:${color}">Stand: ${tsStr}${ageH > 3 ? ' ⚠️' : ''}</div>`;
      })() : (_arMeteo ? '' : '<div class="astro-sub" style="margin-top:6px">Wird geladen…</div>')}
    </div>`;
}

const WEATHER_STATIONS = {
  helgoland:    { label: 'Helgoland',    apiParam: 'lat=54.1745&lon=7.8887' },
  cuxhaven:     { label: 'Cuxhaven',     apiParam: 'dwd_station_id=00891' },
  brunsbuettel: { label: 'Brunsbüttel',  apiParam: 'lat=53.9196&lon=9.1417' },
  hamburg:      { label: 'Hamburg',      apiParam: 'lat=53.545&lon=9.966'  },
};

// ── Pegelstände (Pegel Online WSV) ───────────────────────────────────────────
// Werte in cm über Pegelnullpunkt (PNP ≈ SKN / Seekartennull an Küstenstationen)
const PEGEL_STATIONS = [
  { key: 'cux', label: 'Cuxhaven',    km: 724, color: '#2563eb',
    uuid: 'aad49293-242a-43ad-a8b1-e91d7792c4b2' },
  { key: 'brb', label: 'Brunsbüttel', km: 695, color: '#0d9488',
    uuid: 'd4f5f719-8c52-4f8d-945d-1c31404cc628' },
  { key: 'hh',  label: 'Hamburg',     km: 623, color: '#d97706',
    uuid: 'd488c5cc-4de9-4631-8ce1-0db0e700b546' },
];
let _pegelHours = 24;
let _pegelData  = {};   // key → [{t, v}]

let _pressureHours   = 24;
let _pressureStation = 'cuxhaven';

function selectPressureStation(key) {
  _pressureStation = key;
  // Update dropdown display
  const sel = document.getElementById('pstation-select');
  if (sel) sel.value = key;
  // Update card title
  const title = document.getElementById('pchart-title');
  if (title) title.textContent = `📈 Verlaufskurven · ${WEATHER_STATIONS[key]?.label || key}`;
  fetchPressureHistory();
}

async function fetchPressureHistory(hours) {
  _pressureHours = hours || _pressureHours;
  const el = document.getElementById('ar-pressure-inner');
  if (!el) return;
  // Button-Highlighting
  [6,12,24,48,72].forEach(h => {
    const b = document.getElementById('pbtn-' + h);
    if (b) { b.style.background = h === _pressureHours ? 'var(--blue)' : 'var(--bg)'; b.style.color = h === _pressureHours ? '#fff' : ''; b.style.borderColor = h === _pressureHours ? 'var(--blue)' : 'var(--border)'; }
  });
  el.innerHTML = '<span style="color:var(--text-muted);font-size:12px">Laden…</span>';
  const station = WEATHER_STATIONS[_pressureStation] || WEATHER_STATIONS.cuxhaven;
  try {
    const now = new Date();
    const from = new Date(now.getTime() - _pressureHours * 3600000);
    const pad = n => String(n).padStart(2,'0');
    const fmtISO = d => `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())}T${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}:00`;
    const url = `https://api.brightsky.dev/weather?${station.apiParam}&date=${encodeURIComponent(fmtISO(from))}&last_date=${encodeURIComponent(fmtISO(now))}&tz=UTC`;
    const data = await fetch(url).then(r => r.json());
    const allPts = (data.weather || []).map(w => ({
      t: new Date(w.timestamp),
      p: w.pressure_msl,
      temp: w.temperature,
      dew: w.dew_point,
      vis: w.visibility,
      wind: w.wind_speed,
      windDir: w.wind_direction
    }));
    const ptsPressure = allPts.filter(w => w.p != null);
    const ptsTempDew  = allPts.filter(w => w.temp != null);
    const ptsVis      = allPts.filter(w => w.vis != null);
    const ptsWind     = allPts.filter(w => w.wind != null || w.windDir != null);
    if (!ptsPressure.length) { el.innerHTML = '<span style="color:var(--text-muted);font-size:12px">Keine Daten</span>'; return; }
    const tRange = { min: from.getTime(), max: now.getTime() };

    // Pegel parallel laden
    const pegelPeriod = _pressureHours <= 72 ? `PT${_pressureHours}H` : 'P3D';
    const BASE_PO = 'https://www.pegelonline.wsv.de/webservices/rest-api/v2/stations';
    await Promise.all(PEGEL_STATIONS.map(async st => {
      try {
        const pd = await fetch(`${BASE_PO}/${st.uuid}/W/measurements.json?start=${pegelPeriod}`).then(r => r.json());
        _pegelData[st.key] = (Array.isArray(pd) ? pd : []).map(m => ({ t: new Date(m.timestamp), v: m.value }));
      } catch { _pegelData[st.key] = []; }
    }));

    el.style.display = 'grid';
    el.style.gridTemplateColumns = 'repeat(2, 1fr)';
    el.style.gap = '16px';
    el.innerHTML =
      _renderPressureChart(ptsPressure, tRange) +
      (ptsWind.length ? _renderWindChart(ptsWind, tRange) : '<div></div>') +
      (ptsTempDew.length ? _renderTempDewChart(ptsTempDew, tRange) : '<div></div>') +
      (ptsVis.length ? _renderVisibilityChart(ptsVis, tRange) : '<div></div>') +
      `<div style="grid-column:1/-1">${_renderPegelChartWithHeader(tRange)}</div>`;
  } catch(e) { el.innerHTML = '<span style="color:var(--danger);font-size:12px">Fehler beim Laden</span>'; }
  // Auto-refresh alle 10 Minuten
  if (_pressureRefreshTimer) clearTimeout(_pressureRefreshTimer);
  _pressureRefreshTimer = setTimeout(() => { if (document.getElementById('ar-pressure-inner')) fetchPressureHistory(); }, 10 * 60 * 1000);
}

function _renderPegelChartWithHeader(tRange) {
  const currentRow = PEGEL_STATIONS.map(st => {
    const pts = _pegelData[st.key] || [];
    const last = pts[pts.length - 1];
    const val = last?.v;
    return `<span style="color:${st.color};font-weight:700">${st.label}: <span style="color:var(--navy)">${val != null ? val.toFixed(0) : '–'} cm</span></span>`;
  }).join('<span style="color:var(--border)"> · </span>');
  return `<div>
    <div style="font-size:10px;margin-bottom:4px;display:flex;flex-wrap:wrap;gap:6px;align-items:center">
      ${currentRow}
      <span style="font-size:9px;color:var(--text-muted);margin-left:auto">ü. PN</span>
    </div>
    ${_renderPegelChart(tRange)}
  </div>`;
}

// Generate evenly-spaced x-axis time labels across the full requested range
function _makeXLabels(tMin, tMax, W, padL, padR, H, padB) {
  const spanH = (tMax - tMin) / 3600000;
  const count = 6;
  const xOf = t => padL + (t - tMin) / (tMax - tMin) * (W - padL - padR);
  const multiDay = spanH > 24;
  let labels = '';
  for (let i = 0; i <= count; i++) {
    const t = tMin + (tMax - tMin) * i / count;
    const d = new Date(t);
    const time = d.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
    const lbl = multiDay
      ? d.toLocaleDateString('de-DE', {weekday:'short'}) + '\n' + time
      : time;
    if (multiDay) {
      const x = xOf(t).toFixed(1);
      labels += `<text x="${x}" y="${H-13}" text-anchor="middle" font-size="8" fill="#637485">${d.toLocaleDateString('de-DE',{weekday:'short'})}</text>`;
      labels += `<text x="${x}" y="${H-4}" text-anchor="middle" font-size="8" fill="#637485">${time}</text>`;
    } else {
      labels += `<text x="${xOf(t).toFixed(1)}" y="${H-4}" text-anchor="middle" font-size="9" fill="#637485">${time}</text>`;
    }
  }
  return labels;
}

function _renderPressureChart(pts, tRange) {
  const W = 700, H = 240, padL = 46, padR = 10, padT = 12, padB = 34;
  const tMin = tRange ? tRange.min : pts[0].t.getTime();
  const tMax = tRange ? tRange.max : pts[pts.length-1].t.getTime();
  const pVals = pts.map(p => p.p);
  const pCenter = (Math.min(...pVals) + Math.max(...pVals)) / 2;
  const pSpread = Math.max(Math.max(...pVals) - Math.min(...pVals), 0.5);
  const pMin = pCenter - pSpread / 2 - pSpread * 0.15;
  const pMax = pCenter + pSpread / 2 + pSpread * 0.15;
  const xOf = t => padL + (t - tMin) / (tMax - tMin) * (W - padL - padR);
  const yOf = p => padT + (1 - (p - pMin) / (pMax - pMin)) * (H - padT - padB);

  // Gradient fill path
  const linePts = pts.map(p => `${xOf(p.t.getTime()).toFixed(1)},${yOf(p.p).toFixed(1)}`).join(' ');
  const fillPts = `${xOf(pts[0].t.getTime()).toFixed(1)},${(H-padB).toFixed(1)} ` + linePts + ` ${xOf(pts[pts.length-1].t.getTime()).toFixed(1)},${(H-padB).toFixed(1)}`;

  // Gridlines & labels
  let gridLines = '', yLabels = '';
  for (let i = 0; i <= 4; i++) {
    const p = pMin + (pMax - pMin) * i / 4;
    const y = yOf(p).toFixed(1);
    gridLines += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#c8d6e2" stroke-width=".5"/>`;
    yLabels  += `<text x="${padL-4}" y="${parseFloat(y)+3}" text-anchor="end" font-size="9" fill="#637485">${p.toFixed(0)}</text>`;
  }
  const xLabels = _makeXLabels(tMin, tMax, W, padL, padR, H, padB);

  // Current value marker
  const last = pts[pts.length-1];
  const lx = xOf(last.t.getTime()), ly = yOf(last.p);
  const trend = pts.length > 1 ? (last.p - pts[0].p) : 0;
  const trendArrow = trend > 0.5 ? '↗' : trend < -0.5 ? '↘' : '→';
  const trendColor = trend > 0.5 ? '#16a34a' : trend < -0.5 ? '#dc2626' : '#637485';

  return `<div style="position:relative">
    <svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;overflow:visible">
      <defs>
        <linearGradient id="pgrd" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#2a6495" stop-opacity=".25"/>
          <stop offset="100%" stop-color="#2a6495" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${gridLines}${yLabels}${xLabels}
      <polygon points="${fillPts}" fill="url(#pgrd)"/>
      <polyline points="${linePts}" fill="none" stroke="#2a6495" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="3.5" fill="#2a6495"/>
      <text x="${Math.min(lx+6, W-padR-30).toFixed(1)}" y="${(ly-5).toFixed(1)}" font-size="10" font-weight="700" fill="#1b3d5f">${last.p.toFixed(1)} hPa</text>
    </svg>
    <div style="text-align:right;font-size:10px;margin-top:2px"><span style="color:${trendColor};font-weight:700">${trendArrow} ${Math.abs(trend).toFixed(1)} hPa</span> <span style="color:#94a3b8">Änderung über ${_pressureHours}h</span></div>
  </div>`;
}

function _renderTempDewChart(pts, tRange) {
  const W = 700, H = 240, padL = 38, padR = 10, padT = 12, padB = 34;
  const tMin = tRange ? tRange.min : pts[0].t.getTime();
  const tMax = tRange ? tRange.max : pts[pts.length-1].t.getTime();
  const temps = pts.filter(p => p.temp != null).map(p => p.temp);
  const dews  = pts.filter(p => p.dew  != null).map(p => p.dew);
  const allVals = [...temps, ...dews];
  const vCenter = (Math.min(...allVals) + Math.max(...allVals)) / 2;
  const vSpread = Math.max(Math.max(...allVals) - Math.min(...allVals), 1);
  const yMin = vCenter - vSpread / 2 - vSpread * 0.20;
  const yMax = vCenter + vSpread / 2 + vSpread * 0.20;
  const xOf = t => padL + (t - tMin) / (tMax - tMin) * (W - padL - padR);
  const yOf = v => padT + (1 - (v - yMin) / (yMax - yMin)) * (H - padT - padB);

  let gridLines = '', yLabels = '';
  for (let i = 0; i <= 4; i++) {
    const v = yMin + (yMax - yMin) * i / 4;
    const y = yOf(v).toFixed(1);
    gridLines += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#c8d6e2" stroke-width=".5"/>`;
    yLabels += `<text x="${padL-4}" y="${parseFloat(y)+3}" text-anchor="end" font-size="9" fill="#637485">${v.toFixed(1)}°</text>`;
  }
  const xLabels = _makeXLabels(tMin, tMax, W, padL, padR, H, padB);
  const tempLinePts = pts.filter(p => p.temp!=null).map(p => `${xOf(p.t.getTime()).toFixed(1)},${yOf(p.temp).toFixed(1)}`).join(' ');
  const dewLinePts  = pts.filter(p => p.dew!=null).map(p  => `${xOf(p.t.getTime()).toFixed(1)},${yOf(p.dew).toFixed(1)}`).join(' ');
  const lastT = [...pts].reverse().find(p => p.temp != null);
  const lastD = [...pts].reverse().find(p => p.dew  != null);
  return `<div>
    <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);margin-bottom:4px;display:flex;gap:10px">
      <span style="color:#2a6495">— Temperatur</span>
      <span style="color:#ca8a04">- - Taupunkt</span>
    </div>
    <svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;overflow:visible">
      ${gridLines}${yLabels}${xLabels}
      <polyline points="${tempLinePts}" fill="none" stroke="#2a6495" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
      <polyline points="${dewLinePts}"  fill="none" stroke="#ca8a04" stroke-width="1.8" stroke-dasharray="6 3" stroke-linejoin="round" stroke-linecap="round"/>
      ${lastT ? `<circle cx="${xOf(lastT.t.getTime()).toFixed(1)}" cy="${yOf(lastT.temp).toFixed(1)}" r="3" fill="#2a6495"/><text x="${Math.min(xOf(lastT.t.getTime())+5,W-padR-28).toFixed(1)}" y="${(yOf(lastT.temp)-4).toFixed(1)}" font-size="9" font-weight="700" fill="#2a6495">${lastT.temp.toFixed(1)}°C</text>` : ''}
      ${lastD ? `<circle cx="${xOf(lastD.t.getTime()).toFixed(1)}" cy="${yOf(lastD.dew).toFixed(1)}"  r="3" fill="#ca8a04"/><text  x="${Math.min(xOf(lastD.t.getTime())+5,W-padR-28).toFixed(1)}" y="${(yOf(lastD.dew)+12).toFixed(1)}"  font-size="9" font-weight="700" fill="#ca8a04">${lastD.dew.toFixed(1)}°C</text>` : ''}
    </svg>
  </div>`;
}

function _renderVisibilityChart(pts, tRange) {
  const W = 700, H = 240, padL = 46, padR = 10, padT = 12, padB = 34;
  const ptsk = pts.map(p => ({ t: p.t, v: p.vis / 1000 }));
  const tMin = tRange ? tRange.min : ptsk[0].t.getTime();
  const tMax = tRange ? tRange.max : ptsk[ptsk.length-1].t.getTime();
  const vals = ptsk.map(p => p.v);
  const vCenter = (Math.min(...vals) + Math.max(...vals)) / 2;
  const vSpread = Math.max(Math.max(...vals) - Math.min(...vals), 0.5);
  const yMin = Math.max(0, vCenter - vSpread / 2 - vSpread * 0.20);
  const yMax = vCenter + vSpread / 2 + vSpread * 0.20;
  const xOf = t => padL + (t - tMin) / (tMax - tMin) * (W - padL - padR);
  const yOf = v => padT + (1 - (v - yMin) / (yMax - yMin)) * (H - padT - padB);
  const visColor = v => v < 1 ? '#dc2626' : v < 2 ? '#ca8a04' : '#0891b2';

  let gridLines = '', yLabels = '';
  for (let i = 0; i <= 4; i++) {
    const v = yMin + (yMax - yMin) * i / 4;
    const y = yOf(v).toFixed(1);
    gridLines += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#c8d6e2" stroke-width=".5"/>`;
    yLabels += `<text x="${padL-4}" y="${parseFloat(y)+3}" text-anchor="end" font-size="9" fill="#637485">${v >= 10 ? v.toFixed(0) : v.toFixed(1)} km</text>`;
  }
  // Threshold reference lines (only if thresholds are within y-range)
  let refLines = '';
  if (yMin < 2 && yMax > 2) refLines += `<line x1="${padL}" y1="${yOf(2).toFixed(1)}" x2="${W-padR}" y2="${yOf(2).toFixed(1)}" stroke="#ca8a04" stroke-width=".8" stroke-dasharray="4 3" opacity=".7"/>`;
  if (yMin < 1 && yMax > 1) refLines += `<line x1="${padL}" y1="${yOf(1).toFixed(1)}" x2="${W-padR}" y2="${yOf(1).toFixed(1)}" stroke="#dc2626" stroke-width=".8" stroke-dasharray="4 3" opacity=".7"/>`;

  const xLabels = _makeXLabels(tMin, tMax, W, padL, padR, H, padB);

  // Build colored segments: group consecutive points by color
  const segments = [];
  let curColor = null, curSeg = [];
  for (const pt of ptsk) {
    const c = visColor(pt.v);
    if (c !== curColor) {
      if (curSeg.length > 0) { segments.push({ color: curColor, pts: curSeg }); curSeg = [curSeg[curSeg.length-1]]; }
      curColor = c;
    }
    curSeg.push(pt);
  }
  if (curSeg.length) segments.push({ color: curColor, pts: curSeg });

  const segLines = segments.map(seg => {
    const ptStr = seg.pts.map(p => `${xOf(p.t.getTime()).toFixed(1)},${yOf(p.v).toFixed(1)}`).join(' ');
    return `<polyline points="${ptStr}" fill="none" stroke="${seg.color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
  }).join('');

  const last = ptsk[ptsk.length-1];
  const lx = xOf(last.t.getTime()), ly = yOf(last.v);
  const lc = visColor(last.v);
  const fmtV = v => v >= 10 ? v.toFixed(0) : v.toFixed(1);
  return `<div>
    <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);margin-bottom:4px;display:flex;gap:10px">
      <span style="color:#0891b2">— Sichtweite</span>
      <span style="color:#ca8a04">— &lt;2 km</span>
      <span style="color:#dc2626">— &lt;1 km</span>
    </div>
    <svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;overflow:visible">
      ${gridLines}${yLabels}${refLines}${xLabels}
      ${segLines}
      <circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="3.5" fill="${lc}"/>
      <text x="${Math.min(lx+6,W-padR-32).toFixed(1)}" y="${(ly-5).toFixed(1)}" font-size="10" font-weight="700" fill="${lc}">${fmtV(last.v)} km</text>
    </svg>
  </div>`;
}

function _renderWindChart(pts, tRange) {
  const KMH_TO_KN = 0.53996;
  const speedPts = pts.filter(p => p.wind != null).map(p => ({ t: p.t, v: p.wind * KMH_TO_KN }));
  const dirPts   = pts.filter(p => p.windDir != null);
  if (!speedPts.length) return '<div style="color:var(--text-muted);font-size:11px;padding:8px">Keine Winddaten</div>';

  const W = 700, H = 240, padL = 46, padR = 46, padT = 12, padB = 34;
  const tMin = tRange ? tRange.min : speedPts[0].t.getTime();
  const tMax = tRange ? tRange.max : speedPts[speedPts.length-1].t.getTime();
  const speedVals = speedPts.map(p => p.v);
  const sMax = Math.max(Math.max(...speedVals) * 1.20, 3);
  const xOf = t => padL + (t - tMin) / (tMax - tMin) * (W - padL - padR);
  const yOfS = v => padT + (1 - v / sMax) * (H - padT - padB);
  const yOfD = v => padT + (1 - v / 360) * (H - padT - padB);

  let gridLines = '', yLabels = '', yRLabels = '';
  for (let i = 0; i <= 4; i++) {
    const v = sMax * i / 4;
    const y = yOfS(v).toFixed(1);
    gridLines += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#c8d6e2" stroke-width=".5"/>`;
    yLabels += `<text x="${padL-4}" y="${parseFloat(y)+3}" text-anchor="end" font-size="9" fill="#637485">${v.toFixed(1)} kn</text>`;
  }
  for (const [deg, lbl] of [[0,'N'],[90,'E'],[180,'S'],[270,'W'],[360,'N']]) {
    yRLabels += `<text x="${W-padR+4}" y="${(yOfD(deg)+3).toFixed(1)}" text-anchor="start" font-size="9" fill="#9333ea">${lbl}</text>`;
  }
  const xLabels = _makeXLabels(tMin, tMax, W, padL, padR, H, padB);

  const speedLinePts = speedPts.map(p => `${xOf(p.t.getTime()).toFixed(1)},${yOfS(p.v).toFixed(1)}`).join(' ');

  let dirPathD = '', prevDeg = null;
  for (const p of dirPts) {
    if (p.windDir == null) { prevDeg = null; continue; }
    const x = xOf(p.t.getTime()).toFixed(1), y = yOfD(p.windDir).toFixed(1);
    if (prevDeg === null || Math.abs(p.windDir - prevDeg) > 180) dirPathD += `M ${x} ${y}`;
    else dirPathD += ` L ${x} ${y}`;
    prevDeg = p.windDir;
  }

  const last = speedPts[speedPts.length - 1];
  const lx = xOf(last.t.getTime()), ly = yOfS(last.v);
  return `<div>
    <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);margin-bottom:4px;display:flex;gap:10px">
      <span style="color:#1d6fa5">— Windstärke (kn)</span>
      <span style="color:#9333ea">- - Windrichtung</span>
    </div>
    <svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;overflow:visible">
      ${gridLines}${yLabels}${yRLabels}${xLabels}
      <polyline points="${speedLinePts}" fill="none" stroke="#1d6fa5" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
      ${dirPathD ? `<path d="${dirPathD}" fill="none" stroke="#9333ea" stroke-width="1.5" stroke-dasharray="6 3" stroke-linejoin="round" stroke-linecap="round"/>` : ''}
      <circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="3" fill="#1d6fa5"/>
      <text x="${Math.min(lx+5,W-padR-24).toFixed(1)}" y="${(ly-5).toFixed(1)}" font-size="9" font-weight="700" fill="#1d6fa5">${last.v.toFixed(1)} kn</text>
    </svg>
  </div>`;
}

// ── Pegelstände: Fetch & Render ───────────────────────────────────────────────
async function fetchPegelData(hours) {
  if (hours) _pegelHours = hours;
  const elChart = document.getElementById('ar-pegel-inner');
  const elCur   = document.getElementById('ar-pegel-current');
  if (!elChart) return;
  elChart.innerHTML = '<span style="color:var(--text-muted);font-size:12px">Laden…</span>';
  [6, 12, 24, 48].forEach(h => {
    const b = document.getElementById('pgbtn-' + h);
    if (b) { b.style.background = h === _pegelHours ? 'var(--blue)' : 'var(--bg)'; b.style.color = h === _pegelHours ? '#fff' : ''; b.style.borderColor = h === _pegelHours ? 'var(--blue)' : 'var(--border)'; }
  });
  const BASE = 'https://www.pegelonline.wsv.de/webservices/rest-api/v2/stations';
  await Promise.all(PEGEL_STATIONS.map(async st => {
    try {
      const url = `${BASE}/${st.uuid}/W/measurements.json?start=PT${_pegelHours}H`;
      const data = await fetch(url).then(r => r.json());
      _pegelData[st.key] = (Array.isArray(data) ? data : []).map(m => ({ t: new Date(m.timestamp), v: m.value }));
    } catch { _pegelData[st.key] = []; }
  }));
  if (elCur) elCur.innerHTML = _renderPegelCurrent();
  const now = new Date();
  const tRange = { min: now.getTime() - _pegelHours * 3600000, max: now.getTime() };
  elChart.innerHTML = _renderPegelChart(tRange);
}

function _renderPegelCurrent() {
  return PEGEL_STATIONS.map(st => {
    const pts = _pegelData[st.key] || [];
    const last = pts[pts.length - 1];

    const ts = last ? last.t.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}) + ' Uhr' : '';

      <div style="font-size:22px;font-weight:800;color:var(--navy);line-height:1.2">${val != null ? val.toFixed(0) : '–'}</div>
      <div style="font-size:10px;color:var(--text-muted)">cm ü. PN (Pegelnull)</div>
      ${ts ? `<div style="font-size:9px;color:var(--text-muted);margin-top:3px">${ts}</div>` : ''}

}

function _renderPegelChart(tRange) {
  const W = 700, H = 240, padL = 46, padR = 10, padT = 12, padB = 34;
  const tMin = tRange.min, tMax = tRange.max;
  const allVals = PEGEL_STATIONS.flatMap(st => (_pegelData[st.key] || []).map(p => p.v)).filter(v => v != null);
  if (!allVals.length) return '<span style="color:var(--text-muted);font-size:12px">Keine Pegeldaten verfügbar</span>';
  const vMin0 = Math.min(...allVals), vMax0 = Math.max(...allVals);
  const vCenter = (vMin0 + vMax0) / 2;
  const vSpread = Math.max(vMax0 - vMin0, 80);
  const yMin = vCenter - vSpread / 2 - vSpread * 0.12;
  const yMax = vCenter + vSpread / 2 + vSpread * 0.12;
  const xOf = t => padL + (t - tMin) / (tMax - tMin) * (W - padL - padR);
  const yOf = v => padT + (1 - (v - yMin) / (yMax - yMin)) * (H - padT - padB);
  let gridLines = '', yLabels = '';
  for (let i = 0; i <= 4; i++) {
    const v = yMin + (yMax - yMin) * i / 4;
    const y = yOf(v).toFixed(1);
    gridLines += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#c8d6e2" stroke-width=".5"/>`;
    yLabels   += `<text x="${padL-4}" y="${parseFloat(y)+3}" text-anchor="end" font-size="9" fill="#637485">${v.toFixed(0)}</text>`;
  }
  const xLabels = _makeXLabels(tMin, tMax, W, padL, padR, H, padB);
  const lines = PEGEL_STATIONS.map(st => {
    const pts = (_pegelData[st.key] || []).filter(p => p.v != null && p.t.getTime() >= tMin);
    if (!pts.length) return '';
    const ptStr = pts.map(p => `${xOf(p.t.getTime()).toFixed(1)},${yOf(p.v).toFixed(1)}`).join(' ');
    const last = pts[pts.length - 1];
    return `<polyline points="${ptStr}" fill="none" stroke="${st.color}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round" opacity=".9"/>
      <circle cx="${xOf(last.t.getTime()).toFixed(1)}" cy="${yOf(last.v).toFixed(1)}" r="3" fill="${st.color}"/>`;
  }).join('');
  const legend = PEGEL_STATIONS.map(st => `<span style="color:${st.color}">— ${st.label}</span>`).join('');
  return `<div>
    <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);margin-bottom:4px;display:flex;gap:12px;flex-wrap:wrap">
      ${legend}
      <span style="font-weight:400;margin-left:auto">cm ü. PN (Pegelnullpunkt) · SKN ≈ PN − 20…50 cm</span>
    </div>
    <svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;overflow:visible">
      ${gridLines}${yLabels}${xLabels}${lines}
    </svg>
  </div>`;
}

// ── Aktuelle Reise Hilfsfunktionen ───────────────────────────────────────────

// Wie getElbeCurrent, aber liest aus tideDbs (BSH-Datenbank) statt eppTiden
function getElbeCurrentFromDb(ataDt, wpKey) {
  const wp = AR_WAYPOINTS.find(w => w.key === wpKey);
  if (!wp) return null;
  const dbValues = ELBE_CURRENT_DB[wp.db];
  if (!dbValues) return null;
  const tides = (tideDbs[wp.db] || []).filter(t => t.type === 'HW');
  if (!tides.length) return null;
  const ataMs = (ataDt instanceof Date ? ataDt : new Date(ataDt)).getTime();
  if (isNaN(ataMs)) return null;
  const nearest = tides.reduce((a,b) =>
    Math.abs(new Date(a.dt)-ataMs) < Math.abs(new Date(b.dt)-ataMs) ? a : b);
  const offsetH = (ataMs - new Date(nearest.dt).getTime()) / 3600000;
  if (offsetH < -6.5 || offsetH > 6.25) return null;
  let idx = offsetH < 0 ? Math.floor((offsetH+6.5)/0.25)
          : offsetH < 0.25 ? 26
          : Math.floor((offsetH-0.25)/0.25)+27;
  return dbValues.values[Math.max(0,Math.min(49,idx))];
}

// Iterative ETA-Berechnung mit Strömungskorrektur
function arCalcETAs(entry, veff) {
  const isEinkommend = !!entry.einkommend;
  const startKey = AR_VON_KEY[entry.streckeVon]  || 'ElbeRacon';
  const endKey   = AR_NACH_KEY[entry.streckeNach] || 'Hamburg';
  const startNm  = AR_WAYPOINTS.find(w=>w.key===startKey)?.nm ?? 0;
  const endNm    = AR_WAYPOINTS.find(w=>w.key===endKey)?.nm   ?? 89;
  let wps;
  if (isEinkommend) {
    wps = AR_WAYPOINTS.filter(w => w.nm >= startNm && w.nm <= endNm);
  } else {
    wps = AR_WAYPOINTS.filter(w => w.nm <= startNm && w.nm >= endNm).reverse();
  }
  if (!wps.length) return [];
  let currentMs = new Date(entry.anBord).getTime();
  if (isNaN(currentMs)) return [];
  const results = [];
  for (let i = 0; i < wps.length; i++) {
    const wp = wps[i];
    const current = getElbeCurrentFromDb(new Date(currentMs), wp.key) ?? 0;
    // Strömungsbegrenzung: letzte/erste 5 sm um Elbe-Racon max. 1 kn
    // → gilt für Tonne-7→Racon-Leg (einkommend) und Racon→Tonne-7-Leg (ausgehend)
    const nextWp = i < wps.length - 1 ? wps[i+1] : null;
    const nearRacon = wp.key === 'ElbeRacon' ||
                      (wp.key === 'Tonne7' && nextWp?.key === 'ElbeRacon');
    const effectiveCurrent = nearRacon
      ? Math.sign(current) * Math.min(Math.abs(current), 1.0)
      : current;
    // SOG: manuell (Wahre SOG) überschreibt Berechnung
    const sogOverridden = wp.key in arWpSog;
    const sog = sogOverridden
      ? Math.max(0.5, arWpSog[wp.key])
      : Math.max(0.5, isEinkommend ? veff + effectiveCurrent : veff - effectiveCurrent);
    results.push({ wp, timeMs: currentMs, current, effectiveCurrent, sog, sogOverridden });
    if (nextWp) {
      const dist = Math.abs(nextWp.nm - wp.nm);
      currentMs += (dist / sog) * 3600000;
    }
  }
  return results;
}

// Gezeitenstatus zu beliebigem Zeitpunkt (nutzt tideDbs)
function arTideStatusAtTime(dbKey, refMs) {
  const db = tideDbs[dbKey] || [];
  if (!db.length) return null;
  const STAU_MS = 15 * 60 * 1000;
  const offset = { Cuxhaven:0, Brunsbuettel:3600000, Hamburg:0 }[dbKey] || 0;
  const sorted = [...db].sort((a,b) => new Date(a.dt)-new Date(b.dt));
  const shifted = sorted.map(e => ({ t: new Date(e.dt).getTime()+offset, type:e.type, orig:e }));
  for (const ev of shifted) if (Math.abs(ev.t-refMs) <= STAU_MS) return 'stau';
  let last = null;
  for (const ev of shifted) if (ev.t <= refMs) last = ev;
  if (last) return last.type==='HW' ? 'ebbe' : 'flut';
  return shifted[0]?.type==='HW' ? 'flut' : 'ebbe';
}

// Zeitformatierung: nur Uhrzeit wenn gleicher Tag, sonst "DD.MM. HH:MM Uhr"
function fmtTideTime(isoStr, refMs) {
  if (!isoStr) return '—';
  const d = new Date(isoStr), ref = new Date(refMs);
  if (isNaN(d)) return '—';
  const p = n => String(n).padStart(2,'0');
  const sameDay = d.getFullYear()===ref.getFullYear()
               && d.getMonth()===ref.getMonth()
               && d.getDate()===ref.getDate();
  const t = `${p(d.getHours())}:${p(d.getMinutes())} Uhr`;
  return sameDay ? t : `${p(d.getDate())}.${p(d.getMonth()+1)}. ${t}`;
}

// Input-Handler für manuelle Geschwindigkeit
function arSetManuelleV(val) {
  arManuelleV = val;
  const entry = fahrten.find(f=>f.id===aktuelleReiseId) || fahrten[0];
  if (entry) renderFahrtDashboard(entry);
}

// Input-Handler für wahre SOG je Wegpunkt
function arSetWpSog(wpKey, val) {
  const v = parseFloat(val);
  if (val && !isNaN(v) && v > 0) arWpSog[wpKey] = v;
  else delete arWpSog[wpKey];
  const entry = fahrten.find(f=>f.id===aktuelleReiseId) || fahrten[0];
  if (entry) renderFahrtDashboard(entry);
}

// Fahrt als PDF exportieren — A4-Dashboard, eine Seite
function exportFahrtPDF(entryId) {
  const entry = fahrten.find(f=>f.id===entryId);
  if (!entry) return;

  // ── Hilfsfunktionen ────────────────────────────────────────────────────────
  const esc2  = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const fmtDTl = dt => { if(!dt)return'—'; const d=new Date(dt); return isNaN(d)?'—':d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})+' Uhr'; };
  const fmtDl  = dt => { if(!dt)return'—'; const d=new Date(dt); return isNaN(d)?'—':d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'}); };
  const fmtTl  = dt => { if(!dt)return'—'; const d=new Date(dt); return isNaN(d)?'—':d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}); };
  const fmtMsl = ms => { const d=new Date(ms); return d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}); };
  const fmtDurl= m  => `${Math.floor(m/60)}h ${String(m%60).padStart(2,'0')}m`;

  // ── ETA-Berechnung ─────────────────────────────────────────────────────────
  const veff       = parseFloat(arManuelleV) || parseFloat(entry.vmax) || null;
  const etaResults = veff && entry.anBord ? arCalcETAs(entry, veff) : [];
  const vLabel     = arManuelleV ? `${parseFloat(arManuelleV).toFixed(1)} kn (manuell)` : (entry.vmax ? `${parseFloat(entry.vmax).toFixed(1)} kn (Vmax)` : '—');
  const richtungTxt= entry.einkommend ? '← Einkommend' : entry.ausgehend ? '→ Ausgehend' : '—';

  // ── Strömungsverlauf SVG ────────────────────────────────────────────────────
  let stromSvg = '';
  if (etaResults.length >= 2) {
    const W=540, H=78, PL=30, PR=8, PT=8, PB=22;
    const cW=W-PL-PR, cH=H-PT-PB, yMax=3.5, zeroY=PT+cH/2;
    const xS = idx => PL + (idx/(etaResults.length-1))*cW;
    const yS = v   => PT + cH/2 - (v/yMax)*(cH/2);
    let grid='';
    [-3,-2,-1,0,1,2,3].forEach(kn=>{
      const y=yS(kn), iz=kn===0;
      grid+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="${iz?'#94a3b8':'#e2e8f0'}" stroke-width="${iz?1.2:0.7}" ${iz?'':'stroke-dasharray="3,3"'}/>`;
      grid+=`<text x="${PL-3}" y="${y+3.5}" text-anchor="end" font-size="7" fill="${iz?'#334155':'#94a3b8'}" ${iz?'font-weight="600"':''}>${kn>0?'+':''}${kn}</text>`;
    });
    const toD = v => entry.einkommend ? v : -v;
    const pts = etaResults.map((r,i)=>({x:xS(i),y:yS(toD(r.effectiveCurrent))}));
    let cD=`M ${pts[0].x.toFixed(1)} ${pts[0].y.toFixed(1)}`;
    for(let i=0;i<pts.length-1;i++){
      const p0=pts[Math.max(i-1,0)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(i+2,pts.length-1)];
      cD+=` C ${(p1.x+(p2.x-p0.x)/6).toFixed(1)} ${(p1.y+(p2.y-p0.y)/6).toFixed(1)} ${(p2.x-(p3.x-p1.x)/6).toFixed(1)} ${(p2.y-(p3.y-p1.y)/6).toFixed(1)} ${pts[i+1].x.toFixed(1)} ${pts[i+1].y.toFixed(1)}`;
    }
    const fp=`${cD} L ${pts[pts.length-1].x.toFixed(1)} ${zeroY} L ${pts[0].x.toFixed(1)} ${zeroY} Z`;
    let xlbls='', dots='';
    etaResults.forEach((r,i)=>{

// ── IndexedDB: persistenter Hauptspeicher (überlebt App-Updates) ─────────────
const IDB_NAME = 'seelotse_idb';
const IDB_VER  = 1;
let _idb = null;

function _openIDB() {
  if (_idb) return Promise.resolve(_idb);
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, IDB_VER);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('fahrten'))    db.createObjectStore('fahrten',    { keyPath: 'id' });
      if (!db.objectStoreNames.contains('eppFahrten')) db.createObjectStore('eppFahrten', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('tideDbs'))    db.createObjectStore('tideDbs',    { keyPath: 'station' });
    };
    req.onsuccess = e => { _idb = e.target.result; resolve(_idb); };
    req.onerror   = () => reject(req.error);
  });
}

async function _idbGetAll(store) {
  const db = await _openIDB();
  return new Promise((res, rej) => {
    const req = db.transaction(store, 'readonly').objectStore(store).getAll();
    req.onsuccess = () => res(req.result);
    req.onerror   = () => rej(req.error);
  });
}

async function _idbPutAll(store, items) {
  const db = await _openIDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const s  = tx.objectStore(store);
    s.clear();
    items.forEach(item => s.put(item));
    tx.oncomplete = res;
    tx.onerror    = () => rej(tx.error);
  });
}

// ── fahrten ─────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const rows = await _idbGetAll('fahrten');
    if (rows && rows.length > 0) { fahrten = rows; return; }
    // Migration: localStorage → IDB
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { fahrten = JSON.parse(raw); _idbPutAll('fahrten', fahrten).catch(() => {}); }
  } catch(e) {
    try { const r = localStorage.getItem(STORAGE_KEY); if (r) fahrten = JSON.parse(r); }
    catch(e2) { fahrten = []; }
  }
}
function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(fahrten)); // sync-Fallback
  _idbPutAll('fahrten', fahrten).catch(() => {});             // primärer Store
  updateAgenturDatalist();
}
function updateAgenturDatalist() {
  const dl = document.getElementById('agentur-list');
  if (!dl) return;
  const seen = new Set();
  fahrten.forEach(f => { if (f.agentur && f.agentur.trim()) seen.add(f.agentur.trim()); });
  dl.innerHTML = Array.from(seen).sort()
    .map(a => `<option value="${a.replace(/"/g,'&quot;')}">`)
    .join('');
}

async function loadTideDbs() {
  try {
    const rows = await _idbGetAll('tideDbs');
    if (rows && rows.length > 0) {
      tideDbs = { Cuxhaven:[], Brunsbuettel:[], Hamburg:[] };
      rows.forEach(r => { if (tideDbs[r.station] !== undefined) tideDbs[r.station] = r.entries; });

    const raw = localStorage.getItem(TIDE_DB_STORAGE_KEY);
    if (raw) {
      tideDbs = JSON.parse(raw);
      _idbPutAll('tideDbs', Object.entries(tideDbs).map(([station, entries]) => ({ station, entries }))).catch(() => {});
    }
  } catch(e) {
    try { const r = localStorage.getItem(TIDE_DB_STORAGE_KEY); if (r) tideDbs = JSON.parse(r); }
    catch(e2) { tideDbs = { Cuxhaven:[], Brunsbuettel:[], Hamburg:[] }; }

function parseBSHTideFile(text) {
  const entries = [];
  const p2 = n => String(n).padStart(2, '0');
  text.split('\n').forEach(line => {
    const l = line.trim();
    if (!l.startsWith('VB2#')) return;
    const f = l.split('#');
    if (f.length < 8) return;
    const typeRaw = f[3].trim();
    const type    = typeRaw === 'H' ? 'HW' : typeRaw === 'N' ? 'NW' : null;
    if (!type) return;
    // Date: " 1. 1.2026" → split by "." → [" 1", " 1", "2026"]
    const dp = f[5].trim().split('.');
    if (dp.length < 3) return;
    const day = parseInt(dp[0], 10), month = parseInt(dp[1], 10), year = parseInt(dp[2], 10);
    if (isNaN(day) || isNaN(month) || isNaN(year)) return;
    // Time: " 4:50"
    const tp = f[6].trim().split(':');
    if (tp.length < 2) return;
    const hour = parseInt(tp[0], 10), min = parseInt(tp[1], 10);
    if (isNaN(hour) || isNaN(min)) return;
    // Water level: meters → cm
    const wsMeter = parseFloat(f[7]);
    if (isNaN(wsMeter)) return;
    const ws = String(Math.round(wsMeter * 100));
    const dt = `${year}-${p2(month)}-${p2(day)}T${p2(hour)}:${p2(min)}`;
    entries.push({ type, dt, ws });
  });
  return entries;
}

function importTideDb(stationKey, input) {

  // Referenzzeit für Gezeitenvorhersage: immer Stichtag (nicht ATA — ATA ist für Strömungsberechnung)
  const refRaw = eppStichtag || '';
  const refDt  = refRaw ? new Date(refRaw) : new Date();

    if (upcoming.length >= 2) eppTiden[loc][1] = Object.assign({}, upcoming[1]);

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function uid() {
  return 'f' + Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}

function calcDuration(start, end) {
  if (!start || !end) return null;
  const ms = new Date(end) - new Date(start);
  if (ms <= 0) return null;
  const totalMin = Math.round(ms / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  return h > 0 ? `${h}:${String(m).padStart(2,'0')} h` : `${m} Min`;
}

function getEinsatzdauer(entry, allEntries) {
  // Case 1: Both Abfahrt and Ankunft in same entry → direct calculation
  if (entry.abfahrt && entry.ankunft) {
    return { dur: calcDuration(entry.abfahrt, entry.ankunft), cross: false };
  }

  // Case 2: Einkommend entry (has Ankunft, no Abfahrt) → cross-entry with Ausgehend
  if (entry.einkommend && entry.ankunft && !entry.abfahrt) {
    const ankunftTime = new Date(entry.ankunft);
    // All Ausgehend entries whose Abfahrt precedes our Ankunft, newest first
    const candidates = allEntries
      .filter(e => e.id !== entry.id
                && e.ausgehend === true
                && e.abfahrt
                && new Date(e.abfahrt) < ankunftTime)
      .sort((a, b) => new Date(b.abfahrt) - new Date(a.abfahrt));

    for (const partner of candidates) {
      const partnerTime = new Date(partner.abfahrt);
      // Plausibility: no other Einkommend entry between partner.abfahrt and our ankunft
      const valid = !allEntries.some(e =>
        e.id !== entry.id
        && e.id !== partner.id
        && e.einkommend === true
        && e.ankunft
        && new Date(e.ankunft) > partnerTime
        && new Date(e.ankunft) < ankunftTime
      );
      if (valid) {
        return { dur: calcDuration(partner.abfahrt, entry.ankunft), cross: true };
      }
    }
  }

  return null;
}

// Returns Einsatzdauer in milliseconds (for dashboard comparisons)
function getEinsatzdauerMs(entry, allEntries) {
  if (entry.abfahrt && entry.ankunft) {
    const ms = new Date(entry.ankunft) - new Date(entry.abfahrt);
    return ms > 0 ? ms : null;
  }
  if (entry.einkommend && entry.ankunft && !entry.abfahrt) {
    const ankunftTime = new Date(entry.ankunft);
    const candidates = allEntries
      .filter(e => e.id !== entry.id && e.ausgehend === true && e.abfahrt
                && new Date(e.abfahrt) < ankunftTime)
      .sort((a, b) => new Date(b.abfahrt) - new Date(a.abfahrt));
    for (const partner of candidates) {
      const partnerTime = new Date(partner.abfahrt);
      const valid = !allEntries.some(e =>
        e.id !== entry.id && e.id !== partner.id && e.einkommend === true && e.ankunft
        && new Date(e.ankunft) > partnerTime && new Date(e.ankunft) < ankunftTime
      );
      if (valid) { const ms = ankunftTime - partnerTime; return ms > 0 ? ms : null; }
    }
  }
  return null;
}

/// For Ausgehend entries: check if a matching Einkommend entry exists
function getEinsatzdauerAusgehend(entry, allEntries) {
  return !!findPartnerEntry(entry, allEntries);
}

// Returns the partner entry object for an Ausgehend entry (or null)
function findPartnerEntry(entry, allEntries) {
  if (!entry.ausgehend || !entry.abfahrt || entry.ankunft) return null;
  const abfahrtTime = new Date(entry.abfahrt);
  const candidates = allEntries
    .filter(e => e.id !== entry.id && e.einkommend === true && e.ankunft && !e.abfahrt
              && new Date(e.ankunft) > abfahrtTime)
    .sort((a, b) => new Date(a.ankunft) - new Date(b.ankunft));
  for (const partner of candidates) {
    const partnerTime = new Date(partner.ankunft);
    const valid = !allEntries.some(e =>
      e.id !== entry.id && e.id !== partner.id && e.einkommend === true && e.ankunft
      && new Date(e.ankunft) > abfahrtTime && new Date(e.ankunft) < partnerTime
    );
    if (valid) return partner;
  }
  return null;
}

// Build a map of { id -> { partnerId, idx } } for color-coding paired rows
const PAIR_PALETTES = [
  { bg: '#eff6ff', border: '#3b82f6' },
  { bg: '#f0fdf4', border: '#22c55e' },
  { bg: '#faf5ff', border: '#a855f7' },
  { bg: '#fff7ed', border: '#f97316' },
  { bg: '#f0fdfa', border: '#14b8a6' },
];
function buildPairMap(entries) {
  const map = {};
  let idx = 0;
  entries.forEach(entry => {
    if (map[entry.id]) return;
    const partner = findPartnerEntry(entry, entries);
    if (partner) {
      map[entry.id]      = { partnerId: partner.id, idx };
      map[partner.id]    = { partnerId: entry.id,   idx };
      idx++;
    }
  });
  return map;
}

/* ── EPP – Elbe Passage Planning ── */

function goEPP() {
